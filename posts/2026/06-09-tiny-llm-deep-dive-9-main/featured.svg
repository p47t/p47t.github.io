<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1b26"/>
      <stop offset="100%" stop-color="#24283b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff9e64"/>
      <stop offset="100%" stop-color="#bb9af7"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2a2e42"/>
      <stop offset="100%" stop-color="#1f2233"/>
    </linearGradient>
    <marker id="arrow9" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#bb9af7"/>
    </marker>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <rect x="50" y="50" width="140" height="4" fill="url(#accent)" rx="2"/>

  <text x="60" y="92" font-family="monospace" font-size="14" fill="#9ece6a">tiny-llm-runner · deep dive (finale)</text>
  <text x="60" y="138" font-family="Arvo, serif" font-size="42" fill="#c0caf5" font-weight="bold">(9) main.rs</text>
  <text x="60" y="170" font-family="Arial, sans-serif" font-size="20" fill="rgba(192,202,245,0.65)">CLI · prefill / decode · global optimization roadmap</text>

  <!-- Pipeline -->
  <g transform="translate(70, 220)">
    <rect width="1060" height="80" rx="10" fill="url(#card)" stroke="#bb9af7" stroke-width="2"/>
    <g font-family="monospace" font-size="12" fill="#c0caf5" text-anchor="middle">
      <g transform="translate(80, 30)">
        <rect x="-60" y="0" width="120" height="36" rx="6" fill="rgba(125,207,255,0.18)" stroke="#7dcfff"/>
        <text x="0" y="22" fill="#7dcfff">CLI args</text>
      </g>
      <g transform="translate(220, 30)">
        <rect x="-60" y="0" width="120" height="36" rx="6" fill="rgba(125,207,255,0.18)" stroke="#7dcfff"/>
        <text x="0" y="22" fill="#7dcfff">mmap GGUF</text>
      </g>
      <g transform="translate(360, 30)">
        <rect x="-60" y="0" width="120" height="36" rx="6" fill="rgba(125,207,255,0.18)" stroke="#7dcfff"/>
        <text x="0" y="22" fill="#7dcfff">load model</text>
      </g>
      <g transform="translate(500, 30)">
        <rect x="-70" y="0" width="140" height="36" rx="6" fill="rgba(187,154,247,0.2)" stroke="#bb9af7"/>
        <text x="0" y="22" fill="#bb9af7">encode prompt</text>
      </g>
      <g transform="translate(680, 30)">
        <rect x="-60" y="0" width="120" height="36" rx="6" fill="rgba(247,118,142,0.2)" stroke="#f7768e"/>
        <text x="0" y="22" fill="#f7768e">prefill</text>
      </g>
      <g transform="translate(820, 30)">
        <rect x="-60" y="0" width="120" height="36" rx="6" fill="rgba(255,158,100,0.2)" stroke="#ff9e64"/>
        <text x="0" y="22" fill="#ff9e64">decode loop</text>
      </g>
      <g transform="translate(970, 30)">
        <rect x="-60" y="0" width="120" height="36" rx="6" fill="rgba(158,206,106,0.2)" stroke="#9ece6a"/>
        <text x="0" y="22" fill="#9ece6a">stream out</text>
      </g>
    </g>
    <!-- arrows between -->
    <g stroke="rgba(187,154,247,0.5)" stroke-width="2" fill="none">
      <line x1="140" y1="48" x2="160" y2="48" marker-end="url(#arrow9)"/>
      <line x1="280" y1="48" x2="300" y2="48" marker-end="url(#arrow9)"/>
      <line x1="420" y1="48" x2="430" y2="48" marker-end="url(#arrow9)"/>
      <line x1="570" y1="48" x2="610" y2="48" marker-end="url(#arrow9)"/>
      <line x1="740" y1="48" x2="760" y2="48" marker-end="url(#arrow9)"/>
      <line x1="880" y1="48" x2="910" y2="48" marker-end="url(#arrow9)"/>
    </g>
  </g>

  <!-- Optimization tiers -->
  <g transform="translate(70, 330)">
    <text x="0" y="0" font-family="monospace" font-size="14" fill="#7dcfff">// global optimization roadmap</text>

    <!-- Tier 1 -->
    <g transform="translate(0, 20)">
      <rect width="1060" height="64" rx="8" fill="rgba(247,118,142,0.08)" stroke="#f7768e" stroke-width="2"/>
      <text x="20" y="28" font-family="monospace" font-size="14" fill="#f7768e">Tier 1 (10× wins)</text>
      <text x="200" y="28" font-family="monospace" font-size="12" fill="#c0caf5">SIMD dot kernels  ·  prefill batching (GEMV→GEMM)  ·  K-quants (Q4_K_M)</text>
      <text x="20" y="50" font-family="monospace" font-size="11" fill="rgba(247,118,142,0.7)">where the real performance is hiding</text>
    </g>

    <!-- Tier 2 -->
    <g transform="translate(0, 96)">
      <rect width="1060" height="64" rx="8" fill="rgba(255,158,100,0.08)" stroke="#ff9e64" stroke-width="2"/>
      <text x="20" y="28" font-family="monospace" font-size="14" fill="#ff9e64">Tier 2 (2-3× wins)</text>
      <text x="220" y="28" font-family="monospace" font-size="12" fill="#c0caf5">multi-row matvec fusion  ·  KV cache quantization  ·  f16/bf16 throughout</text>
      <text x="20" y="50" font-family="monospace" font-size="11" fill="rgba(255,158,100,0.7)">memory bandwidth tricks</text>
    </g>

    <!-- Tier 3 -->
    <g transform="translate(0, 172)">
      <rect width="1060" height="64" rx="8" fill="rgba(224,175,104,0.08)" stroke="#e0af68" stroke-width="2"/>
      <text x="20" y="28" font-family="monospace" font-size="14" fill="#e0af68">Tier 3 (small wins)</text>
      <text x="220" y="28" font-family="monospace" font-size="12" fill="#c0caf5">RoPE sin/cos table  ·  pair lookup table  ·  top-p / repetition penalty</text>
      <text x="20" y="50" font-family="monospace" font-size="11" fill="rgba(224,175,104,0.7)">quality-of-life polish</text>
    </g>

    <!-- Tier 4 -->
    <g transform="translate(0, 248)">
      <rect width="1060" height="64" rx="8" fill="rgba(187,154,247,0.08)" stroke="#bb9af7" stroke-width="2"/>
      <text x="20" y="28" font-family="monospace" font-size="14" fill="#bb9af7">Tier 4 (architectural)</text>
      <text x="240" y="28" font-family="monospace" font-size="12" fill="#c0caf5">GPU backend  ·  FlashAttention  ·  speculative decoding</text>
      <text x="20" y="50" font-family="monospace" font-size="11" fill="rgba(187,154,247,0.7)">basically another project at this scale</text>
    </g>
  </g>

  <text x="1160" y="650" font-family="Arial, sans-serif" font-size="14" fill="rgba(255,255,255,0.5)" text-anchor="end">blog.simplypatrick.com</text>
</svg>
