<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1b26;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#24283b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7dcfff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#bb9af7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="pulseGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff9e64;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f7768e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="triGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#9ece6a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#73daca;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="noiseGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#bb9af7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7aa2f7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="dmcGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7dcfff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2ac3de;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="675" fill="url(#bgGradient)"/>

  <!-- Subtle grid -->
  <g opacity="0.04">
    <line x1="0" y1="0" x2="0" y2="675" stroke="#7dcfff" stroke-width="1"/>
    <line x1="60" y1="0" x2="60" y2="675" stroke="#7dcfff" stroke-width="1"/>
    <line x1="120" y1="0" x2="120" y2="675" stroke="#7dcfff" stroke-width="1"/>
    <line x1="180" y1="0" x2="180" y2="675" stroke="#7dcfff" stroke-width="1"/>
    <line x1="240" y1="0" x2="240" y2="675" stroke="#7dcfff" stroke-width="1"/>
    <line x1="300" y1="0" x2="300" y2="675" stroke="#7dcfff" stroke-width="1"/>
    <line x1="360" y1="0" x2="360" y2="675" stroke="#7dcfff" stroke-width="1"/>
    <line x1="420" y1="0" x2="420" y2="675" stroke="#7dcfff" stroke-width="1"/>
    <line x1="480" y1="0" x2="480" y2="675" stroke="#7dcfff" stroke-width="1"/>
    <line x1="540" y1="0" x2="540" y2="675" stroke="#7dcfff" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="675" stroke="#7dcfff" stroke-width="1"/>
    <line x1="660" y1="0" x2="660" y2="675" stroke="#7dcfff" stroke-width="1"/>
    <line x1="720" y1="0" x2="720" y2="675" stroke="#7dcfff" stroke-width="1"/>
    <line x1="780" y1="0" x2="780" y2="675" stroke="#7dcfff" stroke-width="1"/>
    <line x1="840" y1="0" x2="840" y2="675" stroke="#7dcfff" stroke-width="1"/>
    <line x1="900" y1="0" x2="900" y2="675" stroke="#7dcfff" stroke-width="1"/>
    <line x1="960" y1="0" x2="960" y2="675" stroke="#7dcfff" stroke-width="1"/>
    <line x1="1020" y1="0" x2="1020" y2="675" stroke="#7dcfff" stroke-width="1"/>
    <line x1="1080" y1="0" x2="1080" y2="675" stroke="#7dcfff" stroke-width="1"/>
    <line x1="1140" y1="0" x2="1140" y2="675" stroke="#7dcfff" stroke-width="1"/>
    <line x1="1200" y1="0" x2="1200" y2="675" stroke="#7dcfff" stroke-width="1"/>
  </g>

  <!-- Accent bar -->
  <rect x="50" y="50" width="120" height="4" fill="url(#accentGradient)" rx="2"/>

  <!-- Title -->
  <text x="50" y="95" font-family="Arial, sans-serif" font-size="38" font-weight="bold" fill="#c0caf5">NES APU 模擬器</text>
  <text x="50" y="125" font-family="Arial, sans-serif" font-size="20" fill="#565f89">Audio Processing Unit — 5 Channels of 8-bit Sound</text>

  <!-- Waveform display area -->
  <!-- Pulse 1 - Square wave -->
  <g transform="translate(80, 170)">
    <text x="0" y="0" font-family="monospace" font-size="14" fill="#ff9e64" font-weight="bold">PULSE 1</text>
    <rect x="0" y="10" width="480" height="70" rx="4" fill="rgba(255,158,100,0.05)" stroke="rgba(255,158,100,0.2)" stroke-width="1"/>
    <polyline points="10,65 10,25 40,25 40,65 70,65 70,25 100,25 100,65 130,65 130,25 160,25 160,65 190,65 190,25 220,25 220,65 250,65 250,25 260,25 260,65 290,65 290,25 320,25 320,65 350,65 350,25 360,25 360,65 390,65 390,25 420,25 420,65 450,65 450,25 470,25"
              fill="none" stroke="url(#pulseGradient)" stroke-width="2.5" opacity="0.9"/>
    <!-- Duty cycle label -->
    <text x="440" y="28" font-family="monospace" font-size="11" fill="rgba(255,158,100,0.6)" text-anchor="end">50% duty</text>
  </g>

  <!-- Pulse 2 - Square wave (different duty) -->
  <g transform="translate(630, 170)">
    <text x="0" y="0" font-family="monospace" font-size="14" fill="#f7768e" font-weight="bold">PULSE 2</text>
    <rect x="0" y="10" width="480" height="70" rx="4" fill="rgba(247,118,142,0.05)" stroke="rgba(247,118,142,0.2)" stroke-width="1"/>
    <polyline points="10,65 10,25 25,25 25,65 70,65 70,25 85,25 85,65 130,65 130,25 145,25 145,65 190,65 190,25 205,25 205,65 250,65 250,25 265,25 265,65 310,65 310,25 325,25 325,65 370,65 370,25 385,25 385,65 430,65 430,25 445,25 445,65 470,65"
              fill="none" stroke="url(#pulseGradient)" stroke-width="2.5" opacity="0.7"/>
    <text x="440" y="28" font-family="monospace" font-size="11" fill="rgba(247,118,142,0.6)" text-anchor="end">25% duty</text>
  </g>

  <!-- Triangle wave -->
  <g transform="translate(80, 290)">
    <text x="0" y="0" font-family="monospace" font-size="14" fill="#9ece6a" font-weight="bold">TRIANGLE</text>
    <rect x="0" y="10" width="480" height="70" rx="4" fill="rgba(158,206,106,0.05)" stroke="rgba(158,206,106,0.2)" stroke-width="1"/>
    <polyline points="10,65 50,25 90,65 130,25 170,65 210,25 250,65 290,25 330,65 370,25 410,65 450,25 470,40"
              fill="none" stroke="url(#triGradient)" stroke-width="2.5" opacity="0.9"/>
    <text x="440" y="28" font-family="monospace" font-size="11" fill="rgba(158,206,106,0.6)" text-anchor="end">32-step</text>
  </g>

  <!-- Noise -->
  <g transform="translate(630, 290)">
    <text x="0" y="0" font-family="monospace" font-size="14" fill="#bb9af7" font-weight="bold">NOISE</text>
    <rect x="0" y="10" width="480" height="70" rx="4" fill="rgba(187,154,247,0.05)" stroke="rgba(187,154,247,0.2)" stroke-width="1"/>
    <polyline points="10,45 15,25 20,55 25,35 30,60 35,28 40,50 45,30 50,62 55,40 60,25 65,55 70,32 75,58 80,28 85,52 90,35 95,60 100,25 105,48 110,30 115,55 120,42 125,25 130,58 135,30 140,50 145,38 150,62 155,25 160,48 165,55 170,30 175,60 180,35 185,25 190,52 195,40 200,58 205,28 210,55 215,32 220,60 225,25 230,48 235,55 240,30 245,58 250,35 255,25 260,50 265,40 270,62 275,28 280,52 285,35 290,58 295,25 300,48 305,55 310,32 315,60 320,28 325,50 330,40 335,55 340,25 345,52 350,38 355,62 360,30 365,55 370,25 375,48 380,58 385,35 390,52 395,28 400,60 405,40 410,25 415,55 420,32 425,58 430,25 435,48 440,55 445,30 450,60 455,35 460,52 465,25 470,45"
              fill="none" stroke="url(#noiseGradient)" stroke-width="2" opacity="0.8"/>
    <text x="440" y="28" font-family="monospace" font-size="11" fill="rgba(187,154,247,0.6)" text-anchor="end">LFSR</text>
  </g>

  <!-- DMC - Staircase waveform -->
  <g transform="translate(80, 410)">
    <text x="0" y="0" font-family="monospace" font-size="14" fill="#7dcfff" font-weight="bold">DMC</text>
    <rect x="0" y="10" width="1030" height="70" rx="4" fill="rgba(125,207,255,0.05)" stroke="rgba(125,207,255,0.2)" stroke-width="1"/>
    <polyline points="10,55 20,55 20,50 30,50 30,45 40,45 40,40 50,40 50,35 60,35 60,30 70,30 70,35 80,35 80,40 90,40 90,35 100,35 100,30 110,30 110,25 120,25 120,30 130,30 130,35 140,35 140,30 150,30 150,25 160,25 160,30 170,30 170,35 180,35 180,40 190,40 190,45 200,45 200,50 210,50 210,45 220,45 220,40 230,40 230,35 240,35 240,30 250,30 250,25 260,25 260,30 270,30 270,35 280,35 280,30 290,30 290,25 300,25 300,30 310,30 310,35 320,35 320,30 330,30 330,25 340,25 340,30 350,30 350,35 360,35 360,40 370,40 370,45 380,45 380,40 390,40 390,35 400,35 400,30 410,30 410,35 420,35 420,40 430,40 430,45 440,45 440,50 450,50 450,55 460,55 460,50 470,50 470,45 480,45 480,40 490,40 490,35 500,35 500,30 510,30 510,25 520,25 520,30 530,30 530,35 540,35 540,40 550,40 550,45 560,45 560,40 570,40 570,35 580,35 580,30 590,30 590,35 600,35 600,40 610,40 610,35 620,35 620,30 630,30 630,35 640,35 640,40 650,40 650,45 660,45 660,50 670,50 670,55 680,55 680,50 690,50 690,45 700,45 700,40 710,40 710,35 720,35 720,30 730,30 730,25 740,25 740,30 750,30 750,35 760,35 760,30 770,30 770,35 780,35 780,40 790,40 790,45 800,45 800,40 810,40 810,35 820,35 820,30 830,30 830,35 840,35 840,40 850,40 850,35 860,35 860,30 870,30 870,25 880,25 880,30 890,30 890,35 900,35 900,40 910,40 910,45 920,45 920,50 930,50 930,55 940,55 940,50 950,50 950,45 960,45 960,40 970,40 970,35 980,35 980,30 990,30 990,35 1000,35 1000,40 1010,40 1010,45 1020,45"
              fill="none" stroke="url(#dmcGradient)" stroke-width="2" opacity="0.9"/>
    <text x="990" y="28" font-family="monospace" font-size="11" fill="rgba(125,207,255,0.6)" text-anchor="end">1-bit DPCM</text>
  </g>

  <!-- Mixer diagram -->
  <g transform="translate(80, 530)">
    <!-- Mixer box -->
    <rect x="380" y="0" width="120" height="50" rx="6" fill="rgba(125,207,255,0.1)" stroke="#7dcfff" stroke-width="2"/>
    <text x="440" y="30" font-family="monospace" font-size="14" fill="#7dcfff" text-anchor="middle">MIXER</text>

    <!-- Channel lines to mixer -->
    <line x1="80" y1="25" x2="380" y2="25" stroke="#ff9e64" stroke-width="1.5" opacity="0.4" stroke-dasharray="4,4"/>
    <line x1="180" y1="10" x2="380" y2="20" stroke="#9ece6a" stroke-width="1.5" opacity="0.4" stroke-dasharray="4,4"/>
    <line x1="280" y1="40" x2="380" y2="30" stroke="#bb9af7" stroke-width="1.5" opacity="0.4" stroke-dasharray="4,4"/>

    <!-- Channel labels -->
    <text x="40" y="29" font-family="monospace" font-size="11" fill="#ff9e64">P1+P2</text>
    <text x="150" y="14" font-family="monospace" font-size="11" fill="#9ece6a">TRI</text>
    <text x="240" y="49" font-family="monospace" font-size="11" fill="#bb9af7">NOISE</text>

    <!-- Output arrow -->
    <line x1="500" y1="25" x2="600" y2="25" stroke="url(#accentGradient)" stroke-width="2"/>
    <polygon points="600,18 618,25 600,32" fill="url(#accentGradient)"/>

    <!-- HPF box -->
    <rect x="630" y="0" width="100" height="50" rx="6" fill="rgba(187,154,247,0.1)" stroke="#bb9af7" stroke-width="1.5"/>
    <text x="680" y="22" font-family="monospace" font-size="12" fill="#bb9af7" text-anchor="middle">HPF</text>
    <text x="680" y="38" font-family="monospace" font-size="10" fill="rgba(187,154,247,0.6)" text-anchor="middle">~37 Hz</text>

    <!-- Final output -->
    <line x1="730" y1="25" x2="810" y2="25" stroke="url(#accentGradient)" stroke-width="2"/>
    <polygon points="810,18 828,25 810,32" fill="url(#accentGradient)"/>

    <!-- Speaker icon -->
    <g transform="translate(840, 8)">
      <rect x="0" y="8" width="12" height="18" rx="1" fill="#c0caf5" opacity="0.8"/>
      <polygon points="12,8 28,0 28,34 12,26" fill="#c0caf5" opacity="0.6"/>
      <path d="M 32,8 Q 40,17 32,26" stroke="#c0caf5" fill="none" stroke-width="2" opacity="0.5"/>
      <path d="M 36,4 Q 46,17 36,30" stroke="#c0caf5" fill="none" stroke-width="2" opacity="0.3"/>
    </g>
  </g>

  <!-- Tech tags -->
  <g transform="translate(600, 620)">
    <g transform="translate(-120, 0)">
      <rect x="-35" y="-16" width="70" height="32" rx="6" fill="rgba(255,158,100,0.2)" stroke="#ff9e64" stroke-width="1.5"/>
      <text x="0" y="4" font-family="monospace" font-size="14" fill="#ff9e64" text-anchor="middle">Rust</text>
    </g>
    <g transform="translate(0, 0)">
      <rect x="-35" y="-16" width="70" height="32" rx="6" fill="rgba(125,207,255,0.2)" stroke="#7dcfff" stroke-width="1.5"/>
      <text x="0" y="4" font-family="monospace" font-size="14" fill="#7dcfff" text-anchor="middle">NES</text>
    </g>
    <g transform="translate(120, 0)">
      <rect x="-35" y="-16" width="70" height="32" rx="6" fill="rgba(158,206,106,0.2)" stroke="#9ece6a" stroke-width="1.5"/>
      <text x="0" y="4" font-family="monospace" font-size="14" fill="#9ece6a" text-anchor="middle">APU</text>
    </g>
  </g>

  <!-- Branding -->
  <text x="1160" y="645" font-family="Arial, sans-serif" font-size="18" fill="rgba(255, 255, 255, 0.5)" text-anchor="end">blog.simplypatrick.com</text>
</svg>
