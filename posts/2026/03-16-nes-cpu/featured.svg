<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1b26;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#24283b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="chipGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2a2d3d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1f2233;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff6b35;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f7931e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glowGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7dcfff;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#7dcfff;stop-opacity:0" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="675" fill="url(#bgGradient)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.03">
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#7dcfff" stroke-width="0.5"/>
    </pattern>
    <rect width="1200" height="675" fill="url(#grid)"/>
  </g>

  <!-- Accent bar -->
  <rect x="50" y="50" width="120" height="4" fill="url(#accentGradient)" rx="2"/>

  <!-- CPU Chip body -->
  <rect x="350" y="120" width="500" height="320" rx="8" fill="url(#chipGradient)" stroke="#414868" stroke-width="2"/>

  <!-- Chip notch -->
  <circle cx="600" cy="120" r="15" fill="#1a1b26" stroke="#414868" stroke-width="1.5"/>

  <!-- Chip pins - left side -->
  <g stroke="#565f89" stroke-width="2">
    <line x1="320" y1="160" x2="350" y2="160"/>
    <line x1="320" y1="190" x2="350" y2="190"/>
    <line x1="320" y1="220" x2="350" y2="220"/>
    <line x1="320" y1="250" x2="350" y2="250"/>
    <line x1="320" y1="280" x2="350" y2="280"/>
    <line x1="320" y1="310" x2="350" y2="310"/>
    <line x1="320" y1="340" x2="350" y2="340"/>
    <line x1="320" y1="370" x2="350" y2="370"/>
    <line x1="320" y1="400" x2="350" y2="400"/>
  </g>

  <!-- Chip pins - right side -->
  <g stroke="#565f89" stroke-width="2">
    <line x1="850" y1="160" x2="880" y2="160"/>
    <line x1="850" y1="190" x2="880" y2="190"/>
    <line x1="850" y1="220" x2="880" y2="220"/>
    <line x1="850" y1="250" x2="880" y2="250"/>
    <line x1="850" y1="280" x2="880" y2="280"/>
    <line x1="850" y1="310" x2="880" y2="310"/>
    <line x1="850" y1="340" x2="880" y2="340"/>
    <line x1="850" y1="370" x2="880" y2="370"/>
    <line x1="850" y1="400" x2="880" y2="400"/>
  </g>

  <!-- Chip label -->
  <text x="600" y="175" font-family="'Source Code Pro', monospace" font-size="28" fill="#ff9e64" text-anchor="middle" font-weight="bold">MOS 6502</text>
  <text x="600" y="205" font-family="'Source Code Pro', monospace" font-size="14" fill="#565f89" text-anchor="middle">Cycle-Accurate Emulator</text>

  <!-- Divider line inside chip -->
  <line x1="380" y1="220" x2="820" y2="220" stroke="#414868" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Register display inside chip -->
  <g font-family="'Source Code Pro', monospace" font-size="16">
    <!-- Row 1 -->
    <text x="410" y="260" fill="#565f89">A:</text>
    <text x="435" y="260" fill="#9ece6a" filter="url(#glow)">$42</text>
    <text x="520" y="260" fill="#565f89">X:</text>
    <text x="545" y="260" fill="#9ece6a" filter="url(#glow)">$0F</text>
    <text x="630" y="260" fill="#565f89">Y:</text>
    <text x="655" y="260" fill="#9ece6a" filter="url(#glow)">$00</text>

    <!-- Row 2 -->
    <text x="410" y="300" fill="#565f89">PC:</text>
    <text x="445" y="300" fill="#7dcfff" filter="url(#glow)">$C000</text>
    <text x="570" y="300" fill="#565f89">SP:</text>
    <text x="605" y="300" fill="#7dcfff" filter="url(#glow)">$FD</text>

    <!-- Row 3: Flags -->
    <text x="410" y="340" fill="#565f89">P:</text>
    <text x="435" y="340" fill="#bb9af7">NV-BDIZC</text>
    <text x="600" y="340" fill="#ff9e64" font-size="14">00100100</text>
  </g>

  <!-- Instruction being executed -->
  <rect x="390" y="360" width="420" height="40" rx="4" fill="rgba(122, 162, 247, 0.1)" stroke="#7aa2f7" stroke-width="1"/>
  <text x="410" y="386" font-family="'Source Code Pro', monospace" font-size="15" fill="#7aa2f7">A9 42</text>
  <text x="490" y="386" font-family="'Source Code Pro', monospace" font-size="15" fill="#c0caf5">LDA #$42</text>
  <text x="660" y="386" font-family="'Source Code Pro', monospace" font-size="13" fill="#565f89">2 cycles</text>

  <!-- Data flow arrows - left (fetch) -->
  <g filter="url(#glow)">
    <line x1="240" y1="280" x2="315" y2="280" stroke="#9ece6a" stroke-width="2" marker-end="url(#arrowGreen)"/>
    <text x="200" y="265" font-family="'Source Code Pro', monospace" font-size="12" fill="#9ece6a" text-anchor="middle">FETCH</text>
    <text x="200" y="285" font-family="'Source Code Pro', monospace" font-size="11" fill="#565f89" text-anchor="middle">$A9</text>
  </g>

  <!-- Data flow arrows - right (bus) -->
  <g filter="url(#glow)">
    <line x1="885" y1="280" x2="960" y2="280" stroke="#7dcfff" stroke-width="2"/>
    <text x="1010" y="265" font-family="'Source Code Pro', monospace" font-size="12" fill="#7dcfff" text-anchor="middle">BUS</text>
    <text x="1010" y="285" font-family="'Source Code Pro', monospace" font-size="11" fill="#565f89" text-anchor="middle">64KB</text>
  </g>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#9ece6a"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7dcfff"/>
    </marker>
  </defs>

  <!-- Memory blocks on the right -->
  <g transform="translate(930, 150)">
    <rect width="180" height="30" rx="3" fill="rgba(158, 206, 106, 0.15)" stroke="#9ece6a" stroke-width="1"/>
    <text x="90" y="20" font-family="'Source Code Pro', monospace" font-size="11" fill="#9ece6a" text-anchor="middle">$0000 RAM 2KB</text>

    <rect y="38" width="180" height="30" rx="3" fill="rgba(122, 162, 247, 0.15)" stroke="#7aa2f7" stroke-width="1"/>
    <text x="90" y="58" font-family="'Source Code Pro', monospace" font-size="11" fill="#7aa2f7" text-anchor="middle">$2000 PPU I/O</text>

    <rect y="76" width="180" height="30" rx="3" fill="rgba(187, 154, 247, 0.15)" stroke="#bb9af7" stroke-width="1"/>
    <text x="90" y="96" font-family="'Source Code Pro', monospace" font-size="11" fill="#bb9af7" text-anchor="middle">$4000 APU/IO</text>

    <rect y="114" width="180" height="30" rx="3" fill="rgba(255, 158, 100, 0.15)" stroke="#ff9e64" stroke-width="1"/>
    <text x="90" y="134" font-family="'Source Code Pro', monospace" font-size="11" fill="#ff9e64" text-anchor="middle">$8000 PRG-ROM</text>
  </g>

  <!-- Title area at bottom -->
  <text x="600" y="510" font-family="'Arial', sans-serif" font-size="36" fill="#c0caf5" text-anchor="middle" font-weight="bold">用 Rust 寫一顆 6502 CPU</text>
  <text x="600" y="545" font-family="'Source Code Pro', monospace" font-size="20" fill="#565f89" text-anchor="middle">Cycle-Accurate NES Emulator in Rust</text>

  <!-- Tech tags -->
  <g transform="translate(600, 595)">
    <g transform="translate(-150, 0)">
      <rect x="-35" y="-16" width="70" height="32" rx="6" fill="rgba(255, 158, 100, 0.2)" stroke="#ff9e64" stroke-width="1.5"/>
      <text x="0" y="5" font-family="'Source Code Pro', monospace" font-size="14" fill="#ff9e64" text-anchor="middle">Rust</text>
    </g>
    <g transform="translate(-50, 0)">
      <rect x="-35" y="-16" width="70" height="32" rx="6" fill="rgba(158, 206, 106, 0.2)" stroke="#9ece6a" stroke-width="1.5"/>
      <text x="0" y="5" font-family="'Source Code Pro', monospace" font-size="14" fill="#9ece6a" text-anchor="middle">6502</text>
    </g>
    <g transform="translate(50, 0)">
      <rect x="-30" y="-16" width="60" height="32" rx="6" fill="rgba(122, 162, 247, 0.2)" stroke="#7aa2f7" stroke-width="1.5"/>
      <text x="0" y="5" font-family="'Source Code Pro', monospace" font-size="14" fill="#7aa2f7" text-anchor="middle">NES</text>
    </g>
    <g transform="translate(155, 0)">
      <rect x="-50" y="-16" width="100" height="32" rx="6" fill="rgba(187, 154, 247, 0.2)" stroke="#bb9af7" stroke-width="1.5"/>
      <text x="0" y="5" font-family="'Source Code Pro', monospace" font-size="14" fill="#bb9af7" text-anchor="middle">Emulator</text>
    </g>
  </g>

  <!-- Branding -->
  <text x="1160" y="645" font-family="Arial, sans-serif" font-size="14" fill="rgba(255, 255, 255, 0.3)" text-anchor="end">blog.simplypatrick.com</text>
</svg>