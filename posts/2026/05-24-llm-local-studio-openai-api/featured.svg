<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1b26;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#24283b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="rustGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b35;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f7931e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="pythonGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#306998;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffd43b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="jsGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f7df1e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f0db4f;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="curlGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#073a5a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#066a9c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="serverGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7aa2f7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#bb9af7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7aa2f7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#bb9af7;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="675" fill="url(#bgGradient)" />

  <!-- Subtle grid -->
  <g opacity="0.05">
    <line x1="0" y1="0" x2="1200" y2="675" stroke="#7aa2f7" stroke-width="0.5" />
    <line x1="200" y1="0" x2="1200" y2="500" stroke="#7aa2f7" stroke-width="0.5" />
    <line x1="0" y1="200" x2="1000" y2="675" stroke="#7aa2f7" stroke-width="0.5" />
    <line x1="400" y1="0" x2="1200" y2="400" stroke="#7aa2f7" stroke-width="0.5" />
    <line x1="0" y1="400" x2="800" y2="675" stroke="#7aa2f7" stroke-width="0.5" />
  </g>

  <!-- Accent bar -->
  <rect x="50" y="50" width="120" height="4" fill="url(#accentGradient)" rx="2" />

  <!-- Central Server Box -->
  <g transform="translate(480, 200)">
    <rect width="240" height="150" rx="12" fill="rgba(30, 32, 48, 0.95)" stroke="url(#serverGradient)" stroke-width="2.5" />
    <!-- Title bar -->
    <rect width="240" height="30" rx="12" fill="rgba(55, 60, 85, 0.8)" />
    <rect y="10" width="240" height="20" fill="rgba(55, 60, 85, 0.8)" />
    <text x="120" y="20" font-family="monospace" font-weight="bold" font-size="12" fill="#7aa2f7" text-anchor="middle">llm-local-studio-2</text>
    
    <!-- Server Status Content -->
    <text x="120" y="65" font-family="monospace" font-size="12" fill="rgba(255, 255, 255, 0.9)" text-anchor="middle">Local HTTP Server</text>
    <text x="120" y="85" font-family="monospace" font-size="13" fill="#9ece6a" text-anchor="middle">http://127.0.0.1:8080</text>
    
    <rect x="30" y="105" width="180" height="25" rx="4" fill="rgba(187, 154, 247, 0.15)" stroke="#bb9af7" stroke-width="1" />
    <text x="120" y="122" font-family="monospace" font-size="10" fill="#bb9af7" text-anchor="middle">OpenAI Compatible API</text>
  </g>

  <!-- Client 1: Python Box (Top Left) -->
  <g transform="translate(140, 90)">
    <rect width="260" height="110" rx="10" fill="rgba(30, 32, 48, 0.9)" stroke="#306998" stroke-width="1.5" />
    <rect width="260" height="25" rx="10" fill="rgba(48, 105, 152, 0.2)" />
    <rect y="10" width="260" height="15" fill="rgba(48, 105, 152, 0.2)" />
    <text x="130" y="17" font-family="monospace" font-weight="bold" font-size="11" fill="#75aadb" text-anchor="middle">Python Client</text>
    <text x="20" y="50" font-family="monospace" font-size="10" fill="rgba(255,255,255,0.7)">import openai</text>
    <text x="20" y="68" font-family="monospace" font-size="10" fill="rgba(255,255,255,0.7)">client = openai.OpenAI(</text>
    <text x="30" y="86" font-family="monospace" font-size="10" fill="#e0af68">  base_url="http://localhost:8080/v1"</text>
    <text x="20" y="98" font-family="monospace" font-size="10" fill="rgba(255,255,255,0.7)">)</text>
  </g>

  <!-- Client 2: Node.js/JS Box (Bottom Left) -->
  <g transform="translate(140, 340)">
    <rect width="260" height="110" rx="10" fill="rgba(30, 32, 48, 0.9)" stroke="#f7df1e" stroke-width="1.5" stroke-opacity="0.8" />
    <rect width="260" height="25" rx="10" fill="rgba(247, 223, 30, 0.1)" />
    <rect y="10" width="260" height="15" fill="rgba(247, 223, 30, 0.1)" />
    <text x="130" y="17" font-family="monospace" font-weight="bold" font-size="11" fill="#f7df1e" text-anchor="middle">Node.js Client</text>
    <text x="20" y="50" font-family="monospace" font-size="10" fill="rgba(255,255,255,0.7)">const { OpenAI } = require("openai");</text>
    <text x="20" y="68" font-family="monospace" font-size="10" fill="rgba(255,255,255,0.7)">const openai = new OpenAI({</text>
    <text x="30" y="86" font-family="monospace" font-size="10" fill="#e0af68">  baseURL: "http://localhost:8080/v1"</text>
    <text x="20" y="98" font-family="monospace" font-size="10" fill="rgba(255,255,255,0.7)">});</text>
  </g>

  <!-- Client 3: Rust Box (Top Right) -->
  <g transform="translate(800, 90)">
    <rect width="260" height="110" rx="10" fill="rgba(30, 32, 48, 0.9)" stroke="#ff6b35" stroke-width="1.5" />
    <rect width="260" height="25" rx="10" fill="rgba(255, 107, 53, 0.2)" />
    <rect y="10" width="260" height="15" fill="rgba(255, 107, 53, 0.2)" />
    <text x="130" y="17" font-family="monospace" font-weight="bold" font-size="11" fill="#ff9e64" text-anchor="middle">Rust Client (async-openai)</text>
    <text x="20" y="50" font-family="monospace" font-size="10" fill="rgba(255,255,255,0.7)">let config = ClientConfig::default()</text>
    <text x="30" y="68" font-family="monospace" font-size="10" fill="#e0af68">  .with_api_base("http://localhost:8080/v1");</text>
    <text x="20" y="86" font-family="monospace" font-size="10" fill="rgba(255,255,255,0.7)">let client = Client::with_config(config);</text>
  </g>

  <!-- Client 4: Raw curl Box (Bottom Right) -->
  <g transform="translate(800, 340)">
    <rect width="260" height="110" rx="10" fill="rgba(30, 32, 48, 0.9)" stroke="#066a9c" stroke-width="1.5" />
    <rect width="260" height="25" rx="10" fill="rgba(6, 106, 156, 0.2)" />
    <rect y="10" width="260" height="15" fill="rgba(6, 106, 156, 0.2)" />
    <text x="130" y="17" font-family="monospace" font-weight="bold" font-size="11" fill="#0cb6ff" text-anchor="middle">Raw CLI curl</text>
    <text x="20" y="50" font-family="monospace" font-size="10" fill="rgba(255,255,255,0.7)">curl http://localhost:8080/v1/chat/...</text>
    <text x="20" y="68" font-family="monospace" font-size="10" fill="rgba(255,255,255,0.7)">  -H "Content-Type: application/json"</text>
    <text x="20" y="86" font-family="monospace" font-size="10" fill="rgba(255,255,255,0.7)">  -d '{"model": "tinyllama", ...}'</text>
  </g>

  <!-- Connection Arrows to Central Server -->
  <!-- Top Left to Center -->
  <path d="M 370 200 L 460 230" stroke="#7aa2f7" stroke-width="2" stroke-dasharray="4,4" fill="none" />
  <circle cx="460" cy="230" r="4" fill="#7aa2f7" />

  <!-- Bottom Left to Center -->
  <path d="M 370 350 L 460 320" stroke="#7aa2f7" stroke-width="2" stroke-dasharray="4,4" fill="none" />
  <circle cx="460" cy="320" r="4" fill="#7aa2f7" />

  <!-- Top Right to Center -->
  <path d="M 830 200 L 740 230" stroke="#7aa2f7" stroke-width="2" stroke-dasharray="4,4" fill="none" />
  <circle cx="740" cy="230" r="4" fill="#7aa2f7" />

  <!-- Bottom Right to Center -->
  <path d="M 830 350 L 740 320" stroke="#7aa2f7" stroke-width="2" stroke-dasharray="4,4" fill="none" />
  <circle cx="740" cy="320" r="4" fill="#7aa2f7" />

  <!-- Title at bottom -->
  <text x="600" y="545" font-family="Arvo, serif" font-size="32" fill="rgba(255, 255, 255, 0.95)" text-anchor="middle" font-weight="bold">
    本地 LLM 工作站：客戶端整合
  </text>
  <text x="600" y="575" font-family="sans-serif" font-size="18" fill="rgba(122, 162, 247, 0.7)" text-anchor="middle">
    多語言 OpenAI 相容 API 串接指南 · Python · Node.js · Rust · curl
  </text>

  <!-- Tech tags -->
  <g transform="translate(600, 610)">
    <g transform="translate(-180, 0)">
      <rect x="-40" y="-16" width="80" height="32" rx="6" fill="rgba(48, 105, 152, 0.2)" stroke="#306998" stroke-width="1.5" />
      <text x="0" y="4" font-family="monospace" font-size="14" fill="#75aadb" text-anchor="middle">Python</text>
    </g>
    <g transform="translate(-60, 0)">
      <rect x="-45" y="-16" width="90" height="32" rx="6" fill="rgba(247, 223, 30, 0.15)" stroke="#f7df1e" stroke-width="1.5" />
      <text x="0" y="4" font-family="monospace" font-size="14" fill="#f7df1e" text-anchor="middle">Node.js</text>
    </g>
    <g transform="translate(50, 0)">
      <rect x="-35" y="-16" width="70" height="32" rx="6" fill="rgba(255, 107, 53, 0.2)" stroke="#ff6b35" stroke-width="1.5" />
      <text x="0" y="4" font-family="monospace" font-size="14" fill="#ff6b35" text-anchor="middle">Rust</text>
    </g>
    <g transform="translate(160, 0)">
      <rect x="-35" y="-16" width="70" height="32" rx="6" fill="rgba(6, 106, 156, 0.2)" stroke="#066a9c" stroke-width="1.5" />
      <text x="0" y="4" font-family="monospace" font-size="14" fill="#0cb6ff" text-anchor="middle">curl</text>
    </g>
  </g>

  <!-- Branding -->
  <text x="1160" y="645" font-family="Arial, sans-serif" font-size="18" fill="rgba(255, 255, 255, 0.5)" text-anchor="end">
    blog.simplypatrick.com
  </text>
</svg>
