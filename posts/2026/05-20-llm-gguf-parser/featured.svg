<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1b26;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#24283b;stop-opacity:1" />
    </linearGradient>

    <!-- Accent Bar Gradient -->
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#bb9af7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff9e64;stop-opacity:1" />
    </linearGradient>

    <!-- Disk Container Gradient -->
    <linearGradient id="diskGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2f3549;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1f2335;stop-opacity:1" />
    </linearGradient>

    <!-- RAM Container Gradient -->
    <linearGradient id="ramGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2e3c64;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1f2d5a;stop-opacity:1" />
    </linearGradient>

    <!-- Drop Shadow Filter -->
    <filter id="glow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="675" fill="url(#bgGradient)"/>

  <!-- Accent Bar (Top-Left) -->
  <rect x="50" y="50" width="120" height="4" fill="url(#accentGradient)" rx="2"/>

  <!-- Bilingual Title -->
  <g transform="translate(50, 0)">
    <text x="0" y="110" font-family="'Helvetica Neue', Arial, sans-serif" font-size="42" font-weight="bold" fill="#ffffff" letter-spacing="1">用 Rust 手寫 GGUF 解析器</text>
    <text x="0" y="150" font-family="'Source Code Pro', 'Courier New', monospace" font-size="20" font-weight="bold" fill="#7dcfff" letter-spacing="1">GGUF Model Parser in Pure Rust</text>
  </g>

  <!-- Central Diagram -->
  <g transform="translate(0, 10)" filter="url(#glow)">
    <!-- 1. GGUF File on Disk (Left) -->
    <g transform="translate(150, 200)">
      <rect x="0" y="0" width="320" height="280" rx="12" fill="url(#diskGradient)" stroke="#5a9fcc" stroke-width="2"/>
      <text x="160" y="30" font-family="'Helvetica Neue', Arial, sans-serif" font-size="16" font-weight="bold" fill="#7dcfff" text-anchor="middle">GGUF Model File (on Disk)</text>
      
      <!-- Magic & Version -->
      <rect x="20" y="50" width="280" height="40" rx="6" fill="#1f2335" stroke="#ff9e64" stroke-width="1.5"/>
      <text x="160" y="75" font-family="monospace" font-size="13" fill="#ff9e64" text-anchor="middle">Magic &amp; Version (8 Bytes)</text>

      <!-- Metadata KV -->
      <rect x="20" y="102" width="280" height="58" rx="6" fill="#1f2335" stroke="#bb9af7" stroke-width="1.5"/>
      <text x="160" y="128" font-family="monospace" font-size="13" fill="#bb9af7" text-anchor="middle">Metadata KV Pairs</text>
      <text x="160" y="146" font-family="monospace" font-size="10" fill="rgba(255,255,255,0.4)" text-anchor="middle">general.architecture, alignment...</text>

      <!-- Tensor Data -->
      <rect x="20" y="172" width="280" height="88" rx="6" fill="#1f2335" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
      <text x="160" y="210" font-family="monospace" font-size="14" fill="rgba(255,255,255,0.5)" text-anchor="middle">Tensor Weights (99.9%)</text>
      <text x="160" y="230" font-family="monospace" font-size="10" fill="rgba(255,255,255,0.3)" text-anchor="middle">Gigabytes of raw parameters</text>
    </g>

    <!-- 2. Memory Mapping Action (Center Arrow) -->
    <g transform="translate(470, 200)">
      <!-- Arrow Line -->
      <path d="M 20 140 L 240 140" stroke="#9ece6a" stroke-width="3" stroke-dasharray="6,6" fill="none"/>
      <!-- Arrow Head -->
      <polygon points="240,134 254,140 240,146" fill="#9ece6a" />
      
      <!-- mmap Label -->
      <rect x="55" y="110" width="150" height="30" rx="6" fill="#1a1b26" stroke="#9ece6a" stroke-width="1.5" />
      <text x="130" y="129" font-family="monospace" font-size="12" font-weight="bold" fill="#9ece6a" text-anchor="middle">memmap2 (Zero-Copy)</text>
    </g>

    <!-- 3. Rust Virtual Memory (Right) -->
    <g transform="translate(730, 200)">
      <rect x="0" y="0" width="320" height="280" rx="12" fill="url(#ramGradient)" stroke="#bb9af7" stroke-width="2"/>
      <text x="160" y="30" font-family="'Helvetica Neue', Arial, sans-serif" font-size="16" font-weight="bold" fill="#bb9af7" text-anchor="middle">Rust Process Virtual RAM</text>
      
      <!-- Parsed Metadata -->
      <rect x="20" y="50" width="280" height="88" rx="6" fill="#1a1b26" stroke="#9ece6a" stroke-width="1.5"/>
      <text x="160" y="72" font-family="monospace" font-size="13" font-weight="bold" fill="#9ece6a" text-anchor="middle">Parsed Metadata HashMap</text>
      <text x="160" y="94" font-family="monospace" font-size="11" fill="#e0af68" text-anchor="middle">"general.architecture" =&gt; "llama"</text>
      <text x="160" y="114" font-family="monospace" font-size="11" fill="#e0af68" text-anchor="middle">"llama.context_length" =&gt; 2048</text>

      <!-- Unloaded Weight Slice -->
      <rect x="20" y="150" width="280" height="110" rx="6" fill="#1a1b26" stroke="#f7768e" stroke-dasharray="4,4" stroke-width="1.5"/>
      <text x="160" y="190" font-family="monospace" font-size="13" font-weight="bold" fill="#f7768e" text-anchor="middle">UNLOADED Weights Slice</text>
      <text x="160" y="212" font-family="monospace" font-size="11" fill="rgba(247,118,142,0.8)" text-anchor="middle">Mapped in virtual space only</text>
      <text x="160" y="232" font-family="monospace" font-size="10" fill="rgba(255,255,255,0.3)" text-anchor="middle">No physical RAM allocated</text>
    </g>
  </g>

  <!-- Tech Tags (Bottom Center) -->
  <g transform="translate(600, 570)">
    <!-- Tag 1: Rust -->
    <g transform="translate(-65, 0)">
      <rect x="-50" y="-18" width="100" height="36" rx="6" fill="rgba(255, 158, 100, 0.15)" stroke="#ff9e64" stroke-width="1.5"/>
      <text x="0" y="5" font-family="'Source Code Pro', monospace" font-size="15" font-weight="bold" fill="#ff9e64" text-anchor="middle">Rust</text>
    </g>
    <!-- Tag 2: GGUF -->
    <g transform="translate(65, 0)">
      <rect x="-50" y="-18" width="100" height="36" rx="6" fill="rgba(125, 207, 255, 0.15)" stroke="#7dcfff" stroke-width="1.5"/>
      <text x="0" y="5" font-family="'Source Code Pro', monospace" font-size="15" font-weight="bold" fill="#7dcfff" text-anchor="middle">GGUF</text>
    </g>
  </g>

  <!-- Branding (Bottom Right) -->
  <text x="1150" y="620" font-family="'Helvetica Neue', Arial, sans-serif" font-size="16" fill="rgba(255, 255, 255, 0.4)" text-anchor="end">
    blog.simplypatrick.com
  </text>
</svg>
