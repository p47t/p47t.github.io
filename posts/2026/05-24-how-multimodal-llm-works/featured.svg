<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#090a0f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#141722;stop-opacity:1" />
    </linearGradient>

    <!-- Accent/Flow Gradients -->
    <linearGradient id="imageFlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ec4899;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="textFlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="combinedFlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d946ef;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="vitGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f472b6;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:0.05" />
    </linearGradient>
    <linearGradient id="projGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c084fc;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:0.05" />
    </linearGradient>
    <linearGradient id="llmGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#818cf8;stop-opacity:0.25" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:0.05" />
    </linearGradient>

    <!-- Glowing effect filters -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="weakGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Dark Background -->
  <rect width="1200" height="675" fill="url(#bgGradient)" />

  <!-- Technical Grid Overlay -->
  <g opacity="0.03" stroke="#ffffff" stroke-width="1">
    <path d="M 0,75 L 1200,75 M 0,150 L 1200,150 M 0,225 L 1200,225 M 0,300 L 1200,300 M 0,375 L 1200,375 M 0,450 L 1200,450 M 0,525 L 1200,525 M 0,600 L 1200,600" />
    <path d="M 100,0 L 100,675 M 200,0 L 200,675 M 300,0 L 300,675 M 400,0 L 400,675 M 500,0 L 500,675 M 600,0 L 600,675 M 675,0 L 675,675 M 750,0 L 750,675 M 825,0 L 825,675 M 900,0 L 900,675 M 1000,0 L 1000,675 M 1100,0 L 1100,675" />
  </g>

  <!-- Title Section -->
  <rect x="80" y="60" width="120" height="4" rx="2" fill="url(#combinedFlow)" />
  <text x="80" y="105" font-family="'Inter', sans-serif" font-weight="900" font-size="34" fill="#ffffff" letter-spacing="-0.03em">Multi-Modal LLM Internals</text>
  <text x="80" y="132" font-family="'Inter', sans-serif" font-weight="500" font-size="15" fill="#64748b" letter-spacing="0.05em">HOW VLMS MERGE IMAGE PIXELS WITH TEXT TOKENS</text>

  <!-- Ambient Glow Behind Fusion Area -->
  <circle cx="680" cy="380" r="140" fill="#8b5cf6" opacity="0.08" filter="url(#glow)" />
  <circle cx="340" cy="240" r="100" fill="#ec4899" opacity="0.04" filter="url(#glow)" />
  <circle cx="340" cy="500" r="100" fill="#3b82f6" opacity="0.04" filter="url(#glow)" />

  <!-- ================= IMAGE BRANCH (TOP) ================= -->
  <!-- Image Input Card -->
  <g transform="translate(80, 200)">
    <rect width="110" height="90" rx="10" fill="#141724" stroke="rgba(236, 72, 153, 0.4)" stroke-width="1.5" />
    <path d="M 15,65 L 45,35 L 70,60 L 80,50 L 95,65" stroke="#ec4899" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" />
    <circle cx="35" cy="30" r="6" fill="#f472b6" />
    <rect x="15" y="72" width="80" height="6" rx="3" fill="rgba(236, 72, 153, 0.2)" />
    <text x="55" y="-12" font-family="'Inter', sans-serif" font-weight="bold" font-size="11" fill="#ec4899" text-anchor="middle" letter-spacing="0.05em">IMAGE INPUT</text>
  </g>

  <!-- Connection to Vision Encoder -->
  <path d="M 190,245 L 235,245" stroke="url(#imageFlow)" stroke-width="2.5" fill="none" />

  <!-- Vision Encoder (ViT) Box -->
  <g transform="translate(240, 190)">
    <rect width="160" height="110" rx="12" fill="url(#vitGrad)" stroke="#ec4899" stroke-width="2" />
    <text x="80" y="32" font-family="'Inter', sans-serif" font-weight="800" font-size="14" fill="#ffffff" text-anchor="middle">Vision Encoder</text>
    <text x="80" y="50" font-family="monospace" font-size="10" fill="#f472b6" text-anchor="middle">ViT (CLIP / SigLIP)</text>
    
    <!-- Visual Patches Representation -->
    <g transform="translate(30, 65)">
      <rect x="0" y="0" width="20" height="20" rx="4" fill="rgba(236, 72, 153, 0.3)" stroke="#ec4899" stroke-width="1" />
      <rect x="26" y="0" width="20" height="20" rx="4" fill="rgba(236, 72, 153, 0.5)" stroke="#ec4899" stroke-width="1" />
      <rect x="52" y="0" width="20" height="20" rx="4" fill="rgba(236, 72, 153, 0.2)" stroke="#ec4899" stroke-width="1" />
      <rect x="78" y="0" width="20" height="20" rx="4" fill="rgba(236, 72, 153, 0.4)" stroke="#ec4899" stroke-width="1" />
      <text x="106" y="14" font-family="'Inter', sans-serif" font-size="12" fill="#9ca3af">...</text>
    </g>
  </g>

  <!-- Connection: ViT to Projector -->
  <path d="M 400,245 L 445,245" stroke="url(#imageFlow)" stroke-width="2.5" fill="none" />
  <text x="422" y="235" font-family="monospace" font-size="9" fill="#a855f7" text-anchor="middle">d_vision</text>

  <!-- Projector (MLP) Box -->
  <g transform="translate(450, 205)">
    <rect width="130" height="80" rx="12" fill="url(#projGrad)" stroke="#a855f7" stroke-width="2" />
    <text x="65" y="34" font-family="'Inter', sans-serif" font-weight="800" font-size="13" fill="#ffffff" text-anchor="middle">Projector</text>
    <text x="65" y="52" font-family="monospace" font-size="10" fill="#c084fc" text-anchor="middle">MLP / Resampler</text>
  </g>

  <!-- Connection: Projector to Fusion -->
  <path d="M 580,245 C 640,245 640,315 670,335" stroke="url(#combinedFlow)" stroke-width="2.5" fill="none" />
  <text x="635" y="260" font-family="monospace" font-size="9" fill="#8b5cf6" text-anchor="middle">d_model</text>

  <!-- ================= TEXT BRANCH (BOTTOM) ================= -->
  <!-- Text Input Card -->
  <g transform="translate(80, 450)">
    <rect width="110" height="90" rx="10" fill="#141724" stroke="rgba(59, 130, 246, 0.4)" stroke-width="1.5" />
    <text x="15" y="32" font-family="monospace" font-weight="bold" font-size="13" fill="#93c5fd">&lt;image&gt;</text>
    <text x="15" y="52" font-family="'Inter', sans-serif" font-size="11" fill="#f3f4f6">Describe</text>
    <text x="15" y="68" font-family="'Inter', sans-serif" font-size="11" fill="#f3f4f6">this image...</text>
    <text x="55" y="-12" font-family="'Inter', sans-serif" font-weight="bold" font-size="11" fill="#3b82f6" text-anchor="middle" letter-spacing="0.05em">TEXT INPUT</text>
  </g>

  <!-- Connection to Tokenizer -->
  <path d="M 190,495 L 235,495" stroke="url(#textFlow)" stroke-width="2.5" fill="none" />

  <!-- Tokenizer / Embedding Box -->
  <g transform="translate(240, 440)">
    <rect width="160" height="110" rx="12" fill="url(#llmGrad)" stroke="#3b82f6" stroke-width="2" />
    <text x="80" y="32" font-family="'Inter', sans-serif" font-weight="800" font-size="14" fill="#ffffff" text-anchor="middle">Tokenizer &amp; Embed</text>
    <text x="80" y="50" font-family="monospace" font-size="10" fill="#60a5fa" text-anchor="middle">Lookup Table</text>
    
    <!-- Token representation blocks -->
    <g transform="translate(18, 65)">
      <rect x="0" y="0" width="22" height="20" rx="4" fill="rgba(59, 130, 2 blue, 0.15)" stroke="#3b82f6" stroke-width="1" />
      <text x="11" y="14" font-family="monospace" font-weight="bold" font-size="10" fill="#93c5fd" text-anchor="middle">IMG</text>
      <rect x="27" y="0" width="22" height="20" rx="4" fill="rgba(59, 130, 246, 0.3)" stroke="#3b82f6" stroke-width="1" />
      <text x="38" y="14" font-family="monospace" font-size="9" fill="#ffffff" text-anchor="middle">Des</text>
      <rect x="54" y="0" width="22" height="20" rx="4" fill="rgba(59, 130, 246, 0.4)" stroke="#3b82f6" stroke-width="1" />
      <text x="65" y="14" font-family="monospace" font-size="9" fill="#ffffff" text-anchor="middle">crib</text>
      <rect x="81" y="0" width="22" height="20" rx="4" fill="rgba(59, 130, 246, 0.2)" stroke="#3b82f6" stroke-width="1" />
      <text x="92" y="14" font-family="monospace" font-size="9" fill="#ffffff" text-anchor="middle">e...</text>
    </g>
  </g>

  <!-- Connection to Fusion -->
  <path d="M 400,495 C 480,495 620,495 670,395" stroke="url(#textFlow)" stroke-width="2.5" fill="none" />
  <text x="535" y="510" font-family="monospace" font-size="9" fill="#6366f1" text-anchor="middle">d_model</text>


  <!-- ================= FUSION & LLM DECODER (RIGHT) ================= -->
  
  <!-- Combined Embeddings Block -->
  <g transform="translate(680, 310)">
    <!-- Group frame -->
    <rect x="-10" y="-10" width="105" height="120" rx="10" fill="rgba(255,255,255,0.02)" stroke="rgba(255, 255, 255, 0.08)" stroke-width="1.5" />
    <text x="42.5" y="-18" font-family="'Inter', sans-serif" font-weight="bold" font-size="10" fill="#a855f7" text-anchor="middle">FUSION SEQUENCE</text>

    <!-- Visual Embeddings (Pink) -->
    <rect x="5" y="5" width="75" height="15" rx="4" fill="url(#imageFlow)" />
    <text x="42.5" y="16" font-family="monospace" font-weight="bold" font-size="9" fill="#ffffff" text-anchor="middle">Visual Token 1</text>
    <rect x="5" y="24" width="75" height="15" rx="4" fill="url(#imageFlow)" opacity="0.8" />
    <text x="42.5" y="35" font-family="monospace" font-weight="bold" font-size="9" fill="#ffffff" text-anchor="middle">Visual Token 2</text>
    
    <text x="42.5" y="54" font-family="monospace" font-size="12" fill="#9ca3af" text-anchor="middle">...</text>

    <!-- Text Embeddings (Blue) -->
    <rect x="5" y="65" width="75" height="15" rx="4" fill="url(#textFlow)" />
    <text x="42.5" y="76" font-family="monospace" font-weight="bold" font-size="9" fill="#ffffff" text-anchor="middle">"Describe"</text>
    <rect x="5" y="84" width="75" height="15" rx="4" fill="url(#textFlow)" opacity="0.8" />
    <text x="42.5" y="95" font-family="monospace" font-weight="bold" font-size="9" fill="#ffffff" text-anchor="middle">"this image"</text>
  </g>

  <!-- Connection: Fusion Sequence to LLM Transformer -->
  <path d="M 775,365 L 835,365" stroke="url(#combinedFlow)" stroke-width="3" fill="none" />

  <!-- LLM Decoder Crate -->
  <g transform="translate(840, 260)">
    <!-- Glowing outline -->
    <rect x="-6" y="-6" width="232" height="212" rx="18" fill="none" stroke="#d946ef" stroke-width="2" opacity="0.25" filter="url(#weakGlow)" />
    <!-- Box -->
    <rect width="220" height="200" rx="14" fill="#13141f" stroke="url(#combinedFlow)" stroke-width="2.5" />
    
    <text x="110" y="35" font-family="'Inter', sans-serif" font-weight="900" font-size="16" fill="#ffffff" text-anchor="middle" letter-spacing="-0.02em">Text LLM</text>
    <text x="110" y="54" font-family="monospace" font-size="11" fill="#8b5cf6" text-anchor="middle">Transformer Blocks</text>
    
    <!-- Self Attention Visualizer -->
    <g transform="translate(30, 80)">
      <!-- Input nodes -->
      <circle cx="10" cy="15" r="5" fill="#ec4899" />
      <circle cx="10" cy="45" r="5" fill="#a855f7" />
      <circle cx="10" cy="75" r="5" fill="#3b82f6" />
      
      <!-- Attention Lines -->
      <path d="M 15,15 L 145,15 M 15,15 L 145,45 M 15,15 L 145,75 M 15,45 L 145,15 M 15,45 L 145,45 M 15,45 L 145,75 M 15,75 L 145,15 M 15,75 L 145,45 M 15,75 L 145,75" stroke="rgba(139, 92, 246, 0.25)" stroke-width="1.5" />
      
      <!-- Output nodes -->
      <circle cx="150" cy="15" r="5" fill="#8b5cf6" />
      <circle cx="150" cy="45" r="5" fill="#8b5cf6" />
      <circle cx="150" cy="75" r="5" fill="#8b5cf6" />
      
      <!-- Box text labels -->
      <text x="-15" y="-12" font-family="'Inter', sans-serif" font-weight="bold" font-size="8" fill="#64748b">INPUTS</text>
      <text x="140" y="-12" font-family="'Inter', sans-serif" font-weight="bold" font-size="8" fill="#64748b">ATTENTION</text>
    </g>

    <!-- GGUF mmproj Split reference label -->
    <rect x="25" y="160" width="170" height="24" rx="6" fill="rgba(139, 92, 246, 0.12)" stroke="#8b5cf6" stroke-width="1" />
    <text x="110" y="175" font-family="monospace" font-size="9" fill="#c084fc" text-anchor="middle">mmproj integration (GGUF)</text>
  </g>

  <!-- Output Arrow and Text Box -->
  <path d="M 1060,360 L 1100,360" stroke="#d946ef" stroke-width="2.5" fill="none" />
  
  <!-- Text Output display -->
  <g transform="translate(1105, 335)">
    <circle cx="15" cy="25" r="12" fill="#10b981" />
    <!-- Checkmark inside -->
    <path d="M 10,25 L 14,29 L 20,20" stroke="#ffffff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" />
  </g>
</svg>
