<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1b26;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#24283b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7dcfff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#bb9af7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="pageGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1f2335;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#292e42;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="4" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.4"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="675" fill="url(#bgGradient)"/>

  <!-- Subtle grid lines -->
  <g opacity="0.04" stroke="#c0caf5" stroke-width="1">
    <line x1="0" y1="135" x2="1200" y2="135"/>
    <line x1="0" y1="270" x2="1200" y2="270"/>
    <line x1="0" y1="405" x2="1200" y2="405"/>
    <line x1="0" y1="540" x2="1200" y2="540"/>
    <line x1="240" y1="0" x2="240" y2="675"/>
    <line x1="480" y1="0" x2="480" y2="675"/>
    <line x1="720" y1="0" x2="720" y2="675"/>
    <line x1="960" y1="0" x2="960" y2="675"/>
  </g>

  <!-- Accent bar -->
  <rect x="50" y="50" width="120" height="4" fill="url(#accentGradient)" rx="2"/>

  <!-- Title -->
  <text x="600" y="92" font-family="Arial, sans-serif" font-size="38" font-weight="bold" fill="#c0caf5" text-anchor="middle">用 Iced 打造漫畫閱讀器</text>
  <text x="600" y="124" font-family="Arial, sans-serif" font-size="18" fill="rgba(192,202,245,0.5)" text-anchor="middle">Arc&lt;dyn Trait&gt;  ·  LRU Cache  ·  Async Preload with smol</text>

  <!-- ===== COMIC VIEWER APP WINDOW ===== -->
  <g transform="translate(200, 148)" filter="url(#shadow)">
    <!-- Window shadow -->
    <rect x="4" y="6" width="620" height="430" rx="10" fill="rgba(0,0,0,0.4)"/>
    <!-- Window frame -->
    <rect x="0" y="0" width="620" height="430" rx="10" fill="#1a1b26" stroke="#414868" stroke-width="1.5"/>

    <!-- Header bar -->
    <rect x="0" y="0" width="620" height="44" rx="10" fill="#16161e"/>
    <rect x="0" y="34" width="620" height="10" fill="#16161e"/>
    <!-- Window dots -->
    <circle cx="20" cy="22" r="6" fill="#f7768e" opacity="0.8"/>
    <circle cx="38" cy="22" r="6" fill="#e0af68" opacity="0.8"/>
    <circle cx="56" cy="22" r="6" fill="#9ece6a" opacity="0.8"/>
    <!-- Open button -->
    <rect x="76" y="11" width="88" height="22" rx="4" fill="#414868"/>
    <text x="120" y="26" font-family="Arial, sans-serif" font-size="11" fill="#c0caf5" text-anchor="middle">Open Comic</text>
    <!-- Title in header -->
    <text x="310" y="26" font-family="Arial, sans-serif" font-size="12" fill="#c0caf5" text-anchor="middle">BERSERK Vol.01.cbz</text>
    <!-- Page counter -->
    <text x="590" y="26" font-family="Arial, sans-serif" font-size="11" fill="#7dcfff" text-anchor="end">3 / 24</text>

    <!-- Comic page area -->
    <rect x="0" y="44" width="620" height="342" fill="#1a1b26"/>

    <!-- Stylized comic page panels -->
    <g transform="translate(110, 54)">
      <!-- Panel layout: large top, two bottom -->
      <!-- Top large panel -->
      <rect x="0" y="0" width="400" height="180" rx="3" fill="url(#pageGradient)" stroke="#414868" stroke-width="1.5"/>
      <!-- Sky / background in panel -->
      <rect x="4" y="4" width="392" height="172" rx="2" fill="#1c2a3a"/>
      <!-- Silhouette figure in top panel -->
      <ellipse cx="200" cy="100" rx="25" ry="35" fill="#16161e"/>
      <rect x="190" y="130" width="20" height="40" fill="#16161e"/>
      <!-- Dramatic lines radiating from figure -->
      <g stroke="#2a3a4a" stroke-width="1" opacity="0.6">
        <line x1="200" y1="90" x2="20" y2="10"/>
        <line x1="200" y1="90" x2="100" y2="4"/>
        <line x1="200" y1="90" x2="300" y2="4"/>
        <line x1="200" y1="90" x2="390" y2="10"/>
        <line x1="200" y1="90" x2="390" y2="90"/>
        <line x1="200" y1="90" x2="20" y2="90"/>
        <line x1="200" y1="90" x2="10" y2="170"/>
        <line x1="200" y1="90" x2="390" y2="170"/>
      </g>
      <!-- Glow effect around figure -->
      <ellipse cx="200" cy="115" rx="40" ry="50" fill="none" stroke="#7dcfff" stroke-width="0.8" opacity="0.4"/>

      <!-- Speech bubble -->
      <ellipse cx="310" cy="50" rx="60" ry="28" fill="#c0caf5" opacity="0.9"/>
      <polygon points="280,68 268,85 296,72" fill="#c0caf5" opacity="0.9"/>
      <text x="310" y="44" font-family="Arial, sans-serif" font-size="9" fill="#1a1b26" text-anchor="middle" font-weight="bold">ドラゴンスレイヤー!</text>
      <text x="310" y="58" font-family="Arial, sans-serif" font-size="8" fill="#1a1b26" text-anchor="middle">これが俺の剣だ!</text>

      <!-- Bottom left panel -->
      <rect x="0" y="188" width="195" height="130" rx="3" fill="url(#pageGradient)" stroke="#414868" stroke-width="1.5"/>
      <rect x="4" y="192" width="187" height="122" rx="2" fill="#1c2835"/>
      <!-- Close-up face -->
      <ellipse cx="100" cy="255" rx="40" ry="45" fill="#2a3040"/>
      <!-- Eyes -->
      <ellipse cx="84" cy="245" rx="8" ry="6" fill="#16161e"/>
      <ellipse cx="116" cy="245" rx="8" ry="6" fill="#16161e"/>
      <circle cx="86" cy="243" r="2" fill="#7dcfff" opacity="0.8"/>
      <circle cx="118" cy="243" r="2" fill="#7dcfff" opacity="0.8"/>
      <!-- Intense expression lines -->
      <line x1="60" y1="235" x2="74" y2="242" stroke="#414868" stroke-width="1.5"/>
      <line x1="140" y1="235" x2="126" y2="242" stroke="#414868" stroke-width="1.5"/>
      <!-- Effect lines -->
      <g stroke="#2a3a4a" stroke-width="0.8" opacity="0.5">
        <line x1="100" y1="255" x2="10" y2="200"/>
        <line x1="100" y1="255" x2="10" y2="310"/>
        <line x1="100" y1="255" x2="192" y2="200"/>
        <line x1="100" y1="255" x2="192" y2="310"/>
      </g>

      <!-- Bottom right panel -->
      <rect x="205" y="188" width="195" height="130" rx="3" fill="url(#pageGradient)" stroke="#414868" stroke-width="1.5"/>
      <rect x="209" y="192" width="187" height="122" rx="2" fill="#1e2630"/>
      <!-- Action scene - sword slash -->
      <path d="M 220,195 L 395,310" stroke="#e0af68" stroke-width="3" opacity="0.9"/>
      <path d="M 220,195 L 395,310" stroke="#fff" stroke-width="1" opacity="0.5"/>
      <!-- Impact lines -->
      <g stroke="#ff9e64" stroke-width="1.2" opacity="0.6">
        <line x1="300" y1="250" x2="240" y2="220"/>
        <line x1="300" y1="250" x2="250" y2="195"/>
        <line x1="300" y1="250" x2="370" y2="210"/>
        <line x1="300" y1="250" x2="395" y2="235"/>
        <line x1="300" y1="250" x2="370" y2="310"/>
        <line x1="300" y1="250" x2="245" y2="310"/>
      </g>
      <!-- SLASH text -->
      <text x="303" y="258" font-family="Arial Black, sans-serif" font-size="22" font-weight="bold" fill="#ff9e64" text-anchor="middle" opacity="0.85" transform="rotate(-35, 303, 258)">SLASH!</text>
    </g>

    <!-- Nav bar -->
    <rect x="0" y="386" width="620" height="44" rx="0" fill="#16161e"/>
    <rect x="0" y="386" width="620" height="10" fill="#16161e"/>
    <!-- Nav buttons -->
    <rect x="200" y="395" width="90" height="26" rx="4" fill="#414868"/>
    <text x="245" y="412" font-family="Arial, sans-serif" font-size="11" fill="#c0caf5" text-anchor="middle">◄ Previous</text>
    <rect x="330" y="395" width="90" height="26" rx="4" fill="#414868"/>
    <text x="375" y="412" font-family="Arial, sans-serif" font-size="11" fill="#c0caf5" text-anchor="middle">Next ►</text>

    <!-- Bottom rounded corners -->
    <rect x="0" y="420" width="620" height="10" rx="0" fill="#16161e"/>
    <rect x="0" y="420" width="620" height="10" rx="10" fill="#1a1b26"/>
  </g>

  <!-- ===== FORMAT BADGES (left side) ===== -->
  <g transform="translate(50, 200)">
    <text x="65" y="-10" font-family="Arial, sans-serif" font-size="13" fill="rgba(192,202,245,0.5)" text-anchor="middle">格式支援</text>

    <!-- CBZ badge -->
    <g transform="translate(0, 10)">
      <rect x="0" y="0" width="130" height="50" rx="8" fill="rgba(125,207,255,0.1)" stroke="#7dcfff" stroke-width="1.5"/>
      <text x="65" y="20" font-family="monospace" font-size="18" font-weight="bold" fill="#7dcfff" text-anchor="middle">.cbz</text>
      <text x="65" y="38" font-family="Arial, sans-serif" font-size="10" fill="rgba(125,207,255,0.7)" text-anchor="middle">ZIP · random access</text>
    </g>

    <!-- CB7 badge -->
    <g transform="translate(0, 78)">
      <rect x="0" y="0" width="130" height="50" rx="8" fill="rgba(187,154,247,0.1)" stroke="#bb9af7" stroke-width="1.5"/>
      <text x="65" y="20" font-family="monospace" font-size="18" font-weight="bold" fill="#bb9af7" text-anchor="middle">.cb7</text>
      <text x="65" y="38" font-family="Arial, sans-serif" font-size="10" fill="rgba(187,154,247,0.7)" text-anchor="middle">7-Zip · preload all</text>
    </g>

    <!-- CBR badge (stub) -->
    <g transform="translate(0, 146)">
      <rect x="0" y="0" width="130" height="50" rx="8" fill="rgba(247,118,142,0.08)" stroke="#f7768e" stroke-width="1.5" stroke-dasharray="6,3"/>
      <text x="65" y="20" font-family="monospace" font-size="18" font-weight="bold" fill="#f7768e" text-anchor="middle" opacity="0.7">.cbr</text>
      <text x="65" y="38" font-family="Arial, sans-serif" font-size="10" fill="rgba(247,118,142,0.5)" text-anchor="middle">stub · not supported</text>
    </g>

    <!-- Arc<dyn ComicReader> label -->
    <g transform="translate(0, 216)">
      <rect x="0" y="0" width="130" height="38" rx="6" fill="rgba(224,175,104,0.12)" stroke="#e0af68" stroke-width="1.5"/>
      <text x="65" y="15" font-family="monospace" font-size="9" fill="#e0af68" text-anchor="middle">Arc&lt;dyn</text>
      <text x="65" y="28" font-family="monospace" font-size="9" fill="#e0af68" text-anchor="middle">ComicReader&gt;</text>
    </g>
  </g>

  <!-- ===== PAGE CACHE VISUALIZATION (right side) ===== -->
  <g transform="translate(880, 155)">
    <text x="105" y="-10" font-family="Arial, sans-serif" font-size="13" fill="rgba(192,202,245,0.5)" text-anchor="middle">頁面快取 (cap=7)</text>

    <!-- Cache slots -->
    <!-- Page 1 (loaded, not current) -->
    <g transform="translate(0, 10)">
      <rect x="0" y="0" width="210" height="36" rx="6" fill="rgba(158,206,106,0.15)" stroke="#9ece6a" stroke-width="1.5"/>
      <text x="16" y="23" font-family="monospace" font-size="12" fill="#9ece6a">page[1]</text>
      <text x="130" y="23" font-family="monospace" font-size="10" fill="rgba(158,206,106,0.7)">preloaded</text>
    </g>
    <!-- Page 2 (loaded, not current) -->
    <g transform="translate(0, 54)">
      <rect x="0" y="0" width="210" height="36" rx="6" fill="rgba(158,206,106,0.15)" stroke="#9ece6a" stroke-width="1.5"/>
      <text x="16" y="23" font-family="monospace" font-size="12" fill="#9ece6a">page[2]</text>
      <text x="130" y="23" font-family="monospace" font-size="10" fill="rgba(158,206,106,0.7)">preloaded</text>
    </g>
    <!-- Page 3 (CURRENT) -->
    <g transform="translate(0, 98)">
      <rect x="0" y="0" width="210" height="36" rx="6" fill="rgba(125,207,255,0.25)" stroke="#7dcfff" stroke-width="2"/>
      <text x="16" y="23" font-family="monospace" font-size="12" fill="#7dcfff" font-weight="bold">page[3]</text>
      <text x="118" y="23" font-family="monospace" font-size="10" fill="#7dcfff">← current</text>
    </g>
    <!-- Page 4 (loaded, not current) -->
    <g transform="translate(0, 142)">
      <rect x="0" y="0" width="210" height="36" rx="6" fill="rgba(158,206,106,0.15)" stroke="#9ece6a" stroke-width="1.5"/>
      <text x="16" y="23" font-family="monospace" font-size="12" fill="#9ece6a">page[4]</text>
      <text x="130" y="23" font-family="monospace" font-size="10" fill="rgba(158,206,106,0.7)">preloaded</text>
    </g>
    <!-- Page 5 (loaded, not current) -->
    <g transform="translate(0, 186)">
      <rect x="0" y="0" width="210" height="36" rx="6" fill="rgba(158,206,106,0.15)" stroke="#9ece6a" stroke-width="1.5"/>
      <text x="16" y="23" font-family="monospace" font-size="12" fill="#9ece6a">page[5]</text>
      <text x="130" y="23" font-family="monospace" font-size="10" fill="rgba(158,206,106,0.7)">preloaded</text>
    </g>
    <!-- Empty slot -->
    <g transform="translate(0, 230)">
      <rect x="0" y="0" width="210" height="36" rx="6" fill="rgba(65,72,104,0.2)" stroke="#414868" stroke-width="1" stroke-dasharray="5,3"/>
      <text x="16" y="23" font-family="monospace" font-size="12" fill="#414868">page[6]</text>
      <text x="130" y="23" font-family="monospace" font-size="10" fill="#414868">empty</text>
    </g>
    <!-- Empty slot -->
    <g transform="translate(0, 274)">
      <rect x="0" y="0" width="210" height="36" rx="6" fill="rgba(65,72,104,0.2)" stroke="#414868" stroke-width="1" stroke-dasharray="5,3"/>
      <text x="16" y="23" font-family="monospace" font-size="12" fill="#414868">page[7]</text>
      <text x="130" y="23" font-family="monospace" font-size="10" fill="#414868">empty</text>
    </g>

    <!-- Eviction label -->
    <text x="105" y="336" font-family="Arial, sans-serif" font-size="11" fill="rgba(192,202,245,0.35)" text-anchor="middle">evict: max abs_diff(page, current)</text>
  </g>

  <!-- Arrow from window to cache -->
  <g opacity="0.4">
    <line x1="822" y1="290" x2="878" y2="290" stroke="#7dcfff" stroke-width="1.5" stroke-dasharray="5,3"/>
    <polygon points="880,290 873,286 873,294" fill="#7dcfff"/>
  </g>

  <!-- ===== TECH TAGS (bottom) ===== -->
  <g transform="translate(600, 610)">
    <g transform="translate(-260, 0)">
      <rect x="-44" y="-18" width="88" height="36" rx="6" fill="rgba(255,158,100,0.15)" stroke="#ff9e64" stroke-width="2"/>
      <text x="0" y="5" font-family="monospace" font-size="15" fill="#ff9e64" text-anchor="middle">Rust</text>
    </g>
    <g transform="translate(-150, 0)">
      <rect x="-40" y="-18" width="80" height="36" rx="6" fill="rgba(125,207,255,0.15)" stroke="#7dcfff" stroke-width="2"/>
      <text x="0" y="5" font-family="monospace" font-size="15" fill="#7dcfff" text-anchor="middle">Iced</text>
    </g>
    <g transform="translate(-50, 0)">
      <rect x="-38" y="-18" width="76" height="36" rx="6" fill="rgba(187,154,247,0.15)" stroke="#bb9af7" stroke-width="2"/>
      <text x="0" y="5" font-family="monospace" font-size="15" fill="#bb9af7" text-anchor="middle">GUI</text>
    </g>
    <g transform="translate(50, 0)">
      <rect x="-44" y="-18" width="88" height="36" rx="6" fill="rgba(158,206,106,0.15)" stroke="#9ece6a" stroke-width="2"/>
      <text x="0" y="5" font-family="monospace" font-size="15" fill="#9ece6a" text-anchor="middle">smol</text>
    </g>
    <g transform="translate(155, 0)">
      <rect x="-50" y="-18" width="100" height="36" rx="6" fill="rgba(224,175,104,0.15)" stroke="#e0af68" stroke-width="2"/>
      <text x="0" y="5" font-family="monospace" font-size="15" fill="#e0af68" text-anchor="middle">async</text>
    </g>
    <g transform="translate(265, 0)">
      <rect x="-44" y="-18" width="88" height="36" rx="6" fill="rgba(125,207,255,0.15)" stroke="#7dcfff" stroke-width="2"/>
      <text x="0" y="5" font-family="monospace" font-size="15" fill="#7dcfff" text-anchor="middle">MVU</text>
    </g>
  </g>

  <!-- Branding -->
  <text x="1160" y="648" font-family="Arial, sans-serif" font-size="16" fill="rgba(255,255,255,0.35)" text-anchor="end">blog.simplypatrick.com</text>
</svg>
