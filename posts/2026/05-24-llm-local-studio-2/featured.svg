<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1b26;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#24283b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="rustGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b35;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f7931e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="axumGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7aa2f7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#bb9af7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="sseGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#9ece6a;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#73daca;stop-opacity:0.8" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7aa2f7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#bb9af7;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="675" fill="url(#bgGradient)" />

  <!-- Subtle grid -->
  <g opacity="0.05">
    <line x1="0" y1="0" x2="1200" y2="675" stroke="#7aa2f7" stroke-width="0.5" />
    <line x1="200" y1="0" x2="1200" y2="500" stroke="#7aa2f7" stroke-width="0.5" />
    <line x1="0" y1="200" x2="1000" y2="675" stroke="#7aa2f7" stroke-width="0.5" />
    <line x1="400" y1="0" x2="1200" y2="400" stroke="#7aa2f7" stroke-width="0.5" />
    <line x1="0" y1="400" x2="800" y2="675" stroke="#7aa2f7" stroke-width="0.5" />
  </g>

  <!-- Accent bar -->
  <rect x="50" y="50" width="120" height="4" fill="url(#accentGradient)" rx="2" />

  <!-- Left side: Client UI Request (Web/API chat) -->
  <g transform="translate(80, 100)">
    <!-- Terminal/Client window -->
    <rect x="0" y="0" width="480" height="280" rx="12" fill="rgba(30, 32, 48, 0.9)" stroke="rgba(122, 162, 247, 0.3)" stroke-width="1.5" />
    <!-- Title bar -->
    <rect x="0" y="0" width="480" height="32" rx="12" fill="rgba(55, 60, 85, 0.8)" />
    <rect x="0" y="12" width="480" height="20" fill="rgba(55, 60, 85, 0.8)" />
    <circle cx="20" cy="16" r="5" fill="#ff5f56" opacity="0.8" />
    <circle cx="38" cy="16" r="5" fill="#ffbd2e" opacity="0.8" />
    <circle cx="56" cy="16" r="5" fill="#27c93f" opacity="0.8" />
    <text x="240" y="20" font-family="monospace" font-size="12" fill="rgba(122, 162, 247, 0.7)" text-anchor="middle">client (HTTP POST /v1/chat/completions)</text>

    <!-- Request JSON -->
    <text y="58" font-family="monospace" font-size="11" fill="rgba(255, 255, 255, 0.8)">
      <tspan x="16" dy="0" fill="#f7768e">JSON Payload:</tspan>
      <tspan x="16" dy="18" fill="#e0af68">{</tspan>
      <tspan x="32" dy="16">"model": <tspan fill="#9ece6a">"llama-3-8b"</tspan>,</tspan>
      <tspan x="32" dy="16">"messages": [</tspan>
      <tspan x="48" dy="16">{<tspan fill="#7aa2f7">"role"</tspan>: <tspan fill="#9ece6a">"user"</tspan>, <tspan fill="#7aa2f7">"content"</tspan>: <tspan fill="#9ece6a">"What is Rust?"</tspan>}</tspan>
      <tspan x="32" dy="16">],</tspan>
      <tspan x="32" dy="16" fill="#bb9af7">"stream": true</tspan>
      <tspan x="16" dy="16" fill="#e0af68">}</tspan>
    </text>

    <!-- Visual stream indicators -->
    <g transform="translate(16, 185)">
      <rect x="0" y="0" width="448" height="75" rx="6" fill="rgba(115, 218, 202, 0.08)" stroke="rgba(115, 218, 202, 0.2)" stroke-width="1" />
      <text x="12" y="22" font-family="monospace" font-size="11" fill="#73daca">SSE Event Stream:</text>
      <text x="12" y="40" font-family="monospace" font-size="10" fill="#9ece6a">data: {"choices":[{"delta":{"role":"assistant"}}]}<animate attributeName="opacity" values="1;0.4;1" dur="2s" repeatCount="indefinite" /></text>
      <text x="12" y="55" font-family="monospace" font-size="10" fill="#9ece6a">data: {"choices":[{"delta":{"content":"Rust "}}]}</text>
    </g>
  </g>

  <!-- Right side: Axum HTTP Service + FFI Thread boundary -->
  <g transform="translate(610, 100)">
    <!-- Server Window -->
    <rect x="0" y="0" width="510" height="280" rx="12" fill="rgba(30, 32, 48, 0.9)" stroke="rgba(187, 154, 247, 0.3)" stroke-width="1.5" />
    <!-- Title bar -->
    <rect x="0" y="0" width="510" height="32" rx="12" fill="rgba(55, 60, 85, 0.8)" />
    <rect x="0" y="12" width="510" height="20" fill="rgba(55, 60, 85, 0.8)" />
    <circle cx="20" cy="16" r="5" fill="#ff5f56" opacity="0.8" />
    <circle cx="38" cy="16" r="5" fill="#ffbd2e" opacity="0.8" />
    <circle cx="56" cy="16" r="5" fill="#27c93f" opacity="0.8" />
    <text x="255" y="20" font-family="monospace" font-size="12" fill="rgba(187, 154, 247, 0.7)" text-anchor="middle">llm-local-studio-server (Axum + FFI)</text>

    <!-- Code outline in server -->
    <text y="58" font-family="monospace" font-size="11" fill="rgba(255, 255, 255, 0.8)">
      <tspan x="16" dy="0" fill="#bb9af7">pub async fn</tspan> <tspan fill="#7aa2f7">chat_completions</tspan>(State(engine): State&lt;EngineService&gt;)
      <tspan x="16" dy="18" fill="#bb9af7">let</tspan> (rx, handle) = engine.chat_streaming(messages...);
      <tspan x="16" dy="18" fill="#bb9af7">let</tspan> sse = Sse::new( ReceiverStream::new(rx)... );
    </text>

    <!-- Async to blocking task illustration -->
    <g transform="translate(16, 125)">
      <rect x="0" y="0" width="478" height="135" rx="8" fill="rgba(36, 40, 59, 0.9)" stroke="rgba(255, 107, 53, 0.3)" stroke-width="1" />
      
      <!-- Tokio Async side -->
      <rect x="12" y="12" width="200" height="110" rx="6" fill="rgba(122, 162, 247, 0.1)" stroke="#7aa2f7" stroke-width="1" />
      <text x="112" y="28" font-family="monospace" font-size="11" fill="#7aa2f7" text-anchor="middle">Tokio Async Thread</text>
      <text x="24" y="52" font-family="sans-serif" font-size="10" fill="rgba(255, 255, 255, 0.6)">- Axum 0.7 HTTP Router</text>
      <text x="24" y="70" font-family="sans-serif" font-size="10" fill="rgba(255, 255, 255, 0.6)">- Non-blocking SSE output</text>
      <text x="24" y="88" font-family="sans-serif" font-size="10" fill="rgba(255, 255, 255, 0.6)">- Receives tokens from mpsc</text>

      <!-- Connection arrow -->
      <path d="M 218 67 L 254 67" stroke="#ff9e64" stroke-width="2" marker-end="url(#arrow)" />
      <text x="236" y="58" font-family="monospace" font-size="8" fill="#ff9e64" text-anchor="middle">spawn</text>

      <!-- Blocking CPU FFI side -->
      <rect x="260" y="12" width="206" height="110" rx="6" fill="rgba(255, 107, 53, 0.1)" stroke="#ff6b35" stroke-width="1" />
      <text x="363" y="28" font-family="monospace" font-size="11" fill="#ff6b35" text-anchor="middle">spawn_blocking + Mutex</text>
      <text x="272" y="52" font-family="sans-serif" font-size="10" fill="rgba(255, 255, 255, 0.6)">- Safe Mutex lock guard</text>
      <text x="272" y="70" font-family="sans-serif" font-size="10" fill="rgba(255, 255, 255, 0.6)">- llama_cpp FFI inference</text>
      <text x="272" y="88" font-family="sans-serif" font-size="10" fill="rgba(255, 255, 255, 0.6)">- Blocking callbacks to mpsc</text>
    </g>
  </g>

  <!-- Center: Architecture flow diagram -->
  <g transform="translate(80, 420)">
    <!-- Flow boxes -->
    <rect x="0" y="0" width="140" height="52" rx="8" fill="rgba(122, 162, 247, 0.15)" stroke="#7aa2f7" stroke-width="1.5" />
    <text x="70" y="20" font-family="monospace" font-size="11" fill="#7aa2f7" text-anchor="middle">Client (UI/curl)</text>
    <text x="70" y="36" font-family="sans-serif" font-size="9" fill="rgba(122, 162, 247, 0.6)" text-anchor="middle">HTTP POST (stream)</text>

    <text x="155" y="28" font-family="monospace" font-size="16" fill="rgba(122, 162, 247, 0.5)">→</text>

    <rect x="172" y="0" width="160" height="52" rx="8" fill="rgba(187, 154, 247, 0.15)" stroke="#bb9af7" stroke-width="1.5" />
    <text x="252" y="20" font-family="monospace" font-size="11" fill="#bb9af7" text-anchor="middle">Axum Server</text>
    <text x="252" y="36" font-family="sans-serif" font-size="9" fill="rgba(187, 154, 247, 0.6)" text-anchor="middle">Routes · SSE · CORS</text>

    <text x="347" y="28" font-family="monospace" font-size="16" fill="rgba(187, 154, 247, 0.5)">→</text>

    <rect x="364" y="0" width="160" height="52" rx="8" fill="rgba(224, 175, 104, 0.15)" stroke="#e0af68" stroke-width="1.5" />
    <text x="444" y="20" font-family="monospace" font-size="11" fill="#e0af68" text-anchor="middle">EngineService</text>
    <text x="444" y="36" font-family="sans-serif" font-size="9" fill="rgba(224, 175, 104, 0.6)" text-anchor="middle">Arc&lt;Mutex&lt;Engine&gt;&gt;</text>

    <text x="539" y="28" font-family="monospace" font-size="16" fill="rgba(224, 175, 104, 0.5)">→</text>

    <rect x="556" y="0" width="140" height="52" rx="8" fill="rgba(255, 107, 53, 0.15)" stroke="#ff6b35" stroke-width="1.5" />
    <text x="626" y="20" font-family="monospace" font-size="11" fill="#ff6b35" text-anchor="middle">spawn_blocking</text>
    <text x="626" y="36" font-family="sans-serif" font-size="9" fill="rgba(255, 107, 53, 0.6)" text-anchor="middle">Inference Thread</text>

    <text x="711" y="28" font-family="monospace" font-size="16" fill="rgba(255, 107, 53, 0.5)">→</text>

    <rect x="728" y="0" width="140" height="52" rx="8" fill="rgba(115, 218, 202, 0.15)" stroke="#73daca" stroke-width="1.5" />
    <text x="798" y="20" font-family="monospace" font-size="11" fill="#73daca" text-anchor="middle">mpsc Channel</text>
    <text x="798" y="36" font-family="sans-serif" font-size="9" fill="rgba(115, 218, 202, 0.6)" text-anchor="middle">Send generated token</text>

    <text x="883" y="28" font-family="monospace" font-size="16" fill="rgba(115, 218, 202, 0.5)">→</text>

    <rect x="900" y="0" width="140" height="52" rx="8" fill="rgba(158, 206, 106, 0.15)" stroke="#9ece6a" stroke-width="1.5" />
    <text x="970" y="20" font-family="monospace" font-size="11" fill="#9ece6a" text-anchor="middle">SSE Stream</text>
    <text x="970" y="36" font-family="sans-serif" font-size="9" fill="rgba(158, 206, 106, 0.6)" text-anchor="middle">Response to Client</text>
  </g>

  <!-- Title at bottom -->
  <text x="600" y="545" font-family="Arvo, serif" font-size="32" fill="rgba(255, 255, 255, 0.95)" text-anchor="middle" font-weight="bold">
    本地 LLM 工作站 (二)
  </text>
  <text x="600" y="575" font-family="sans-serif" font-size="18" fill="rgba(122, 162, 247, 0.7)" text-anchor="middle">
    Axum 串流與 OpenAI 相容 API 的實現 · Rust
  </text>

  <!-- Tech tags -->
  <g transform="translate(600, 610)">
    <g transform="translate(-160, 0)">
      <rect x="-35" y="-16" width="70" height="32" rx="6" fill="rgba(255, 107, 53, 0.2)" stroke="#ff6b35" stroke-width="1.5" />
      <text x="0" y="4" font-family="monospace" font-size="14" fill="#ff6b35" text-anchor="middle">Rust</text>
    </g>
    <g transform="translate(-60, 0)">
      <rect x="-45" y="-16" width="90" height="32" rx="6" fill="rgba(122, 162, 247, 0.2)" stroke="#7aa2f7" stroke-width="1.5" />
      <text x="0" y="4" font-family="monospace" font-size="14" fill="#7aa2f7" text-anchor="middle">Axum</text>
    </g>
    <g transform="translate(45, 0)">
      <rect x="-40" y="-16" width="80" height="32" rx="6" fill="rgba(115, 218, 202, 0.2)" stroke="#73daca" stroke-width="1.5" />
      <text x="0" y="4" font-family="monospace" font-size="14" fill="#73daca" text-anchor="middle">SSE</text>
    </g>
    <g transform="translate(160, 0)">
      <rect x="-55" y="-16" width="110" height="32" rx="6" fill="rgba(187, 154, 247, 0.2)" stroke="#bb9af7" stroke-width="1.5" />
      <text x="0" y="4" font-family="monospace" font-size="14" fill="#bb9af7" text-anchor="middle">OpenAI API</text>
    </g>
  </g>

  <!-- Branding -->
  <text x="1160" y="645" font-family="Arial, sans-serif" font-size="18" fill="rgba(255, 255, 255, 0.5)" text-anchor="end">
    blog.simplypatrick.com
  </text>
</svg>
