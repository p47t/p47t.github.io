<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1b26"/>
      <stop offset="100%" stop-color="#24283b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff9e64"/>
      <stop offset="100%" stop-color="#bb9af7"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2a2e42"/>
      <stop offset="100%" stop-color="#1f2233"/>
    </linearGradient>
    <marker id="arrow4" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#bb9af7"/>
    </marker>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <rect x="50" y="50" width="140" height="4" fill="url(#accent)" rx="2"/>

  <text x="60" y="92" font-family="monospace" font-size="14" fill="#9ece6a">tiny-llm-runner · deep dive</text>
  <text x="60" y="138" font-family="Arvo, serif" font-size="42" fill="#c0caf5" font-weight="bold">(4) model.rs</text>
  <text x="60" y="170" font-family="Arial, sans-serif" font-size="20" fill="rgba(192,202,245,0.65)">flat tensor list → structured Llama tree</text>

  <!-- Left: flat list -->
  <g transform="translate(70, 220)">
    <rect x="0" y="0" width="420" height="380" rx="12" fill="url(#card)" stroke="#7dcfff" stroke-width="2"/>
    <text x="20" y="32" font-family="monospace" font-size="14" fill="#7dcfff">// flat tensor list (GGUF)</text>
    <line x1="20" y1="46" x2="400" y2="46" stroke="rgba(125,207,255,0.2)"/>
    <g font-family="monospace" font-size="12" fill="#c0caf5">
      <text x="20" y="70">"token_embd.weight"</text>
      <text x="20" y="90">"output_norm.weight"</text>
      <text x="20" y="110">"output.weight"  <tspan fill="rgba(247,118,142,0.7)">// or tied?</tspan></text>
      <text x="20" y="140">"blk.0.attn_norm.weight"</text>
      <text x="20" y="160">"blk.0.attn_q.weight"</text>
      <text x="20" y="180">"blk.0.attn_k.weight"</text>
      <text x="20" y="200">"blk.0.attn_v.weight"</text>
      <text x="20" y="220">"blk.0.attn_output.weight"</text>
      <text x="20" y="240">"blk.0.ffn_norm.weight"</text>
      <text x="20" y="260">"blk.0.ffn_gate.weight"</text>
      <text x="20" y="280">"blk.0.ffn_up.weight"</text>
      <text x="20" y="300">"blk.0.ffn_down.weight"</text>
      <text x="20" y="324" fill="rgba(192,202,245,0.5)">"blk.1.attn_norm.weight"</text>
      <text x="20" y="344" fill="rgba(192,202,245,0.4)">... (× 22 layers)</text>
    </g>
  </g>

  <!-- arrow -->
  <path d="M 500 410 L 580 410" stroke="#bb9af7" stroke-width="3" fill="none" marker-end="url(#arrow4)"/>

  <!-- Right: tree -->
  <g transform="translate(600, 220)">
    <rect x="0" y="0" width="530" height="380" rx="12" fill="url(#card)" stroke="#9ece6a" stroke-width="2"/>
    <text x="20" y="32" font-family="monospace" font-size="14" fill="#9ece6a">struct LlamaModel&lt;'a&gt; {</text>
    <g font-family="monospace" font-size="12" fill="#c0caf5">
      <text x="40" y="62">config: LlamaConfig,</text>
      <text x="40" y="86">token_embd: TensorView&lt;'a&gt;,</text>
      <text x="40" y="110">output_norm: Vec&lt;f32&gt;,    <tspan fill="rgba(158,206,106,0.6)">// eager</tspan></text>
      <text x="40" y="134">output: TensorView&lt;'a&gt;,</text>
      <text x="40" y="158">layers: Vec&lt;LayerWeights&lt;'a&gt;&gt; {</text>
      <text x="60" y="182">attn_norm: Vec&lt;f32&gt;,  <tspan fill="rgba(158,206,106,0.6)">// eager</tspan></text>
      <text x="60" y="206">wq, wk, wv, wo:</text>
      <text x="80" y="226">TensorView&lt;'a&gt;,    <tspan fill="rgba(255,158,100,0.6)">// lazy</tspan></text>
      <text x="60" y="250">ffn_norm: Vec&lt;f32&gt;,</text>
      <text x="60" y="274">w_gate, w_up, w_down:</text>
      <text x="80" y="294">TensorView&lt;'a&gt;,</text>
      <text x="40" y="318">},</text>
    </g>
    <text x="20" y="350" font-family="monospace" font-size="14" fill="#9ece6a">}</text>
  </g>

  <!-- Tech tags -->
  <g transform="translate(600, 635)" font-family="monospace" font-size="14">
    <g transform="translate(-180, 0)">
      <rect x="-50" y="-15" width="100" height="30" rx="6" fill="rgba(255,158,100,0.18)" stroke="#ff9e64" stroke-width="1.5"/>
      <text x="0" y="5" fill="#ff9e64" text-anchor="middle">Llama</text>
    </g>
    <g transform="translate(-60, 0)">
      <rect x="-60" y="-15" width="120" height="30" rx="6" fill="rgba(125,207,255,0.18)" stroke="#7dcfff" stroke-width="1.5"/>
      <text x="0" y="5" fill="#7dcfff" text-anchor="middle">HashMap</text>
    </g>
    <g transform="translate(80, 0)">
      <rect x="-70" y="-15" width="140" height="30" rx="6" fill="rgba(187,154,247,0.18)" stroke="#bb9af7" stroke-width="1.5"/>
      <text x="0" y="5" fill="#bb9af7" text-anchor="middle">tied embeddings</text>
    </g>
  </g>

  <text x="1160" y="650" font-family="Arial, sans-serif" font-size="14" fill="rgba(255,255,255,0.5)" text-anchor="end">blog.simplypatrick.com</text>
</svg>
