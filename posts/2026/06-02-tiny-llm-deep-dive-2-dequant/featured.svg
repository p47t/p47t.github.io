<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1b26"/>
      <stop offset="100%" stop-color="#24283b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff9e64"/>
      <stop offset="100%" stop-color="#bb9af7"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2a2e42"/>
      <stop offset="100%" stop-color="#1f2233"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <rect x="50" y="50" width="140" height="4" fill="url(#accent)" rx="2"/>

  <text x="60" y="92" font-family="monospace" font-size="14" fill="#9ece6a">tiny-llm-runner · deep dive</text>
  <text x="60" y="138" font-family="Arvo, serif" font-size="42" fill="#c0caf5" font-weight="bold">(2) dequant.rs</text>
  <text x="60" y="170" font-family="Arial, sans-serif" font-size="20" fill="rgba(192,202,245,0.65)">block-wise quantization &amp; fused dot products</text>

  <!-- Q4_0 block illustration -->
  <g transform="translate(70, 220)">
    <text x="0" y="0" font-family="monospace" font-size="16" fill="#7dcfff">Q4_0 block (18 bytes = 32 elements)</text>
    <!-- scale -->
    <rect x="0" y="20" width="40" height="40" rx="4" fill="rgba(247,118,142,0.25)" stroke="#f7768e" stroke-width="1.5"/>
    <text x="20" y="46" font-family="monospace" font-size="11" fill="#f7768e" text-anchor="middle">f16</text>
    <text x="20" y="80" font-family="monospace" font-size="10" fill="rgba(247,118,142,0.7)" text-anchor="middle">scale</text>
    <!-- 16 packed bytes -->
    <g transform="translate(50, 20)">
      <g font-family="monospace" font-size="9" fill="#e0af68" text-anchor="middle">
        <g><rect x="0" y="0" width="38" height="40" rx="3" fill="rgba(224,175,104,0.2)" stroke="#e0af68" stroke-width="1"/><text x="19" y="18">lo|hi</text><text x="19" y="32">i4|i4</text></g>
        <g transform="translate(40, 0)"><rect x="0" y="0" width="38" height="40" rx="3" fill="rgba(224,175,104,0.2)" stroke="#e0af68" stroke-width="1"/><text x="19" y="18">lo|hi</text><text x="19" y="32">i4|i4</text></g>
        <g transform="translate(80, 0)"><rect x="0" y="0" width="38" height="40" rx="3" fill="rgba(224,175,104,0.2)" stroke="#e0af68" stroke-width="1"/><text x="19" y="18">lo|hi</text><text x="19" y="32">i4|i4</text></g>
        <g transform="translate(120, 0)"><rect x="0" y="0" width="38" height="40" rx="3" fill="rgba(224,175,104,0.2)" stroke="#e0af68" stroke-width="1"/><text x="19" y="18">lo|hi</text><text x="19" y="32">i4|i4</text></g>
        <g transform="translate(160, 0)"><rect x="0" y="0" width="38" height="40" rx="3" fill="rgba(224,175,104,0.2)" stroke="#e0af68" stroke-width="1"/><text x="19" y="18">lo|hi</text><text x="19" y="32">i4|i4</text></g>
        <g transform="translate(200, 0)"><rect x="0" y="0" width="38" height="40" rx="3" fill="rgba(224,175,104,0.2)" stroke="#e0af68" stroke-width="1"/><text x="19" y="18">lo|hi</text><text x="19" y="32">i4|i4</text></g>
        <g transform="translate(240, 0)"><rect x="0" y="0" width="38" height="40" rx="3" fill="rgba(224,175,104,0.2)" stroke="#e0af68" stroke-width="1"/><text x="19" y="18">···</text></g>
        <g transform="translate(280, 0)"><rect x="0" y="0" width="38" height="40" rx="3" fill="rgba(224,175,104,0.2)" stroke="#e0af68" stroke-width="1"/><text x="19" y="18">lo|hi</text><text x="19" y="32">i4|i4</text></g>
      </g>
      <text x="160" y="60" font-family="monospace" font-size="10" fill="rgba(224,175,104,0.7)" text-anchor="middle">16 packed bytes (4-bit pairs)</text>
    </g>
  </g>

  <!-- Fused dot product code -->
  <g transform="translate(70, 360)">
    <rect x="0" y="0" width="1060" height="220" rx="12" fill="url(#card)" stroke="#bb9af7" stroke-width="2"/>
    <text x="20" y="32" font-family="monospace" font-size="14" fill="#bb9af7">// fused dequant + dot — never decompresses to f32</text>
    <line x1="20" y1="46" x2="1040" y2="46" stroke="rgba(187,154,247,0.2)"/>
    <g font-family="monospace" font-size="13" fill="#c0caf5">
      <text x="20" y="76"><tspan fill="#bb9af7">pub fn</tspan> <tspan fill="#7dcfff">dot_q4_0</tspan>(q: &amp;[u8], x: &amp;[f32]) -&gt; f32 {</text>
      <text x="40" y="100"><tspan fill="#bb9af7">let mut</tspan> acc = 0.0;</text>
      <text x="40" y="124"><tspan fill="#bb9af7">for</tspan> _ <tspan fill="#bb9af7">in</tspan> 0..n_blocks {</text>
      <text x="60" y="148"><tspan fill="#bb9af7">let</tspan> d = read_f16(...);          <tspan fill="#9ece6a">// block scale</tspan></text>
      <text x="60" y="172"><tspan fill="#bb9af7">let mut</tspan> s = 0.0; <tspan fill="rgba(192,202,245,0.6)">for i in 0..16 { lo = byte &amp; 0xF - 8; hi = byte &gt;&gt; 4 - 8; s += ... }</tspan></text>
      <text x="60" y="196">acc += d * s;                  <tspan fill="#9ece6a">// scale lifted out → 32× fewer mults</tspan></text>
      <text x="40" y="220">} acc }</text>
    </g>
  </g>

  <!-- Tech tags -->
  <g transform="translate(600, 625)" font-family="monospace" font-size="14">
    <g transform="translate(-180, 0)">
      <rect x="-50" y="-15" width="100" height="30" rx="6" fill="rgba(255,158,100,0.18)" stroke="#ff9e64" stroke-width="1.5"/>
      <text x="0" y="5" fill="#ff9e64" text-anchor="middle">Q4_0</text>
    </g>
    <g transform="translate(-60, 0)">
      <rect x="-50" y="-15" width="100" height="30" rx="6" fill="rgba(224,175,104,0.18)" stroke="#e0af68" stroke-width="1.5"/>
      <text x="0" y="5" fill="#e0af68" text-anchor="middle">Q6_K</text>
    </g>
    <g transform="translate(60, 0)">
      <rect x="-50" y="-15" width="100" height="30" rx="6" fill="rgba(247,118,142,0.18)" stroke="#f7768e" stroke-width="1.5"/>
      <text x="0" y="5" fill="#f7768e" text-anchor="middle">SIMD?</text>
    </g>
    <g transform="translate(180, 0)">
      <rect x="-60" y="-15" width="120" height="30" rx="6" fill="rgba(187,154,247,0.18)" stroke="#bb9af7" stroke-width="1.5"/>
      <text x="0" y="5" fill="#bb9af7" text-anchor="middle">quantization</text>
    </g>
  </g>

  <text x="1160" y="650" font-family="Arial, sans-serif" font-size="14" fill="rgba(255,255,255,0.5)" text-anchor="end">blog.simplypatrick.com</text>
</svg>
