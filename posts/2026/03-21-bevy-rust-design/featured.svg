<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1b26;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#24283b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="rustGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b35;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f7931e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bevyGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2ce4a0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a9f6e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="arrowGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff9e64;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#7dcfff;stop-opacity:0.6" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff9e64;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f7768e;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="675" fill="url(#bgGradient)"/>

  <!-- Grid pattern -->
  <g opacity="0.04">
    <line x1="0" y1="0" x2="0" y2="675" stroke="#7dcfff" stroke-width="1" transform="translate(60,0)"/>
    <line x1="0" y1="0" x2="0" y2="675" stroke="#7dcfff" stroke-width="1" transform="translate(120,0)"/>
    <line x1="0" y1="0" x2="0" y2="675" stroke="#7dcfff" stroke-width="1" transform="translate(180,0)"/>
    <line x1="0" y1="0" x2="0" y2="675" stroke="#7dcfff" stroke-width="1" transform="translate(240,0)"/>
    <line x1="0" y1="0" x2="0" y2="675" stroke="#7dcfff" stroke-width="1" transform="translate(300,0)"/>
    <line x1="0" y1="0" x2="0" y2="675" stroke="#7dcfff" stroke-width="1" transform="translate(360,0)"/>
    <line x1="0" y1="0" x2="0" y2="675" stroke="#7dcfff" stroke-width="1" transform="translate(420,0)"/>
    <line x1="0" y1="0" x2="0" y2="675" stroke="#7dcfff" stroke-width="1" transform="translate(480,0)"/>
    <line x1="0" y1="0" x2="0" y2="675" stroke="#7dcfff" stroke-width="1" transform="translate(540,0)"/>
    <line x1="0" y1="0" x2="0" y2="675" stroke="#7dcfff" stroke-width="1" transform="translate(600,0)"/>
    <line x1="0" y1="0" x2="0" y2="675" stroke="#7dcfff" stroke-width="1" transform="translate(660,0)"/>
    <line x1="0" y1="0" x2="0" y2="675" stroke="#7dcfff" stroke-width="1" transform="translate(720,0)"/>
    <line x1="0" y1="0" x2="0" y2="675" stroke="#7dcfff" stroke-width="1" transform="translate(780,0)"/>
    <line x1="0" y1="0" x2="0" y2="675" stroke="#7dcfff" stroke-width="1" transform="translate(840,0)"/>
    <line x1="0" y1="0" x2="0" y2="675" stroke="#7dcfff" stroke-width="1" transform="translate(900,0)"/>
    <line x1="0" y1="0" x2="0" y2="675" stroke="#7dcfff" stroke-width="1" transform="translate(960,0)"/>
    <line x1="0" y1="0" x2="0" y2="675" stroke="#7dcfff" stroke-width="1" transform="translate(1020,0)"/>
    <line x1="0" y1="0" x2="0" y2="675" stroke="#7dcfff" stroke-width="1" transform="translate(1080,0)"/>
    <line x1="0" y1="0" x2="0" y2="675" stroke="#7dcfff" stroke-width="1" transform="translate(1140,0)"/>
    <line x1="0" y1="0" x2="1200" y2="0" stroke="#7dcfff" stroke-width="1" transform="translate(0,60)"/>
    <line x1="0" y1="0" x2="1200" y2="0" stroke="#7dcfff" stroke-width="1" transform="translate(0,120)"/>
    <line x1="0" y1="0" x2="1200" y2="0" stroke="#7dcfff" stroke-width="1" transform="translate(0,180)"/>
    <line x1="0" y1="0" x2="1200" y2="0" stroke="#7dcfff" stroke-width="1" transform="translate(0,240)"/>
    <line x1="0" y1="0" x2="1200" y2="0" stroke="#7dcfff" stroke-width="1" transform="translate(0,300)"/>
    <line x1="0" y1="0" x2="1200" y2="0" stroke="#7dcfff" stroke-width="1" transform="translate(0,360)"/>
    <line x1="0" y1="0" x2="1200" y2="0" stroke="#7dcfff" stroke-width="1" transform="translate(0,420)"/>
    <line x1="0" y1="0" x2="1200" y2="0" stroke="#7dcfff" stroke-width="1" transform="translate(0,480)"/>
    <line x1="0" y1="0" x2="1200" y2="0" stroke="#7dcfff" stroke-width="1" transform="translate(0,540)"/>
    <line x1="0" y1="0" x2="1200" y2="0" stroke="#7dcfff" stroke-width="1" transform="translate(0,600)"/>
  </g>

  <!-- Accent bar -->
  <rect x="50" y="50" width="120" height="4" fill="url(#accentGradient)" rx="2"/>

  <!-- Central diagram: Rust ownership flowing into Bevy ECS -->

  <!-- Left side: Rust ownership symbols -->
  <!-- Ownership box -->
  <g transform="translate(180, 220)">
    <rect x="-100" y="-40" width="200" height="80" rx="12"
          fill="rgba(255, 107, 53, 0.1)" stroke="#ff6b35" stroke-width="2"/>
    <text x="0" y="-8" font-family="'Source Code Pro', monospace" font-size="14"
          fill="#ff9e64" text-anchor="middle" font-weight="bold">&amp;mut T</text>
    <text x="0" y="16" font-family="Arial, sans-serif" font-size="13"
          fill="rgba(255,255,255,0.6)" text-anchor="middle">Ownership</text>
  </g>

  <!-- Borrowing box -->
  <g transform="translate(180, 330)">
    <rect x="-100" y="-40" width="200" height="80" rx="12"
          fill="rgba(125, 207, 255, 0.1)" stroke="#7dcfff" stroke-width="2"/>
    <text x="0" y="-8" font-family="'Source Code Pro', monospace" font-size="14"
          fill="#7dcfff" text-anchor="middle" font-weight="bold">Rc&lt;RefCell&lt;T&gt;&gt;</text>
    <text x="0" y="16" font-family="Arial, sans-serif" font-size="13"
          fill="rgba(255,255,255,0.6)" text-anchor="middle">Shared Mutability</text>
  </g>

  <!-- Send/Sync box -->
  <g transform="translate(180, 440)">
    <rect x="-100" y="-40" width="200" height="80" rx="12"
          fill="rgba(187, 154, 247, 0.1)" stroke="#bb9af7" stroke-width="2"/>
    <text x="0" y="-8" font-family="'Source Code Pro', monospace" font-size="14"
          fill="#bb9af7" text-anchor="middle" font-weight="bold">Send + Sync</text>
    <text x="0" y="16" font-family="Arial, sans-serif" font-size="13"
          fill="rgba(255,255,255,0.6)" text-anchor="middle">Thread Safety</text>
  </g>

  <!-- Arrows from left to center -->
  <g opacity="0.5">
    <line x1="290" y1="220" x2="450" y2="270" stroke="#ff9e64" stroke-width="2" stroke-dasharray="6,4"/>
    <line x1="290" y1="330" x2="450" y2="330" stroke="#7dcfff" stroke-width="2" stroke-dasharray="6,4"/>
    <line x1="290" y1="440" x2="450" y2="390" stroke="#bb9af7" stroke-width="2" stroke-dasharray="6,4"/>
  </g>

  <!-- Center: Bevy ECS hub -->
  <g transform="translate(560, 330)">
    <rect x="-100" y="-100" width="200" height="200" rx="20"
          fill="rgba(44, 228, 160, 0.08)" stroke="#2ce4a0" stroke-width="3"/>
    <!-- Bevy bird-like icon (simplified) -->
    <circle cx="0" cy="-30" r="30" fill="none" stroke="#2ce4a0" stroke-width="2" opacity="0.6"/>
    <text x="0" y="-22" font-family="Arial, sans-serif" font-size="28"
          fill="#2ce4a0" text-anchor="middle" font-weight="bold">ECS</text>
    <text x="0" y="15" font-family="'Source Code Pro', monospace" font-size="13"
          fill="rgba(255,255,255,0.5)" text-anchor="middle">Query&lt;&amp;mut T&gt;</text>
    <text x="0" y="38" font-family="'Source Code Pro', monospace" font-size="13"
          fill="rgba(255,255,255,0.5)" text-anchor="middle">NonSendMut&lt;T&gt;</text>
    <text x="0" y="61" font-family="'Source Code Pro', monospace" font-size="13"
          fill="rgba(255,255,255,0.5)" text-anchor="middle">Res&lt;T&gt;</text>
  </g>

  <!-- Right side: NES systems -->
  <!-- Arrows from center to right -->
  <g opacity="0.5">
    <line x1="670" y1="270" x2="790" y2="210" stroke="#2ce4a0" stroke-width="2" stroke-dasharray="6,4"/>
    <line x1="670" y1="310" x2="790" y2="300" stroke="#2ce4a0" stroke-width="2" stroke-dasharray="6,4"/>
    <line x1="670" y1="350" x2="790" y2="390" stroke="#2ce4a0" stroke-width="2" stroke-dasharray="6,4"/>
    <line x1="670" y1="390" x2="790" y2="470" stroke="#2ce4a0" stroke-width="2" stroke-dasharray="6,4"/>
  </g>

  <!-- NES CPU -->
  <g transform="translate(890, 210)">
    <rect x="-90" y="-32" width="180" height="64" rx="8"
          fill="rgba(255, 158, 100, 0.12)" stroke="#ff9e64" stroke-width="1.5"/>
    <text x="0" y="-4" font-family="'Source Code Pro', monospace" font-size="15"
          fill="#ff9e64" text-anchor="middle">CPU 6502</text>
    <text x="0" y="16" font-family="Arial, sans-serif" font-size="11"
          fill="rgba(255,255,255,0.4)" text-anchor="middle">owned directly</text>
  </g>

  <!-- NES PPU -->
  <g transform="translate(890, 300)">
    <rect x="-90" y="-32" width="180" height="64" rx="8"
          fill="rgba(125, 207, 255, 0.12)" stroke="#7dcfff" stroke-width="1.5"/>
    <text x="0" y="-4" font-family="'Source Code Pro', monospace" font-size="15"
          fill="#7dcfff" text-anchor="middle">PPU</text>
    <text x="0" y="16" font-family="Arial, sans-serif" font-size="11"
          fill="rgba(255,255,255,0.4)" text-anchor="middle">Rc&lt;RefCell&lt;&gt;&gt;</text>
  </g>

  <!-- NES APU -->
  <g transform="translate(890, 390)">
    <rect x="-90" y="-32" width="180" height="64" rx="8"
          fill="rgba(187, 154, 247, 0.12)" stroke="#bb9af7" stroke-width="1.5"/>
    <text x="0" y="-4" font-family="'Source Code Pro', monospace" font-size="15"
          fill="#bb9af7" text-anchor="middle">APU</text>
    <text x="0" y="16" font-family="Arial, sans-serif" font-size="11"
          fill="rgba(255,255,255,0.4)" text-anchor="middle">Rc&lt;RefCell&lt;&gt;&gt;</text>
  </g>

  <!-- Audio buffer -->
  <g transform="translate(890, 470)">
    <rect x="-90" y="-28" width="180" height="56" rx="8"
          fill="rgba(224, 175, 104, 0.12)" stroke="#e0af68" stroke-width="1.5"/>
    <text x="0" y="-2" font-family="'Source Code Pro', monospace" font-size="14"
          fill="#e0af68" text-anchor="middle">Audio Buffer</text>
    <text x="0" y="16" font-family="Arial, sans-serif" font-size="11"
          fill="rgba(255,255,255,0.4)" text-anchor="middle">Arc&lt;Mutex&lt;&gt;&gt;</text>
  </g>

  <!-- Title area (bottom) -->
  <text x="600" y="570" font-family="Arial, 'Noto Sans TC', sans-serif" font-size="32"
        fill="#c0caf5" text-anchor="middle" font-weight="bold">
    Bevy 與 Rust 的共舞
  </text>
  <text x="600" y="605" font-family="Arial, sans-serif" font-size="18"
        fill="rgba(255,255,255,0.5)" text-anchor="middle">
    How Rust's Ownership Shapes Game Engine Design
  </text>

  <!-- Tech tags -->
  <g transform="translate(600, 640)">
    <g transform="translate(-120, 0)">
      <rect x="-40" y="-16" width="80" height="32" rx="6"
            fill="rgba(255, 158, 100, 0.2)" stroke="#ff9e64" stroke-width="1.5"/>
      <text x="0" y="4" font-family="monospace" font-size="14"
            fill="#ff9e64" text-anchor="middle">Rust</text>
    </g>
    <g transform="translate(0, 0)">
      <rect x="-40" y="-16" width="80" height="32" rx="6"
            fill="rgba(44, 228, 160, 0.2)" stroke="#2ce4a0" stroke-width="1.5"/>
      <text x="0" y="4" font-family="monospace" font-size="14"
            fill="#2ce4a0" text-anchor="middle">Bevy</text>
    </g>
    <g transform="translate(120, 0)">
      <rect x="-40" y="-16" width="80" height="32" rx="6"
            fill="rgba(125, 207, 255, 0.2)" stroke="#7dcfff" stroke-width="1.5"/>
      <text x="0" y="4" font-family="monospace" font-size="14"
            fill="#7dcfff" text-anchor="middle">ECS</text>
    </g>
  </g>

  <!-- Branding -->
  <text x="1160" y="645" font-family="Arial, sans-serif" font-size="18"
        fill="rgba(255, 255, 255, 0.5)" text-anchor="end">
    blog.simplypatrick.com
  </text>
</svg>