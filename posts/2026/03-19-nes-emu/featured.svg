<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1b26;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#24283b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7dcfff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#bb9af7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="crtGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#414868;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#565f89;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#414868;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="screenGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1b26;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16161e;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="screenGlow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" style="stop-color:rgba(125,207,255,0.08);stop-opacity:1" />
      <stop offset="100%" style="stop-color:rgba(125,207,255,0);stop-opacity:1" />
    </radialGradient>
    <clipPath id="screenClip">
      <rect x="115" y="95" width="470" height="355" rx="8"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1200" height="675" fill="url(#bgGradient)"/>

  <!-- Accent bar -->
  <rect x="50" y="50" width="120" height="4" fill="url(#accentGradient)" rx="2"/>

  <!-- CRT TV body -->
  <rect x="80" y="70" width="540" height="420" rx="20" fill="#2a2e3f" stroke="#414868" stroke-width="2"/>
  <!-- TV bezel -->
  <rect x="100" y="85" width="500" height="375" rx="12" fill="#1e2030"/>
  <!-- Screen -->
  <rect x="115" y="95" width="470" height="355" rx="8" fill="url(#screenGradient)"/>
  <rect x="115" y="95" width="470" height="355" rx="8" fill="url(#screenGlow)"/>

  <!-- Fake game scene on screen -->
  <g clip-path="url(#screenClip)">
    <!-- Sky -->
    <rect x="115" y="95" width="470" height="200" fill="#6185b8"/>
    <!-- Clouds -->
    <ellipse cx="200" cy="150" rx="40" ry="20" fill="rgba(255,255,255,0.7)"/>
    <ellipse cx="230" cy="145" rx="30" ry="18" fill="rgba(255,255,255,0.7)"/>
    <ellipse cx="420" cy="170" rx="35" ry="16" fill="rgba(255,255,255,0.6)"/>
    <ellipse cx="445" cy="165" rx="25" ry="14" fill="rgba(255,255,255,0.6)"/>

    <!-- Hills -->
    <ellipse cx="250" cy="295" rx="120" ry="40" fill="#4a8c4a"/>
    <ellipse cx="450" cy="295" rx="100" ry="35" fill="#5a9c5a"/>

    <!-- Ground -->
    <rect x="115" y="290" width="470" height="50" fill="#c84c09"/>
    <rect x="115" y="290" width="470" height="8" fill="#e8a060"/>

    <!-- Bricks -->
    <g fill="#c8a040">
      <rect x="300" y="220" width="80" height="20" rx="2"/>
      <rect x="310" y="222" width="18" height="16" fill="#d4b050"/>
      <rect x="332" y="222" width="18" height="16" fill="#d4b050"/>
      <rect x="354" y="222" width="18" height="16" fill="#d4b050"/>
    </g>
    <!-- Question block -->
    <rect x="395" y="220" width="22" height="20" rx="2" fill="#d4a830"/>
    <text x="406" y="236" font-family="Arial" font-size="14" fill="#fff" text-anchor="middle" font-weight="bold">?</text>

    <!-- Simple character -->
    <g transform="translate(230, 258)">
      <!-- Head -->
      <rect x="0" y="0" width="16" height="12" rx="2" fill="#e04040"/>
      <!-- Face -->
      <rect x="2" y="12" width="12" height="10" rx="1" fill="#f0b080"/>
      <!-- Body -->
      <rect x="0" y="22" width="16" height="10" fill="#e04040"/>
      <!-- Feet -->
      <rect x="0" y="32" width="7" height="4" fill="#804020"/>
      <rect x="9" y="32" width="7" height="4" fill="#804020"/>
    </g>

    <!-- Pipe -->
    <rect x="480" y="250" width="40" height="90" fill="#40a040"/>
    <rect x="475" y="246" width="50" height="14" rx="3" fill="#50b050"/>

    <!-- Scanline effect overlay -->
    <g opacity="0.15">
      <line x1="115" y1="100" x2="585" y2="100" stroke="#000" stroke-width="1"/>
      <line x1="115" y1="104" x2="585" y2="104" stroke="#000" stroke-width="1"/>
      <line x1="115" y1="108" x2="585" y2="108" stroke="#000" stroke-width="1"/>
      <line x1="115" y1="112" x2="585" y2="112" stroke="#000" stroke-width="1"/>
      <line x1="115" y1="116" x2="585" y2="116" stroke="#000" stroke-width="1"/>
      <line x1="115" y1="120" x2="585" y2="120" stroke="#000" stroke-width="1"/>
      <line x1="115" y1="124" x2="585" y2="124" stroke="#000" stroke-width="1"/>
      <line x1="115" y1="128" x2="585" y2="128" stroke="#000" stroke-width="1"/>
      <line x1="115" y1="132" x2="585" y2="132" stroke="#000" stroke-width="1"/>
      <line x1="115" y1="136" x2="585" y2="136" stroke="#000" stroke-width="1"/>
      <line x1="115" y1="140" x2="585" y2="140" stroke="#000" stroke-width="1"/>
      <line x1="115" y1="144" x2="585" y2="144" stroke="#000" stroke-width="1"/>
      <line x1="115" y1="148" x2="585" y2="148" stroke="#000" stroke-width="1"/>
      <line x1="115" y1="152" x2="585" y2="152" stroke="#000" stroke-width="1"/>
      <line x1="115" y1="156" x2="585" y2="156" stroke="#000" stroke-width="1"/>
      <line x1="115" y1="160" x2="585" y2="160" stroke="#000" stroke-width="1"/>
      <line x1="115" y1="164" x2="585" y2="164" stroke="#000" stroke-width="1"/>
      <line x1="115" y1="168" x2="585" y2="168" stroke="#000" stroke-width="1"/>
      <line x1="115" y1="172" x2="585" y2="172" stroke="#000" stroke-width="1"/>
      <line x1="115" y1="176" x2="585" y2="176" stroke="#000" stroke-width="1"/>
      <line x1="115" y1="180" x2="585" y2="180" stroke="#000" stroke-width="1"/>
      <line x1="115" y1="184" x2="585" y2="184" stroke="#000" stroke-width="1"/>
      <line x1="115" y1="188" x2="585" y2="188" stroke="#000" stroke-width="1"/>
      <line x1="115" y1="192" x2="585" y2="192" stroke="#000" stroke-width="1"/>
      <line x1="115" y1="196" x2="585" y2="196" stroke="#000" stroke-width="1"/>
      <line x1="115" y1="200" x2="585" y2="200" stroke="#000" stroke-width="1"/>
    </g>
  </g>

  <!-- TV power LED -->
  <circle cx="590" cy="475" r="4" fill="#e04040" opacity="0.8"/>

  <!-- Debug panel (right side) -->
  <rect x="660" y="70" width="490" height="520" rx="8" fill="rgba(30,32,48,0.95)" stroke="#414868" stroke-width="1.5"/>

  <!-- Debug panel title -->
  <text x="680" y="100" font-family="monospace" font-size="14" fill="#7dcfff" font-weight="bold">DEBUG PANEL</text>
  <line x1="680" y1="108" x2="1130" y2="108" stroke="#414868" stroke-width="1"/>

  <!-- CPU section -->
  <text x="680" y="132" font-family="monospace" font-size="12" fill="#bb9af7">CPU</text>
  <text x="680" y="150" font-family="monospace" font-size="11" fill="#565f89">A:</text>
  <text x="700" y="150" font-family="monospace" font-size="11" fill="#c0caf5">$10</text>
  <text x="740" y="150" font-family="monospace" font-size="11" fill="#565f89">X:</text>
  <text x="758" y="150" font-family="monospace" font-size="11" fill="#c0caf5">$00</text>
  <text x="800" y="150" font-family="monospace" font-size="11" fill="#565f89">Y:</text>
  <text x="818" y="150" font-family="monospace" font-size="11" fill="#c0caf5">$07</text>
  <text x="858" y="150" font-family="monospace" font-size="11" fill="#565f89">PC:</text>
  <text x="882" y="150" font-family="monospace" font-size="11" fill="#9ece6a">$8002</text>
  <!-- Flags -->
  <text x="680" y="168" font-family="monospace" font-size="10" fill="#9ece6a">N</text>
  <text x="698" y="168" font-family="monospace" font-size="10" fill="#414868">V</text>
  <text x="716" y="168" font-family="monospace" font-size="10" fill="#414868">B</text>
  <text x="734" y="168" font-family="monospace" font-size="10" fill="#414868">D</text>
  <text x="752" y="168" font-family="monospace" font-size="10" fill="#9ece6a">I</text>
  <text x="770" y="168" font-family="monospace" font-size="10" fill="#9ece6a">Z</text>
  <text x="788" y="168" font-family="monospace" font-size="10" fill="#414868">C</text>

  <!-- Disassembly -->
  <text x="680" y="190" font-family="monospace" font-size="10" fill="#565f89">$8000: A9 10    LDA #$10</text>
  <rect x="676" y="194" width="450" height="14" rx="2" fill="rgba(158,206,106,0.1)"/>
  <text x="680" y="205" font-family="monospace" font-size="10" fill="#9ece6a">$8002: 8D 00 20 STA $2000  ◄</text>
  <text x="680" y="220" font-family="monospace" font-size="10" fill="#565f89">$8005: A9 3F    LDA #$3F</text>

  <!-- PPU section -->
  <line x1="680" y1="234" x2="1130" y2="234" stroke="#414868" stroke-width="1"/>
  <text x="680" y="252" font-family="monospace" font-size="12" fill="#bb9af7">PPU</text>
  <text x="680" y="270" font-family="monospace" font-size="10" fill="#565f89">Scanline: 45  Dot: 128</text>
  <!-- Palette swatches -->
  <text x="680" y="288" font-family="monospace" font-size="10" fill="#565f89">Palette:</text>
  <!-- BG palette row -->
  <rect x="745" y="278" width="12" height="12" fill="#6185b8" rx="1"/>
  <rect x="760" y="278" width="12" height="12" fill="#c84c09" rx="1"/>
  <rect x="775" y="278" width="12" height="12" fill="#4a8c4a" rx="1"/>
  <rect x="790" y="278" width="12" height="12" fill="#c8a040" rx="1"/>
  <rect x="812" y="278" width="12" height="12" fill="#e04040" rx="1"/>
  <rect x="827" y="278" width="12" height="12" fill="#f0b080" rx="1"/>
  <rect x="842" y="278" width="12" height="12" fill="#804020" rx="1"/>
  <rect x="857" y="278" width="12" height="12" fill="#fff" rx="1"/>

  <!-- APU waveforms -->
  <line x1="680" y1="300" x2="1130" y2="300" stroke="#414868" stroke-width="1"/>
  <text x="680" y="318" font-family="monospace" font-size="12" fill="#bb9af7">APU</text>

  <!-- Pulse waveform -->
  <text x="680" y="336" font-family="monospace" font-size="9" fill="#9ece6a">P1</text>
  <rect x="698" y="324" width="180" height="20" rx="2" fill="rgba(158,206,106,0.05)"/>
  <polyline points="700,340 705,330 710,340 715,330 720,340 725,330 730,340 735,330 740,340 745,330 750,340 755,330 760,340 765,330 770,340 775,330 780,340 785,330 790,340 795,330 800,340 805,330 810,340 815,330 820,340 825,330 830,340 835,330 840,340 845,330 850,340 855,330 860,340 865,330 870,340 875,330"
            fill="none" stroke="#9ece6a" stroke-width="1.5" opacity="0.8"/>

  <!-- Triangle waveform -->
  <text x="680" y="358" font-family="monospace" font-size="9" fill="#ff9e64">TR</text>
  <rect x="698" y="346" width="180" height="20" rx="2" fill="rgba(255,158,100,0.05)"/>
  <polyline points="700,362 710,350 720,362 730,350 740,362 750,350 760,362 770,350 780,362 790,350 800,362 810,350 820,362 830,350 840,362 850,350 860,362 870,350"
            fill="none" stroke="#ff9e64" stroke-width="1.5" opacity="0.8"/>

  <!-- Noise waveform -->
  <text x="680" y="380" font-family="monospace" font-size="9" fill="#bb9af7">NS</text>
  <rect x="698" y="368" width="180" height="20" rx="2" fill="rgba(187,154,247,0.05)"/>
  <polyline points="700,375 703,382 706,370 709,380 712,372 715,384 718,370 721,378 724,372 727,385 730,370 733,376 736,382 739,372 742,380 745,370 748,385 751,374 754,378 757,370 760,382 763,374 766,380 769,372 772,384 775,370 778,376 781,382 784,372 787,378 790,370 793,384 796,374 799,380 802,372 805,376 808,382 811,370 814,378 817,384 820,372 823,376 826,380 829,370 832,384 835,374 838,378 841,372 844,380 847,370 850,376 853,382 856,374 859,380 862,370 865,384 868,376 871,380 874,372"
            fill="none" stroke="#bb9af7" stroke-width="1.5" opacity="0.7"/>

  <!-- Joypad section -->
  <line x1="680" y1="396" x2="1130" y2="396" stroke="#414868" stroke-width="1"/>
  <text x="680" y="414" font-family="monospace" font-size="12" fill="#bb9af7">JOYPAD</text>

  <!-- NES controller visualization -->
  <rect x="700" y="424" width="200" height="80" rx="20" fill="#3b3b3b" stroke="#565f89" stroke-width="1.5"/>

  <!-- D-pad -->
  <rect x="730" y="448" width="10" height="30" rx="2" fill="#565f89"/>
  <rect x="720" y="458" width="30" height="10" rx="2" fill="#565f89"/>
  <!-- Up pressed -->
  <rect x="730" y="448" width="10" height="10" rx="2" fill="#e04040"/>

  <!-- Select/Start -->
  <rect x="790" y="468" width="20" height="8" rx="4" fill="#565f89"/>
  <rect x="820" y="468" width="20" height="8" rx="4" fill="#565f89"/>

  <!-- A/B buttons -->
  <circle cx="870" cy="472" r="10" fill="#565f89"/>
  <circle cx="892" cy="462" r="10" fill="#e04040"/>
  <text x="870" y="476" font-family="Arial" font-size="10" fill="#c0caf5" text-anchor="middle">B</text>
  <text x="892" y="466" font-family="Arial" font-size="10" fill="#fff" text-anchor="middle">A</text>

  <!-- Video filter label -->
  <line x1="680" y1="516" x2="1130" y2="516" stroke="#414868" stroke-width="1"/>
  <text x="680" y="534" font-family="monospace" font-size="12" fill="#bb9af7">VIDEO</text>
  <rect x="720" y="540" width="60" height="22" rx="4" fill="rgba(125,207,255,0.15)" stroke="#7dcfff" stroke-width="1"/>
  <text x="750" y="555" font-family="monospace" font-size="11" fill="#7dcfff" text-anchor="middle">CRT</text>
  <text x="790" y="555" font-family="monospace" font-size="10" fill="#565f89">Scanlines: 0.3</text>
  <text x="790" y="570" font-family="monospace" font-size="10" fill="#565f89">Curvature: 0.2</text>

  <!-- Bottom: Title -->
  <text x="50" y="625" font-family="Arial, sans-serif" font-size="34" font-weight="bold" fill="#c0caf5">NES 模擬器</text>
  <text x="50" y="655" font-family="Arial, sans-serif" font-size="18" fill="#565f89">Bevy + cpal + egui — Complete NES Emulator Frontend</text>

  <!-- Tech tags -->
  <g transform="translate(900, 625)">
    <g transform="translate(-100, 0)">
      <rect x="-35" y="-16" width="70" height="32" rx="6" fill="rgba(255,158,100,0.2)" stroke="#ff9e64" stroke-width="1.5"/>
      <text x="0" y="4" font-family="monospace" font-size="13" fill="#ff9e64" text-anchor="middle">Rust</text>
    </g>
    <g transform="translate(0, 0)">
      <rect x="-35" y="-16" width="70" height="32" rx="6" fill="rgba(125,207,255,0.2)" stroke="#7dcfff" stroke-width="1.5"/>
      <text x="0" y="4" font-family="monospace" font-size="13" fill="#7dcfff" text-anchor="middle">Bevy</text>
    </g>
    <g transform="translate(100, 0)">
      <rect x="-35" y="-16" width="70" height="32" rx="6" fill="rgba(187,154,247,0.2)" stroke="#bb9af7" stroke-width="1.5"/>
      <text x="0" y="4" font-family="monospace" font-size="13" fill="#bb9af7" text-anchor="middle">WGSL</text>
    </g>
  </g>

  <!-- Branding -->
  <text x="1160" y="665" font-family="Arial, sans-serif" font-size="18" fill="rgba(255, 255, 255, 0.5)" text-anchor="end">blog.simplypatrick.com</text>
</svg>
