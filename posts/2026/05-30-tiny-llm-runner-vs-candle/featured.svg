<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1b26"/>
      <stop offset="100%" stop-color="#24283b"/>
    </linearGradient>
    <linearGradient id="accentL" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff9e64"/>
      <stop offset="100%" stop-color="#f7768e"/>
    </linearGradient>
    <linearGradient id="accentR" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7dcfff"/>
      <stop offset="100%" stop-color="#bb9af7"/>
    </linearGradient>
    <linearGradient id="cardL" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2a2026"/>
      <stop offset="100%" stop-color="#1f1822"/>
    </linearGradient>
    <linearGradient id="cardR" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1f2a3a"/>
      <stop offset="100%" stop-color="#181f2c"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <rect x="50" y="50" width="140" height="4" fill="url(#accentL)" rx="2"/>

  <!-- Title -->
  <text x="60" y="120" font-family="Arvo, serif" font-size="40" fill="#c0caf5" font-weight="bold">純手工 vs. 全功能框架</text>
  <text x="60" y="156" font-family="Arial, sans-serif" font-size="20" fill="rgba(192,202,245,0.65)">tiny-llm-runner ↔ candle architectural comparison</text>

  <!-- Left card: tiny-llm-runner -->
  <g transform="translate(70, 210)">
    <rect x="0" y="0" width="500" height="360" rx="12" fill="url(#cardL)" stroke="#ff9e64" stroke-width="2"/>
    <text x="250" y="40" font-family="monospace" font-size="20" fill="#ff9e64" font-weight="bold" text-anchor="middle">tiny-llm-runner</text>
    <line x1="30" y1="56" x2="470" y2="56" stroke="rgba(255,158,100,0.3)"/>
    <g font-family="monospace" font-size="14" fill="#c0caf5">
      <text x="30" y="92">~ 2,000 lines, 9 files</text>
      <text x="30" y="120">CPU only · rayon parallel</text>
      <text x="30" y="148">5 quant types: F32/F16/Q8_0/Q4_0/Q6_K</text>
      <text x="30" y="176">Llama hardcoded</text>
      <text x="30" y="204">No autograd</text>
    </g>
    <line x1="30" y1="232" x2="470" y2="232" stroke="rgba(255,158,100,0.2)"/>
    <text x="30" y="262" font-family="monospace" font-size="13" fill="#9ece6a">struct TensorView&lt;'a&gt; {</text>
    <text x="50" y="282" font-family="monospace" font-size="13" fill="#c0caf5">data: &amp;'a [u8],</text>
    <text x="50" y="302" font-family="monospace" font-size="13" fill="#c0caf5">ggml_type: GgmlType,</text>
    <text x="50" y="322" font-family="monospace" font-size="13" fill="#c0caf5">dims: [u64; 4],</text>
    <text x="30" y="342" font-family="monospace" font-size="13" fill="#9ece6a">}  // 32 bytes, Copy</text>
  </g>

  <!-- VS badge -->
  <g transform="translate(600, 390)">
    <circle cx="0" cy="0" r="42" fill="#1a1b26" stroke="#bb9af7" stroke-width="3"/>
    <text x="0" y="8" font-family="Arvo, serif" font-size="26" fill="#bb9af7" text-anchor="middle" font-weight="bold">vs</text>
  </g>

  <!-- Right card: candle -->
  <g transform="translate(630, 210)">
    <rect x="0" y="0" width="500" height="360" rx="12" fill="url(#cardR)" stroke="#7dcfff" stroke-width="2"/>
    <text x="250" y="40" font-family="monospace" font-size="20" fill="#7dcfff" font-weight="bold" text-anchor="middle">candle</text>
    <line x1="30" y1="56" x2="470" y2="56" stroke="rgba(125,207,255,0.3)"/>
    <g font-family="monospace" font-size="14" fill="#c0caf5">
      <text x="30" y="92">tens of thousands of lines, multi-crate</text>
      <text x="30" y="120">CPU + CUDA + Metal backends</text>
      <text x="30" y="148">Full GGML quant family + QTensor</text>
      <text x="30" y="176">Module trait — composable models</text>
      <text x="30" y="204">Has autograd (training-capable)</text>
    </g>
    <line x1="30" y1="232" x2="470" y2="232" stroke="rgba(125,207,255,0.2)"/>
    <text x="30" y="262" font-family="monospace" font-size="13" fill="#9ece6a">struct Tensor {</text>
    <text x="50" y="282" font-family="monospace" font-size="13" fill="#c0caf5">storage: Arc&lt;Storage&gt;,</text>
    <text x="50" y="302" font-family="monospace" font-size="13" fill="#c0caf5">layout: Layout,</text>
    <text x="50" y="322" font-family="monospace" font-size="13" fill="#c0caf5">device: Device, op: Op, …</text>
    <text x="30" y="342" font-family="monospace" font-size="13" fill="#9ece6a">}  // tracked, refcounted</text>
  </g>

  <!-- Tech tags -->
  <g transform="translate(600, 625)" font-family="monospace" font-size="14">
    <g transform="translate(-150, 0)">
      <rect x="-40" y="-15" width="80" height="30" rx="6" fill="rgba(255,158,100,0.18)" stroke="#ff9e64" stroke-width="1.5"/>
      <text x="0" y="5" fill="#ff9e64" text-anchor="middle">Rust</text>
    </g>
    <g transform="translate(-50, 0)">
      <rect x="-40" y="-15" width="80" height="30" rx="6" fill="rgba(187,154,247,0.18)" stroke="#bb9af7" stroke-width="1.5"/>
      <text x="0" y="5" fill="#bb9af7" text-anchor="middle">LLM</text>
    </g>
    <g transform="translate(50, 0)">
      <rect x="-50" y="-15" width="100" height="30" rx="6" fill="rgba(125,207,255,0.18)" stroke="#7dcfff" stroke-width="1.5"/>
      <text x="0" y="5" fill="#7dcfff" text-anchor="middle">candle</text>
    </g>
    <g transform="translate(160, 0)">
      <rect x="-60" y="-15" width="120" height="30" rx="6" fill="rgba(158,206,106,0.18)" stroke="#9ece6a" stroke-width="1.5"/>
      <text x="0" y="5" fill="#9ece6a" text-anchor="middle">architecture</text>
    </g>
  </g>

  <text x="1160" y="650" font-family="Arial, sans-serif" font-size="14" fill="rgba(255,255,255,0.5)" text-anchor="end">blog.simplypatrick.com</text>
</svg>
