<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1b26"/>
      <stop offset="100%" stop-color="#24283b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff9e64"/>
      <stop offset="100%" stop-color="#bb9af7"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2a2e42"/>
      <stop offset="100%" stop-color="#1f2233"/>
    </linearGradient>
    <marker id="arrow6" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#bb9af7"/>
    </marker>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <rect x="50" y="50" width="140" height="4" fill="url(#accent)" rx="2"/>

  <text x="60" y="92" font-family="monospace" font-size="14" fill="#9ece6a">tiny-llm-runner · deep dive</text>
  <text x="60" y="138" font-family="Arvo, serif" font-size="42" fill="#c0caf5" font-weight="bold">(6) runner.rs</text>
  <text x="60" y="170" font-family="Arial, sans-serif" font-size="20" fill="rgba(192,202,245,0.65)">forward pass orchestration · KV cache · GQA</text>

  <!-- token in -->
  <g transform="translate(70, 230)">
    <rect width="160" height="60" rx="8" fill="rgba(125,207,255,0.18)" stroke="#7dcfff" stroke-width="2"/>
    <text x="80" y="38" font-family="monospace" font-size="14" fill="#7dcfff" text-anchor="middle">token id</text>
  </g>
  <path d="M 230 260 L 280 260" stroke="#bb9af7" stroke-width="2" marker-end="url(#arrow6)"/>

  <!-- embed -->
  <g transform="translate(290, 230)">
    <rect width="160" height="60" rx="8" fill="url(#card)" stroke="#9ece6a" stroke-width="2"/>
    <text x="80" y="32" font-family="monospace" font-size="13" fill="#9ece6a" text-anchor="middle">embed</text>
    <text x="80" y="50" font-family="monospace" font-size="11" fill="rgba(158,206,106,0.7)" text-anchor="middle">→ x[n_embd]</text>
  </g>
  <path d="M 450 260 L 500 260" stroke="#bb9af7" stroke-width="2" marker-end="url(#arrow6)"/>

  <!-- 22 layer block -->
  <g transform="translate(510, 215)">
    <rect width="320" height="280" rx="12" fill="url(#card)" stroke="#bb9af7" stroke-width="2"/>
    <text x="160" y="32" font-family="monospace" font-size="14" fill="#bb9af7" text-anchor="middle">for l in 0..n_layer (× 22)</text>
    <line x1="20" y1="44" x2="300" y2="44" stroke="rgba(187,154,247,0.2)"/>
    <g font-family="monospace" font-size="12" fill="#c0caf5">
      <text x="20" y="68">rmsnorm(x) → xb</text>
      <text x="20" y="92">matvec(wq, xb) → q</text>
      <text x="20" y="116">matvec(wk, xb) → <tspan fill="#e0af68">k_cache[pos]</tspan></text>
      <text x="20" y="140">matvec(wv, xb) → <tspan fill="#e0af68">v_cache[pos]</tspan></text>
      <text x="20" y="164">apply_rope(q, k)</text>
      <text x="20" y="188">attention(q, K, V) <tspan fill="#f7768e">// GQA</tspan></text>
      <text x="20" y="212">x += matvec(wo, attn)</text>
      <text x="20" y="236">x += FFN(silu(gate)·up)</text>
      <text x="20" y="260" fill="rgba(187,154,247,0.7)">// residuals chain through</text>
    </g>
  </g>
  <path d="M 830 355 L 880 355" stroke="#bb9af7" stroke-width="2" marker-end="url(#arrow6)"/>

  <!-- final norm + lm_head + logits -->
  <g transform="translate(890, 230)">
    <rect width="240" height="120" rx="8" fill="url(#card)" stroke="#f7768e" stroke-width="2"/>
    <text x="120" y="32" font-family="monospace" font-size="13" fill="#f7768e" text-anchor="middle">output_norm</text>
    <line x1="20" y1="44" x2="220" y2="44" stroke="rgba(247,118,142,0.2)"/>
    <text x="120" y="68" font-family="monospace" font-size="13" fill="#c0caf5" text-anchor="middle">matvec(lm_head)</text>
    <text x="120" y="100" font-family="monospace" font-size="14" fill="#f7768e" text-anchor="middle" font-weight="bold">→ logits[vocab]</text>
  </g>

  <!-- KV cache illustration -->
  <g transform="translate(70, 380)">
    <rect width="420" height="200" rx="12" fill="url(#card)" stroke="#e0af68" stroke-width="2"/>
    <text x="20" y="32" font-family="monospace" font-size="14" fill="#e0af68">KV cache (per-layer scratch)</text>
    <line x1="20" y1="46" x2="400" y2="46" stroke="rgba(224,175,104,0.2)"/>
    <text x="20" y="72" font-family="monospace" font-size="12" fill="#c0caf5">kcache: Vec&lt;Vec&lt;f32&gt;&gt;</text>
    <text x="40" y="92" font-family="monospace" font-size="11" fill="rgba(192,202,245,0.6)">[n_layer][n_ctx × kv_dim]</text>
    <!-- positions row -->
    <g transform="translate(20, 110)">
      <rect x="0" y="0" width="50" height="30" fill="rgba(224,175,104,0.4)" stroke="#e0af68" stroke-width="1"/>
      <text x="25" y="20" font-family="monospace" font-size="10" fill="#1a1b26" text-anchor="middle">pos 0</text>
      <rect x="50" y="0" width="50" height="30" fill="rgba(224,175,104,0.4)" stroke="#e0af68" stroke-width="1"/>
      <text x="75" y="20" font-family="monospace" font-size="10" fill="#1a1b26" text-anchor="middle">pos 1</text>
      <rect x="100" y="0" width="50" height="30" fill="rgba(224,175,104,0.4)" stroke="#e0af68" stroke-width="1"/>
      <text x="125" y="20" font-family="monospace" font-size="10" fill="#1a1b26" text-anchor="middle">pos 2</text>
      <rect x="150" y="0" width="50" height="30" fill="rgba(247,118,142,0.6)" stroke="#f7768e" stroke-width="2"/>
      <text x="175" y="20" font-family="monospace" font-size="10" fill="#1a1b26" text-anchor="middle">pos t (now)</text>
      <rect x="200" y="0" width="180" height="30" fill="rgba(192,202,245,0.06)" stroke="rgba(192,202,245,0.3)" stroke-width="1" stroke-dasharray="3,3"/>
      <text x="290" y="20" font-family="monospace" font-size="10" fill="rgba(192,202,245,0.5)" text-anchor="middle">future (unused)</text>
    </g>
    <text x="20" y="170" font-family="monospace" font-size="11" fill="rgba(224,175,104,0.7)">// matvec(wk, xb) writes directly into kcache[l][pos*kv_dim..]</text>
    <text x="20" y="188" font-family="monospace" font-size="11" fill="rgba(224,175,104,0.7)">// no copy — slice IS the cache row</text>
  </g>

  <!-- Tech tags -->
  <g transform="translate(800, 530)" font-family="monospace" font-size="14">
    <g transform="translate(0, 0)">
      <rect x="-60" y="-15" width="120" height="30" rx="6" fill="rgba(255,158,100,0.18)" stroke="#ff9e64" stroke-width="1.5"/>
      <text x="0" y="5" fill="#ff9e64" text-anchor="middle">KV cache</text>
    </g>
    <g transform="translate(140, 0)">
      <rect x="-50" y="-15" width="100" height="30" rx="6" fill="rgba(125,207,255,0.18)" stroke="#7dcfff" stroke-width="1.5"/>
      <text x="0" y="5" fill="#7dcfff" text-anchor="middle">GQA</text>
    </g>
    <g transform="translate(260, 0)">
      <rect x="-60" y="-15" width="120" height="30" rx="6" fill="rgba(187,154,247,0.18)" stroke="#bb9af7" stroke-width="1.5"/>
      <text x="0" y="5" fill="#bb9af7" text-anchor="middle">attention</text>
    </g>
  </g>

  <text x="1160" y="650" font-family="Arial, sans-serif" font-size="14" fill="rgba(255,255,255,0.5)" text-anchor="end">blog.simplypatrick.com</text>
</svg>
