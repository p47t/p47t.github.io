<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1b26"/>
      <stop offset="100%" stop-color="#24283b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff9e64"/>
      <stop offset="100%" stop-color="#bb9af7"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2a2e42"/>
      <stop offset="100%" stop-color="#1f2233"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#bb9af7"/>
    </marker>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <rect x="50" y="50" width="140" height="4" fill="url(#accent)" rx="2"/>

  <text x="60" y="92" font-family="monospace" font-size="14" fill="#9ece6a">tiny-llm-runner · deep dive</text>
  <text x="60" y="138" font-family="Arvo, serif" font-size="42" fill="#c0caf5" font-weight="bold">(1) config.rs</text>
  <text x="60" y="170" font-family="Arial, sans-serif" font-size="20" fill="rgba(192,202,245,0.65)">GGUF metadata → Rust strong types</text>

  <!-- Left: GGUF metadata kv-pairs -->
  <g transform="translate(70, 220)">
    <rect x="0" y="0" width="430" height="380" rx="12" fill="url(#card)" stroke="#7dcfff" stroke-width="2"/>
    <text x="20" y="34" font-family="monospace" font-size="14" fill="#7dcfff">// gguf metadata (untyped)</text>
    <line x1="20" y1="50" x2="410" y2="50" stroke="rgba(125,207,255,0.2)"/>
    <g font-family="monospace" font-size="13" fill="#c0caf5">
      <text x="20" y="80">"general.architecture"  → "llama"</text>
      <text x="20" y="108">"llama.embedding_length" → u32(2048)</text>
      <text x="20" y="136">"llama.block_count"      → u32(22)</text>
      <text x="20" y="164">"llama.attention.head_count" → u32(32)</text>
      <text x="20" y="192">"llama.attention.head_count_kv" → u32(4)</text>
      <text x="20" y="220">"llama.feed_forward_length" → u32(5632)</text>
      <text x="20" y="248">"llama.context_length"   → u32(2048)</text>
      <text x="20" y="276">"llama.rope.freq_base"   → f32(10000)</text>
      <text x="20" y="304" fill="#e0af68">"llama.attn.layer_norm_rms_eps"</text>
      <text x="40" y="324" fill="#e0af68">→ f32(1e-5)</text>
      <text x="20" y="352" fill="rgba(192,202,245,0.4)">... (60+ more keys)</text>
    </g>
  </g>

  <!-- arrow -->
  <path d="M 510 410 L 580 410" stroke="#bb9af7" stroke-width="3" fill="none" marker-end="url(#arrow)"/>

  <!-- Right: Typed struct -->
  <g transform="translate(600, 220)">
    <rect x="0" y="0" width="530" height="380" rx="12" fill="url(#card)" stroke="#9ece6a" stroke-width="2"/>
    <text x="20" y="34" font-family="monospace" font-size="14" fill="#9ece6a">struct LlamaConfig {</text>
    <g font-family="monospace" font-size="13" fill="#c0caf5">
      <text x="40" y="70">n_ctx: usize,</text>
      <text x="40" y="98">n_embd: usize,</text>
      <text x="40" y="126">n_layer: usize,</text>
      <text x="40" y="154">n_head: usize,</text>
      <text x="40" y="182">n_head_kv: usize,</text>
      <text x="40" y="210">n_ff: usize,</text>
      <text x="40" y="238">vocab_size: usize,</text>
      <text x="40" y="266">rms_eps: f32,</text>
      <text x="40" y="294">rope_freq_base: f32,</text>
      <text x="40" y="322">rope_dim_count: usize,</text>
    </g>
    <text x="20" y="358" font-family="monospace" font-size="14" fill="#9ece6a">}</text>
    <text x="280" y="358" font-family="monospace" font-size="12" fill="#f7768e">// invariants checked!</text>
  </g>

  <!-- Tech tags -->
  <g transform="translate(600, 635)" font-family="monospace" font-size="14">
    <g transform="translate(-150, 0)">
      <rect x="-50" y="-15" width="100" height="30" rx="6" fill="rgba(255,158,100,0.18)" stroke="#ff9e64" stroke-width="1.5"/>
      <text x="0" y="5" fill="#ff9e64" text-anchor="middle">Rust</text>
    </g>
    <g transform="translate(-30, 0)">
      <rect x="-50" y="-15" width="100" height="30" rx="6" fill="rgba(125,207,255,0.18)" stroke="#7dcfff" stroke-width="1.5"/>
      <text x="0" y="5" fill="#7dcfff" text-anchor="middle">GGUF</text>
    </g>
    <g transform="translate(90, 0)">
      <rect x="-60" y="-15" width="120" height="30" rx="6" fill="rgba(187,154,247,0.18)" stroke="#bb9af7" stroke-width="1.5"/>
      <text x="0" y="5" fill="#bb9af7" text-anchor="middle">metadata</text>
    </g>
  </g>

  <text x="1160" y="650" font-family="Arial, sans-serif" font-size="14" fill="rgba(255,255,255,0.5)" text-anchor="end">blog.simplypatrick.com</text>
</svg>
