<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675">
  <defs>
    <!-- Background Gradients -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0b0d12;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161924;stop-opacity:1" />
    </linearGradient>
    
    <!-- Accent Gradient -->
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d946ef;stop-opacity:1" />
    </linearGradient>

    <!-- Browser Mockup Gradients -->
    <linearGradient id="windowHeaderGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#202430;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#181b24;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="userMsgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4f46e5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="rustLogoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e05a26;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f97316;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="htmlGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f43f5e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="jsGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#eab308;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#eab308;stop-opacity:0.8" />
    </linearGradient>

    <!-- Glow Filters -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="pulseGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="675" fill="url(#bgGradient)" />

  <!-- Grid Pattern Overlay -->
  <g opacity="0.04">
    <path d="M 0,50 L 1200,50 M 0,100 L 1200,100 M 0,150 L 1200,150 M 0,200 L 1200,200 M 0,250 L 1200,250 M 0,300 L 1200,300 M 0,350 L 1200,350 M 0,400 L 1200,400 M 0,450 L 1200,450 M 0,500 L 1200,500 M 0,550 L 1200,550 M 0,600 L 1200,600 M 0,650 L 1200,650" stroke="#ffffff" stroke-width="1" />
    <path d="M 50,0 L 50,675 M 100,0 L 100,675 M 150,0 L 150,675 M 200,0 L 200,675 M 250,0 L 250,675 M 300,0 L 300,675 M 350,0 L 350,675 M 400,0 L 400,675 M 450,0 L 450,675 M 500,0 L 500,675 M 550,0 L 550,675 M 600,0 L 600,675 M 650,0 L 650,675 M 700,0 L 700,675 M 750,0 L 750,675 M 800,0 L 800,675 M 850,0 L 850,675 M 900,0 L 900,675 M 950,0 L 950,675 M 1000,0 L 1000,675 M 1050,0 L 1050,675 M 1100,0 L 1100,675 M 1150,0 L 1150,675" stroke="#ffffff" stroke-width="1" />
  </g>

  <!-- Title/Accent Bar -->
  <rect x="80" y="70" width="160" height="5" rx="2.5" fill="url(#accentGradient)" />
  <text x="80" y="115" font-family="'Inter', sans-serif" font-weight="800" font-size="36" fill="#ffffff" letter-spacing="-0.03em">llm-local-studio-3</text>
  <text x="80" y="145" font-family="'Inter', sans-serif" font-weight="500" font-size="16" fill="#9ca3af" letter-spacing="0.05em">EMBEDDED WEB UI &amp; STATIC ASSETS INTEGRATION</text>

  <!-- Glowing background elements -->
  <circle cx="850" cy="380" r="180" fill="#6366f1" opacity="0.06" filter="url(#glow)" />
  <circle cx="350" cy="400" r="130" fill="#ec4899" opacity="0.04" filter="url(#glow)" />

  <!-- Diagram connection paths -->
  <g stroke="rgba(99, 102, 241, 0.25)" stroke-width="2" fill="none">
    <!-- Curved bundle arrows -->
    <path d="M 330,285 C 420,240 500,240 550,300" stroke-dasharray="6,6" />
    <path d="M 330,360 C 420,340 500,320 550,350" stroke-dasharray="6,6" />
    <path d="M 330,435 C 420,440 500,400 550,370" stroke-dasharray="6,6" />
  </g>

  <!-- Left: Source Assets & Bundling Representation -->
  <g transform="translate(120, 240)">
    <!-- Group box -->
    <rect x="-10" y="-10" width="220" height="270" rx="16" fill="rgba(255, 255, 255, 0.01)" stroke="rgba(255, 255, 255, 0.06)" stroke-width="1.5" />
    <text x="15" y="20" font-family="'Inter', sans-serif" font-weight="700" font-size="12" fill="#9ca3af" letter-spacing="0.1em">WEB SOURCE (ui/dist)</text>

    <!-- index.html File -->
    <g transform="translate(15, 45)">
      <rect width="170" height="50" rx="8" fill="rgba(244, 63, 94, 0.06)" stroke="url(#htmlGrad)" stroke-width="1.5" />
      <rect x="15" y="15" width="20" height="20" rx="4" fill="url(#htmlGrad)" />
      <text x="21" y="29" font-family="monospace" font-weight="bold" font-size="11" fill="#ffffff">&lt;&gt;</text>
      <text x="48" y="26" font-family="monospace" font-weight="bold" font-size="13" fill="#f3f4f6">index.html</text>
      <text x="48" y="40" font-family="'Inter', sans-serif" font-size="10" fill="#9ca3af">SPA Entry Point</text>
    </g>

    <!-- style.css File -->
    <g transform="translate(15, 110)">
      <rect width="170" height="50" rx="8" fill="rgba(99, 102, 241, 0.06)" stroke="#6366f1" stroke-width="1.5" />
      <rect x="15" y="15" width="20" height="20" rx="4" fill="#6366f1" />
      <text x="22" y="29" font-family="monospace" font-weight="bold" font-size="11" fill="#ffffff">#</text>
      <text x="48" y="26" font-family="monospace" font-weight="bold" font-size="13" fill="#f3f4f6">style.css</text>
      <text x="48" y="40" font-family="'Inter', sans-serif" font-size="10" fill="#9ca3af">Glassmorphism UI</text>
    </g>

    <!-- main.js File -->
    <g transform="translate(15, 175)">
      <rect width="170" height="50" rx="8" fill="rgba(234, 179, 8, 0.06)" stroke="url(#jsGrad)" stroke-width="1.5" />
      <rect x="15" y="15" width="20" height="20" rx="4" fill="url(#jsGrad)" />
      <text x="21" y="29" font-family="monospace" font-weight="bold" font-size="11" fill="#0f1115">JS</text>
      <text x="48" y="26" font-family="monospace" font-weight="bold" font-size="13" fill="#f3f4f6">main.js</text>
      <text x="48" y="40" font-family="'Inter', sans-serif" font-size="10" fill="#9ca3af">SSE Streaming Logic</text>
    </g>

    <!-- rust-embed indicator badge -->
    <g transform="translate(60, 235)">
      <rect width="80" height="22" rx="11" fill="#1e1b4b" stroke="#818cf8" stroke-width="1" />
      <text x="40" y="15" font-family="'Inter', sans-serif" font-weight="bold" font-size="9" fill="#c7d2fe" text-anchor="middle">rust-embed</text>
    </g>
  </g>

  <!-- Packaging / Compiler Box in center -->
  <g transform="translate(415, 305)">
    <!-- Glowing outline for Compiler stage -->
    <rect x="-5" y="-5" width="110" height="110" rx="20" fill="none" stroke="#d946ef" stroke-width="2" opacity="0.3" filter="url(#glow)" />
    <!-- Compiler Box -->
    <rect width="100" height="100" rx="16" fill="#181825" stroke="url(#accentGradient)" stroke-width="2" />
    
    <!-- Gear/Binary symbol inside -->
    <path d="M 50,22 C 51.5,22 53,23.5 53,25 L 53,28 C 55.5,28.5 58,29.5 60,31 L 62.5,29 C 63.5,28 65.5,28 66.5,29 L 71,33.5 C 72,34.5 72,36.5 71,37.5 L 69,40 C 70.5,42 71.5,44.5 72,47 L 75,47 C 76.5,47 78,48.5 78,50 C 78,51.5 76.5,53 75,53 L 72,53 C 71.5,55.5 70.5,58 69,60 L 71,62.5 C 72,63.5 72,65.5 71,66.5 L 66.5,71 C 65.5,72 63.5,72 62.5,71 L 60,69 C 58,70.5 55.5,71.5 53,72 L 53,75 C 53,76.5 51.5,78 50,78 C 48.5,78 47,76.5 47,75 L 47,72 C 44.5,71.5 42,70.5 40,69 L 37.5,71 C 36.5,72 34.5,72 33.5,71 L 29,66.5 C 28,65.5 28,63.5 29,62.5 L 31,60 C 29.5,58 28.5,55.5 28,53 L 25,53 C 23.5,53 22,51.5 22,50 C 22,48.5 23.5,47 25,47 L 28,47 C 28.5,44.5 29.5,42 31,40 L 29,37.5 C 28,36.5 28,34.5 29,33.5 L 33.5,29 C 34.5,28 36.5,28 37.5,29 L 40,31 C 42,29.5 44.5,28.5 47,28 L 47,25 C 47,23.5 48.5,22 50,22 Z" fill="none" stroke="#f3f4f6" stroke-dasharray="1.5" stroke-width="1.5" />
    <circle cx="50" cy="50" r="10" fill="none" stroke="#6366f1" stroke-width="2" />
    
    <text x="50" y="93" font-family="'Inter', sans-serif" font-weight="900" font-size="9" fill="#d946ef" text-anchor="middle" letter-spacing="0.15em">COMPILE</text>
  </g>

  <!-- Arrow from compile to Rust app -->
  <path d="M 525,355 L 590,355" stroke="url(#accentGradient)" stroke-width="3" fill="none" marker-end="url(#arrow)" />

  <!-- Right: Compiled Browser / Chat UI Window mockup -->
  <g transform="translate(620, 200)">
    <!-- Glowing background under browser -->
    <rect x="-10" y="-10" width="480" height="340" rx="20" fill="#6366f1" opacity="0.08" filter="url(#glow)" />

    <!-- Browser Container -->
    <rect width="460" height="320" rx="14" fill="#0f1116" stroke="rgba(255, 255, 255, 0.08)" stroke-width="2.5" />
    
    <!-- Browser Title Bar -->
    <rect width="460" height="36" rx="14" fill="url(#windowHeaderGrad)" />
    <!-- Round off bottom corners of header rect -->
    <rect y="20" width="460" height="16" fill="#181b24" />
    <line x1="0" y1="36" x2="460" y2="36" stroke="rgba(255, 255, 255, 0.04)" stroke-width="1" />

    <!-- Window Dots -->
    <circle cx="20" cy="18" r="6" fill="#ef4444" />
    <circle cx="38" cy="18" r="6" fill="#f59e0b" />
    <circle cx="56" cy="18" r="6" fill="#10b981" />

    <!-- Address Bar Mock -->
    <rect x="85" y="7" width="290" height="22" rx="6" fill="rgba(0, 0, 0, 0.4)" stroke="rgba(255, 255, 255, 0.06)" stroke-width="1" />
    <text x="230" y="21" font-family="monospace" font-size="10" fill="#9ca3af" text-anchor="middle">http://localhost:8080/</text>

    <!-- Browser Content: Sidebar (Glassmorphism) -->
    <rect x="0" y="36" width="130" height="284" fill="rgba(255, 255, 255, 0.02)" />
    <line x1="130" y1="36" x2="130" y2="320" stroke="rgba(255, 255, 255, 0.06)" stroke-width="1.5" />
    
    <!-- Sidebar Items -->
    <text x="15" y="65" font-family="'Inter', sans-serif" font-weight="800" font-size="12" fill="#ffffff" letter-spacing="-0.02em">LLM Studio</text>
    
    <!-- Connection pulsing indicator -->
    <g transform="translate(15, 80)">
      <!-- Pulsing Glow -->
      <circle cx="5" cy="5" r="5" fill="#10b981" opacity="0.4" filter="url(#pulseGlow)" />
      <circle cx="5" cy="5" r="3" fill="#10b981" />
      <text x="16" y="8" font-family="'Inter', sans-serif" font-size="9" fill="#9ca3af">Connected</text>
    </g>

    <!-- Model selector label -->
    <text x="15" y="122" font-family="'Inter', sans-serif" font-weight="600" font-size="8" fill="#6b7280" letter-spacing="0.05em">SELECT MODEL</text>
    <rect x="15" y="130" width="100" height="24" rx="6" fill="rgba(0, 0, 0, 0.3)" stroke="rgba(255, 255, 255, 0.08)" stroke-width="1" />
    <text x="23" y="145" font-family="'Inter', sans-serif" font-size="9" fill="#f3f4f6">gemma-4-E4B-it</text>
    <!-- select icon -->
    <path d="M 103,140 L 107,144 L 111,140" stroke="#9ca3af" stroke-width="1" fill="none" />

    <!-- Browser Content: Chat Area -->
    <!-- Chat Header -->
    <text x="145" y="62" font-family="'Inter', sans-serif" font-weight="700" font-size="13" fill="#f3f4f6">gemma-4-E4B-it</text>
    <text x="145" y="75" font-family="'Inter', sans-serif" font-size="9" fill="#6b7280">Local Inference Engine</text>
    <line x1="130" y1="85" x2="460" y2="85" stroke="rgba(255, 255, 255, 0.04)" stroke-width="1" />

    <!-- Chat History Message Bubbles -->
    <!-- User Bubble -->
    <g transform="translate(250, 100)">
      <path d="M 10,0 H 190 A 10,10 0 0 1 200,10 V 30 A 10,10 0 0 1 190,40 H 0 L 10,30 Z" fill="url(#userMsgGrad)" />
      <text x="25" y="24" font-family="'Inter', sans-serif" font-size="11" fill="#ffffff">What is Ownership in Rust?</text>
    </g>

    <!-- AI Bubble (Streaming) -->
    <g transform="translate(145, 155)">
      <path d="M 0,0 H 190 A 10,10 0 0 1 200,10 V 40 A 10,10 0 0 1 190,50 H 10 L 0,40 Z" fill="rgba(255, 255, 255, 0.05)" stroke="rgba(255, 255, 255, 0.06)" stroke-width="1" />
      <text x="18" y="22" font-family="'Inter', sans-serif" font-size="11" fill="#e5e7eb">Ownership is Rust's key feature</text>
      <text x="18" y="38" font-family="'Inter', sans-serif" font-size="11" fill="#e5e7eb">to manage memory safely</text>
      <!-- Blinking Cursor -->
      <rect x="156" y="28" width="5" height="11" fill="#ffffff" opacity="0.8" />
    </g>

    <!-- Input Box -->
    <g transform="translate(145, 262)">
      <rect width="300" height="36" rx="18" fill="rgba(0, 0, 0, 0.4)" stroke="rgba(99, 102, 241, 0.4)" stroke-width="1.5" />
      <text x="18" y="22" font-family="'Inter', sans-serif" font-size="11" fill="#4b5563">Type a message...</text>
      
      <!-- Send Button inside input -->
      <circle cx="280" cy="18" r="12" fill="#6366f1" />
      <!-- Arrow icon -->
      <path d="M 276,18 L 284,18 M 281,14 L 285,18 L 281,22" stroke="#ffffff" stroke-width="1.5" fill="none" />
    </g>
  </g>

  <!-- Rust Executable badge below browser -->
  <g transform="translate(740, 550)">
    <rect width="220" height="42" rx="10" fill="#1e1e38" stroke="url(#accentGradient)" stroke-width="2" />
    <!-- Mini Rust Logo representation -->
    <circle cx="30" cy="21" r="10" fill="url(#rustLogoGrad)" />
    <text x="30" y="25" font-family="monospace" font-weight="bold" font-size="13" fill="#ffffff" text-anchor="middle">R</text>
    
    <text x="56" y="21" font-family="monospace" font-weight="bold" font-size="12" fill="#ffffff">llm-local-studio-3</text>
    <text x="56" y="34" font-family="'Inter', sans-serif" font-size="9" fill="#a5b4fc">Single Executable Server</text>
  </g>
</svg>
