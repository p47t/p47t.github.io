<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1b26;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#24283b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="controllerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#565f89;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#414868;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff9e64;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f7768e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="signalGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7dcfff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7aa2f7;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="675" fill="url(#bgGradient)"/>

  <!-- Grid pattern -->
  <g opacity="0.05">
    <line x1="0" y1="0" x2="0" y2="675" stroke="#7aa2f7" stroke-width="1" transform="translate(100,0)" />
    <line x1="0" y1="0" x2="0" y2="675" stroke="#7aa2f7" stroke-width="1" transform="translate(200,0)" />
    <line x1="0" y1="0" x2="0" y2="675" stroke="#7aa2f7" stroke-width="1" transform="translate(300,0)" />
    <line x1="0" y1="0" x2="0" y2="675" stroke="#7aa2f7" stroke-width="1" transform="translate(400,0)" />
    <line x1="0" y1="0" x2="0" y2="675" stroke="#7aa2f7" stroke-width="1" transform="translate(500,0)" />
    <line x1="0" y1="0" x2="0" y2="675" stroke="#7aa2f7" stroke-width="1" transform="translate(600,0)" />
    <line x1="0" y1="0" x2="0" y2="675" stroke="#7aa2f7" stroke-width="1" transform="translate(700,0)" />
    <line x1="0" y1="0" x2="0" y2="675" stroke="#7aa2f7" stroke-width="1" transform="translate(800,0)" />
    <line x1="0" y1="0" x2="0" y2="675" stroke="#7aa2f7" stroke-width="1" transform="translate(900,0)" />
    <line x1="0" y1="0" x2="0" y2="675" stroke="#7aa2f7" stroke-width="1" transform="translate(1000,0)" />
    <line x1="0" y1="0" x2="0" y2="675" stroke="#7aa2f7" stroke-width="1" transform="translate(1100,0)" />
  </g>

  <!-- Accent bar -->
  <rect x="50" y="50" width="120" height="4" fill="url(#accentGradient)" rx="2"/>

  <!-- NES Controller body -->
  <g transform="translate(600, 300)">
    <!-- Controller outline -->
    <rect x="-220" y="-80" width="440" height="160" rx="20" fill="url(#controllerGrad)" stroke="#73859f" stroke-width="2"/>
    <!-- Inner dark area -->
    <rect x="-200" y="-60" width="400" height="120" rx="12" fill="#1a1b26" stroke="#414868" stroke-width="1"/>

    <!-- D-pad -->
    <g transform="translate(-120, 0)">
      <rect x="-15" y="-45" width="30" height="90" rx="4" fill="#565f89"/>
      <rect x="-45" y="-15" width="90" height="30" rx="4" fill="#565f89"/>
      <!-- D-pad highlights -->
      <text x="0" y="-22" font-family="monospace" font-size="14" fill="#9ece6a" text-anchor="middle">↑</text>
      <text x="0" y="30" font-family="monospace" font-size="14" fill="#9ece6a" text-anchor="middle">↓</text>
      <text x="-28" y="5" font-family="monospace" font-size="14" fill="#9ece6a" text-anchor="middle">←</text>
      <text x="28" y="5" font-family="monospace" font-size="14" fill="#9ece6a" text-anchor="middle">→</text>
    </g>

    <!-- Select / Start buttons -->
    <g transform="translate(0, 20)">
      <rect x="-45" y="-8" width="35" height="16" rx="8" fill="#565f89"/>
      <rect x="10" y="-8" width="35" height="16" rx="8" fill="#565f89"/>
      <text x="-27" y="4" font-family="Arial, sans-serif" font-size="7" fill="#a9b1d6" text-anchor="middle">SEL</text>
      <text x="27" y="4" font-family="Arial, sans-serif" font-size="7" fill="#a9b1d6" text-anchor="middle">START</text>
    </g>

    <!-- A and B buttons -->
    <g transform="translate(120, -5)">
      <circle cx="30" cy="0" r="18" fill="#f7768e"/>
      <text x="30" y="5" font-family="Arial, sans-serif" font-size="14" fill="#1a1b26" text-anchor="middle" font-weight="bold">A</text>
      <circle cx="-20" cy="0" r="18" fill="#f7768e"/>
      <text x="-20" y="5" font-family="Arial, sans-serif" font-size="14" fill="#1a1b26" text-anchor="middle" font-weight="bold">B</text>
    </g>
  </g>

  <!-- Strobe signal visualization -->
  <g transform="translate(600, 480)">
    <!-- Signal line -->
    <text x="-250" y="-20" font-family="monospace" font-size="13" fill="#7dcfff">$4016 Strobe:</text>

    <!-- Signal waveform -->
    <polyline points="-140,-10 -100,-10 -100,-40 -40,-40 -40,-10 200,-10"
              fill="none" stroke="url(#signalGrad)" stroke-width="2.5"/>

    <!-- Labels -->
    <text x="-70" y="-45" font-family="monospace" font-size="11" fill="#bb9af7" text-anchor="middle">HIGH</text>
    <text x="-70" y="5" font-family="monospace" font-size="11" fill="#565f89" text-anchor="middle">LOW</text>
    <text x="-40" y="20" font-family="monospace" font-size="10" fill="#ff9e64" text-anchor="middle">latch!</text>

    <!-- Read bits -->
    <g transform="translate(-10, -10)">
      <text x="0" y="20" font-family="monospace" font-size="10" fill="#9ece6a">A</text>
      <text x="25" y="20" font-family="monospace" font-size="10" fill="#9ece6a">B</text>
      <text x="50" y="20" font-family="monospace" font-size="10" fill="#9ece6a">Sel</text>
      <text x="80" y="20" font-family="monospace" font-size="10" fill="#9ece6a">St</text>
      <text x="105" y="20" font-family="monospace" font-size="10" fill="#9ece6a">↑</text>
      <text x="125" y="20" font-family="monospace" font-size="10" fill="#9ece6a">↓</text>
      <text x="145" y="20" font-family="monospace" font-size="10" fill="#9ece6a">←</text>
      <text x="165" y="20" font-family="monospace" font-size="10" fill="#9ece6a">→</text>
      <!-- Tick marks -->
      <line x1="5" y1="-3" x2="5" y2="5" stroke="#565f89" stroke-width="1"/>
      <line x1="30" y1="-3" x2="30" y2="5" stroke="#565f89" stroke-width="1"/>
      <line x1="57" y1="-3" x2="57" y2="5" stroke="#565f89" stroke-width="1"/>
      <line x1="84" y1="-3" x2="84" y2="5" stroke="#565f89" stroke-width="1"/>
      <line x1="108" y1="-3" x2="108" y2="5" stroke="#565f89" stroke-width="1"/>
      <line x1="128" y1="-3" x2="128" y2="5" stroke="#565f89" stroke-width="1"/>
      <line x1="148" y1="-3" x2="148" y2="5" stroke="#565f89" stroke-width="1"/>
      <line x1="170" y1="-3" x2="170" y2="5" stroke="#565f89" stroke-width="1"/>
    </g>
  </g>

  <!-- Title -->
  <text x="600" y="110" font-family="Arial, sans-serif" font-size="38" fill="#c0caf5" text-anchor="middle" font-weight="bold">
    NES Joypad 模擬器
  </text>
  <text x="600" y="150" font-family="Arial, sans-serif" font-size="20" fill="#a9b1d6" text-anchor="middle">
    Strobe Protocol &amp; System Integration
  </text>

  <!-- Tech tags -->
  <g transform="translate(600, 600)">
    <g transform="translate(-120, 0)">
      <rect x="-40" y="-18" width="80" height="36" rx="6"
            fill="rgba(255, 158, 100, 0.2)" stroke="#ff9e64" stroke-width="2"/>
      <text x="0" y="4" font-family="monospace" font-size="16"
            fill="#ff9e64" text-anchor="middle">Rust</text>
    </g>
    <g transform="translate(0, 0)">
      <rect x="-40" y="-18" width="80" height="36" rx="6"
            fill="rgba(125, 207, 255, 0.2)" stroke="#7dcfff" stroke-width="2"/>
      <text x="0" y="4" font-family="monospace" font-size="16"
            fill="#7dcfff" text-anchor="middle">NES</text>
    </g>
    <g transform="translate(120, 0)">
      <rect x="-45" y="-18" width="90" height="36" rx="6"
            fill="rgba(187, 154, 247, 0.2)" stroke="#bb9af7" stroke-width="2"/>
      <text x="0" y="4" font-family="monospace" font-size="16"
            fill="#bb9af7" text-anchor="middle">Input</text>
    </g>
  </g>

  <!-- Branding -->
  <text x="1160" y="645" font-family="Arial, sans-serif" font-size="18"
        fill="rgba(255, 255, 255, 0.5)" text-anchor="end">
    blog.simplypatrick.com
  </text>
</svg>