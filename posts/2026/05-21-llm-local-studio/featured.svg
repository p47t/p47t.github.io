<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1b26;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#24283b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="rustGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b35;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f7931e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="codeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7dcfff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5a9fcc;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="hfGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff9e64;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e0af68;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff6b35;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7dcfff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="streamGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#9ece6a;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#73daca;stop-opacity:0.8" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="675" fill="url(#bgGradient)" />

  <!-- Subtle grid -->
  <g opacity="0.05">
    <line x1="0" y1="0" x2="1200" y2="675" stroke="#7dcfff" stroke-width="0.5" />
    <line x1="200" y1="0" x2="1200" y2="500" stroke="#7dcfff" stroke-width="0.5" />
    <line x1="0" y1="200" x2="1000" y2="675" stroke="#7dcfff" stroke-width="0.5" />
    <line x1="400" y1="0" x2="1200" y2="400" stroke="#7dcfff" stroke-width="0.5" />
    <line x1="0" y1="400" x2="800" y2="675" stroke="#7dcfff" stroke-width="0.5" />
    <line x1="600" y1="0" x2="1200" y2="300" stroke="#7dcfff" stroke-width="0.5" />
  </g>

  <!-- Accent bar -->
  <rect x="50" y="50" width="120" height="4" fill="url(#accentGradient)" rx="2" />

  <!-- Left side: Model Registry + HF section -->
  <g transform="translate(80, 100)">
    <!-- Terminal window -->
    <rect x="0" y="0" width="480" height="280" rx="12" fill="rgba(30, 32, 48, 0.9)" stroke="rgba(125, 207, 255, 0.3)" stroke-width="1.5" />
    <!-- Title bar -->
    <rect x="0" y="0" width="480" height="32" rx="12" fill="rgba(55, 60, 85, 0.8)" />
    <rect x="0" y="12" width="480" height="20" fill="rgba(55, 60, 85, 0.8)" />
    <circle cx="20" cy="16" r="5" fill="#ff6b35" opacity="0.8" />
    <circle cx="38" cy="16" r="5" fill="#e0af68" opacity="0.8" />
    <circle cx="56" cy="16" r="5" fill="#9ece6a" opacity="0.8" />
    <text x="240" y="20" font-family="monospace" font-size="12" fill="rgba(125, 207, 255, 0.6)" text-anchor="middle">llm-local-studio</text>

    <!-- CLI content -->
    <text y="58" font-family="monospace" font-size="13" fill="#9ece6a">
      <tspan x="16" dy="0">$ llm-local-studio hf-search tinyllama</tspan>
    </text>
    <text y="80" font-family="monospace" font-size="12" fill="#7dcfff">
      <tspan x="16" dy="0">TheBloke/TinyLlama-1.1B-GGUF</tspan>
      <tspan x="16" dy="18">  downloads: 1.2M</tspan>
      <tspan x="16" dy="18">  likes: 523</tspan>
    </text>

    <text y="162" font-family="monospace" font-size="13" fill="#9ece6a">
      <tspan x="16" dy="0">$ llm-local-studio hf-download \</tspan>
      <tspan x="16" dy="18">  TheBloke/TinyLlama-1.1B-GGUF</tspan>
    </text>
    <text y="212" font-family="monospace" font-size="12" fill="#ff9e64">
      <tspan x="16" dy="0">model: TheBloke/TinyLlama-1.1B-GGUF</tspan>
      <tspan x="16" dy="18">file: tinyllama.Q4_K_M.gguf</tspan>
      <tspan x="16" dy="18">downloading... ████████████ 100%</tspan>
    </text>
  </g>

  <!-- Right side: Inference streaming output -->
  <g transform="translate(610, 100)">
    <rect x="0" y="0" width="510" height="280" rx="12" fill="rgba(30, 32, 48, 0.9)" stroke="rgba(158, 206, 106, 0.3)" stroke-width="1.5" />
    <!-- Title bar -->
    <rect x="0" y="0" width="510" height="32" rx="12" fill="rgba(55, 60, 85, 0.8)" />
    <rect x="0" y="12" width="510" height="20" fill="rgba(55, 60, 85, 0.8)" />
    <circle cx="20" cy="16" r="5" fill="#ff6b35" opacity="0.8" />
    <circle cx="38" cy="16" r="5" fill="#e0af68" opacity="0.8" />
    <circle cx="56" cy="16" r="5" fill="#9ece6a" opacity="0.8" />
    <text x="255" y="20" font-family="monospace" font-size="12" fill="rgba(158, 206, 106, 0.6)" text-anchor="middle">run — streaming inference</text>

    <text y="58" font-family="monospace" font-size="13" fill="#9ece6a">
      <tspan x="16" dy="0">$ llm-local-studio run tinyllama \</tspan>
      <tspan x="16" dy="18">  -p "Explain ownership in Rust"</tspan>
    </text>

    <text y="108" font-family="monospace" font-size="12" fill="rgba(255, 255, 255, 0.85)">
      <tspan x="16" dy="0">In Rust, ownership is a set of rules</tspan>
      <tspan x="16" dy="18">that governs how memory is managed.</tspan>
      <tspan x="16" dy="18">Every value has a single owner, and</tspan>
      <tspan x="16" dy="18">when the owner goes out of scope, the</tspan>
      <tspan x="16" dy="18">value is dropped automatically. This</tspan>
      <tspan x="16" dy="18">eliminates the need for garbage</tspan>
      <tspan x="16" dy="18">collection...</tspan>
    </text>

    <!-- Blinking cursor -->
    <rect x="310" y="222" width="8" height="16" fill="#9ece6a" opacity="0.8">
      <animate attributeName="opacity" values="0.8;0;0.8" dur="1.2s" repeatCount="indefinite" />
    </rect>
  </g>

  <!-- Center: Architecture flow diagram -->
  <g transform="translate(80, 420)">
    <!-- Flow boxes -->
    <rect x="0" y="0" width="140" height="52" rx="8" fill="rgba(125, 207, 255, 0.15)" stroke="#7dcfff" stroke-width="1.5" />
    <text x="70" y="20" font-family="monospace" font-size="11" fill="#7dcfff" text-anchor="middle">CLI</text>
    <text x="70" y="36" font-family="sans-serif" font-size="9" fill="rgba(125, 207, 255, 0.6)" text-anchor="middle">App Shell</text>

    <text x="155" y="28" font-family="monospace" font-size="16" fill="rgba(125, 207, 255, 0.5)">→</text>

    <rect x="172" y="0" width="160" height="52" rx="8" fill="rgba(158, 206, 106, 0.15)" stroke="#9ece6a" stroke-width="1.5" />
    <text x="252" y="20" font-family="monospace" font-size="11" fill="#9ece6a" text-anchor="middle">Model Registry</text>
    <text x="252" y="36" font-family="sans-serif" font-size="9" fill="rgba(158, 206, 106, 0.6)" text-anchor="middle">Scan · Find · Manage</text>

    <text x="347" y="28" font-family="monospace" font-size="16" fill="rgba(158, 206, 106, 0.5)">→</text>

    <rect x="364" y="0" width="160" height="52" rx="8" fill="rgba(255, 158, 100, 0.15)" stroke="#ff9e64" stroke-width="1.5" />
    <text x="444" y="20" font-family="monospace" font-size="11" fill="#ff9e64" text-anchor="middle">Hugging Face</text>
    <text x="444" y="36" font-family="sans-serif" font-size="9" fill="rgba(255, 158, 100, 0.6)" text-anchor="middle">Search · Download</text>

    <text x="539" y="28" font-family="monospace" font-size="16" fill="rgba(255, 158, 100, 0.5)">→</text>

    <rect x="556" y="0" width="140" height="52" rx="8" fill="rgba(255, 107, 53, 0.15)" stroke="#ff6b35" stroke-width="1.5" />
    <text x="626" y="20" font-family="monospace" font-size="11" fill="#ff6b35" text-anchor="middle">llama.cpp</text>
    <text x="626" y="36" font-family="sans-serif" font-size="9" fill="rgba(255, 107, 53, 0.6)" text-anchor="middle">Native FFI</text>

    <text x="711" y="28" font-family="monospace" font-size="16" fill="rgba(255, 107, 53, 0.5)">→</text>

    <rect x="728" y="0" width="140" height="52" rx="8" fill="rgba(115, 218, 202, 0.15)" stroke="#73daca" stroke-width="1.5" />
    <text x="798" y="20" font-family="monospace" font-size="11" fill="#73daca" text-anchor="middle">KV Cache</text>
    <text x="798" y="36" font-family="sans-serif" font-size="9" fill="rgba(115, 218, 202, 0.6)" text-anchor="middle">Pre-fill · Stream</text>

    <text x="883" y="28" font-family="monospace" font-size="16" fill="rgba(115, 218, 202, 0.5)">→</text>

    <rect x="900" y="0" width="140" height="52" rx="8" fill="rgba(187, 154, 247, 0.15)" stroke="#bb9af7" stroke-width="1.5" />
    <text x="970" y="20" font-family="monospace" font-size="11" fill="#bb9af7" text-anchor="middle">Output</text>
    <text x="970" y="36" font-family="sans-serif" font-size="9" fill="rgba(187, 154, 247, 0.6)" text-anchor="middle">Token by Token</text>
  </g>

  <!-- GGUF file icon -->
  <g transform="translate(570, 440)">
    <rect x="0" y="0" width="48" height="60" rx="4" fill="rgba(255, 158, 100, 0.2)" stroke="#ff9e64" stroke-width="1" />
    <text x="24" y="30" font-family="monospace" font-size="9" fill="#ff9e64" text-anchor="middle">.gguf</text>
    <path d="M30 0 L48 18" stroke="rgba(255, 158, 100, 0.4)" stroke-width="1" fill="none" />
  </g>

  <!-- Title at bottom -->
  <text x="600" y="545" font-family="Arvo, serif" font-size="32" fill="rgba(255, 255, 255, 0.95)" text-anchor="middle" font-weight="bold">
    本地 LLM 工作站
  </text>
  <text x="600" y="575" font-family="sans-serif" font-size="18" fill="rgba(125, 207, 255, 0.7)" text-anchor="middle">
    llama.cpp Native FFI · Hugging Face · Rust
  </text>

  <!-- Tech tags -->
  <g transform="translate(600, 610)">
    <g transform="translate(-160, 0)">
      <rect x="-35" y="-16" width="70" height="32" rx="6" fill="rgba(255, 107, 53, 0.2)" stroke="#ff6b35" stroke-width="1.5" />
      <text x="0" y="4" font-family="monospace" font-size="14" fill="#ff6b35" text-anchor="middle">Rust</text>
    </g>
    <g transform="translate(-60, 0)">
      <rect x="-50" y="-16" width="100" height="32" rx="6" fill="rgba(125, 207, 255, 0.2)" stroke="#7dcfff" stroke-width="1.5" />
      <text x="0" y="4" font-family="monospace" font-size="14" fill="#7dcfff" text-anchor="middle">llama.cpp</text>
    </g>
    <g transform="translate(65, 0)">
      <rect x="-55" y="-16" width="110" height="32" rx="6" fill="rgba(255, 158, 100, 0.2)" stroke="#ff9e64" stroke-width="1.5" />
      <text x="0" y="4" font-family="monospace" font-size="14" fill="#ff9e64" text-anchor="middle">GGUF</text>
    </g>
    <g transform="translate(195, 0)">
      <rect x="-62" y="-16" width="124" height="32" rx="6" fill="rgba(158, 206, 106, 0.2)" stroke="#9ece6a" stroke-width="1.5" />
      <text x="0" y="4" font-family="monospace" font-size="14" fill="#9ece6a" text-anchor="middle">HuggingFace</text>
    </g>
  </g>

  <!-- Branding -->
  <text x="1160" y="645" font-family="Arial, sans-serif" font-size="18" fill="rgba(255, 255, 255, 0.5)" text-anchor="end">
    blog.simplypatrick.com
  </text>
</svg>
