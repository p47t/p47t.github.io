<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1b26;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#24283b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff9e64;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f7768e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="romGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7aa2f7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5a7fcf;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bankGrad0" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#9ece6a;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#73a94e;stop-opacity:0.8" />
    </linearGradient>
    <linearGradient id="bankGrad1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#bb9af7;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#9475c7;stop-opacity:0.8" />
    </linearGradient>
    <linearGradient id="bankGrad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f7768e;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#c95e72;stop-opacity:0.8" />
    </linearGradient>
    <linearGradient id="bankGrad3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff9e64;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#cc7e50;stop-opacity:0.8" />
    </linearGradient>
    <linearGradient id="mapperGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e0af68;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b38c53;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="675" fill="url(#bgGradient)"/>

  <!-- Grid pattern -->
  <g opacity="0.04">
    <line x1="0" y1="0" x2="0" y2="675" stroke="#7aa2f7" stroke-width="1" transform="translate(100,0)" />
    <line x1="0" y1="0" x2="0" y2="675" stroke="#7aa2f7" stroke-width="1" transform="translate(200,0)" />
    <line x1="0" y1="0" x2="0" y2="675" stroke="#7aa2f7" stroke-width="1" transform="translate(300,0)" />
    <line x1="0" y1="0" x2="0" y2="675" stroke="#7aa2f7" stroke-width="1" transform="translate(400,0)" />
    <line x1="0" y1="0" x2="0" y2="675" stroke="#7aa2f7" stroke-width="1" transform="translate(500,0)" />
    <line x1="0" y1="0" x2="0" y2="675" stroke="#7aa2f7" stroke-width="1" transform="translate(600,0)" />
    <line x1="0" y1="0" x2="0" y2="675" stroke="#7aa2f7" stroke-width="1" transform="translate(700,0)" />
    <line x1="0" y1="0" x2="0" y2="675" stroke="#7aa2f7" stroke-width="1" transform="translate(800,0)" />
    <line x1="0" y1="0" x2="0" y2="675" stroke="#7aa2f7" stroke-width="1" transform="translate(900,0)" />
    <line x1="0" y1="0" x2="0" y2="675" stroke="#7aa2f7" stroke-width="1" transform="translate(1000,0)" />
    <line x1="0" y1="0" x2="0" y2="675" stroke="#7aa2f7" stroke-width="1" transform="translate(1100,0)" />
  </g>

  <!-- Accent bar -->
  <rect x="50" y="50" width="120" height="4" fill="url(#accentGradient)" rx="2"/>

  <!-- Title -->
  <text x="600" y="100" font-family="Arial, sans-serif" font-size="38" fill="#c0caf5" text-anchor="middle" font-weight="bold">
    NES Mapper 模擬器
  </text>
  <text x="600" y="140" font-family="Arial, sans-serif" font-size="20" fill="#a9b1d6" text-anchor="middle">
    Bank Switching &amp; Cartridge Hardware
  </text>

  <!-- ROM (left side) - tall block representing full ROM -->
  <g transform="translate(180, 220)">
    <text x="0" y="-15" font-family="monospace" font-size="14" fill="#7dcfff" text-anchor="middle">ROM (512KB)</text>

    <!-- ROM banks stacked -->
    <rect x="-60" y="0" width="120" height="35" rx="4" fill="url(#bankGrad0)" stroke="#9ece6a" stroke-width="1"/>
    <text x="0" y="22" font-family="monospace" font-size="12" fill="#1a1b26" text-anchor="middle">Bank 0</text>

    <rect x="-60" y="40" width="120" height="35" rx="4" fill="url(#bankGrad1)" stroke="#bb9af7" stroke-width="1"/>
    <text x="0" y="62" font-family="monospace" font-size="12" fill="#1a1b26" text-anchor="middle">Bank 1</text>

    <rect x="-60" y="80" width="120" height="35" rx="4" fill="url(#bankGrad2)" stroke="#f7768e" stroke-width="1"/>
    <text x="0" y="102" font-family="monospace" font-size="12" fill="#1a1b26" text-anchor="middle">Bank 2</text>

    <rect x="-60" y="120" width="120" height="35" rx="4" fill="url(#bankGrad3)" stroke="#ff9e64" stroke-width="1"/>
    <text x="0" y="142" font-family="monospace" font-size="12" fill="#1a1b26" text-anchor="middle">Bank 3</text>

    <!-- Dots for more banks -->
    <text x="0" y="175" font-family="monospace" font-size="16" fill="#565f89" text-anchor="middle">. . .</text>

    <rect x="-60" y="190" width="120" height="35" rx="4" fill="rgba(122, 162, 247, 0.3)" stroke="#7aa2f7" stroke-width="1"/>
    <text x="0" y="212" font-family="monospace" font-size="12" fill="#7aa2f7" text-anchor="middle">Bank N</text>
  </g>

  <!-- Mapper chip (center) -->
  <g transform="translate(530, 340)">
    <!-- Chip body -->
    <rect x="-80" y="-60" width="160" height="120" rx="8" fill="url(#mapperGrad)" stroke="#c09650" stroke-width="2"/>

    <!-- Chip pins left -->
    <rect x="-95" y="-40" width="18" height="6" rx="1" fill="#a9b1d6"/>
    <rect x="-95" y="-25" width="18" height="6" rx="1" fill="#a9b1d6"/>
    <rect x="-95" y="-10" width="18" height="6" rx="1" fill="#a9b1d6"/>
    <rect x="-95" y="5" width="18" height="6" rx="1" fill="#a9b1d6"/>
    <rect x="-95" y="20" width="18" height="6" rx="1" fill="#a9b1d6"/>
    <rect x="-95" y="35" width="18" height="6" rx="1" fill="#a9b1d6"/>

    <!-- Chip pins right -->
    <rect x="77" y="-40" width="18" height="6" rx="1" fill="#a9b1d6"/>
    <rect x="77" y="-25" width="18" height="6" rx="1" fill="#a9b1d6"/>
    <rect x="77" y="-10" width="18" height="6" rx="1" fill="#a9b1d6"/>
    <rect x="77" y="5" width="18" height="6" rx="1" fill="#a9b1d6"/>
    <rect x="77" y="20" width="18" height="6" rx="1" fill="#a9b1d6"/>
    <rect x="77" y="35" width="18" height="6" rx="1" fill="#a9b1d6"/>

    <!-- Chip label -->
    <text x="0" y="-15" font-family="monospace" font-size="16" fill="#1a1b26" text-anchor="middle" font-weight="bold">MAPPER</text>
    <text x="0" y="8" font-family="monospace" font-size="12" fill="#1a1b26" text-anchor="middle">Bank Switch</text>
    <text x="0" y="28" font-family="monospace" font-size="11" fill="rgba(26,27,38,0.7)" text-anchor="middle">MMC1/MMC3/...</text>

    <!-- Notch -->
    <circle cx="0" cy="-55" r="6" fill="#c09650" stroke="#b38c53" stroke-width="1"/>
  </g>

  <!-- CPU Address Space (right side) -->
  <g transform="translate(880, 220)">
    <text x="0" y="-15" font-family="monospace" font-size="14" fill="#7dcfff" text-anchor="middle">CPU Space (32KB)</text>

    <!-- Address blocks -->
    <rect x="-70" y="0" width="140" height="55" rx="4" fill="url(#bankGrad2)" stroke="#f7768e" stroke-width="1.5"/>
    <text x="0" y="22" font-family="monospace" font-size="11" fill="#1a1b26" text-anchor="middle" font-weight="bold">$8000-$9FFF</text>
    <text x="0" y="40" font-family="monospace" font-size="10" fill="#1a1b26" text-anchor="middle">Switchable</text>

    <rect x="-70" y="62" width="140" height="55" rx="4" fill="url(#bankGrad0)" stroke="#9ece6a" stroke-width="1.5"/>
    <text x="0" y="84" font-family="monospace" font-size="11" fill="#1a1b26" text-anchor="middle" font-weight="bold">$A000-$BFFF</text>
    <text x="0" y="102" font-family="monospace" font-size="10" fill="#1a1b26" text-anchor="middle">Switchable</text>

    <rect x="-70" y="124" width="140" height="55" rx="4" fill="url(#bankGrad1)" stroke="#bb9af7" stroke-width="1.5"/>
    <text x="0" y="146" font-family="monospace" font-size="11" fill="#1a1b26" text-anchor="middle" font-weight="bold">$C000-$DFFF</text>
    <text x="0" y="164" font-family="monospace" font-size="10" fill="#1a1b26" text-anchor="middle">Mode-dependent</text>

    <rect x="-70" y="186" width="140" height="55" rx="4" fill="rgba(122, 162, 247, 0.4)" stroke="#7aa2f7" stroke-width="1.5"/>
    <text x="0" y="208" font-family="monospace" font-size="11" fill="#c0caf5" text-anchor="middle" font-weight="bold">$E000-$FFFF</text>
    <text x="0" y="226" font-family="monospace" font-size="10" fill="#c0caf5" text-anchor="middle">Fixed (last)</text>
  </g>

  <!-- Arrows: ROM → Mapper -->
  <g>
    <line x1="250" y1="300" x2="440" y2="320" stroke="#9ece6a" stroke-width="2" stroke-dasharray="6,4" opacity="0.7"/>
    <line x1="250" y1="340" x2="440" y2="340" stroke="#bb9af7" stroke-width="2" stroke-dasharray="6,4" opacity="0.7"/>
    <line x1="250" y1="380" x2="440" y2="360" stroke="#f7768e" stroke-width="2" stroke-dasharray="6,4" opacity="0.7"/>
  </g>

  <!-- Arrows: Mapper → CPU -->
  <g>
    <line x1="620" y1="310" x2="800" y2="250" stroke="#f7768e" stroke-width="2.5" marker-end="url(#arrowRed)"/>
    <line x1="620" y1="330" x2="800" y2="310" stroke="#9ece6a" stroke-width="2.5"/>
    <line x1="620" y1="350" x2="800" y2="380" stroke="#bb9af7" stroke-width="2.5"/>
    <line x1="620" y1="370" x2="800" y2="430" stroke="#7aa2f7" stroke-width="2.5"/>

    <!-- Arrow heads -->
    <polygon points="800,250 790,244 790,256" fill="#f7768e"/>
    <polygon points="800,310 790,304 790,316" fill="#9ece6a"/>
    <polygon points="800,380 790,374 790,386" fill="#bb9af7"/>
    <polygon points="800,430 790,424 790,436" fill="#7aa2f7"/>
  </g>

  <!-- Mapper type badges at bottom -->
  <g transform="translate(600, 560)">
    <g transform="translate(-400, 0)">
      <rect x="-42" y="-16" width="84" height="32" rx="5" fill="rgba(158, 206, 106, 0.15)" stroke="#9ece6a" stroke-width="1.5"/>
      <text x="0" y="4" font-family="monospace" font-size="13" fill="#9ece6a" text-anchor="middle">NROM</text>
    </g>
    <g transform="translate(-260, 0)">
      <rect x="-42" y="-16" width="84" height="32" rx="5" fill="rgba(187, 154, 247, 0.15)" stroke="#bb9af7" stroke-width="1.5"/>
      <text x="0" y="4" font-family="monospace" font-size="13" fill="#bb9af7" text-anchor="middle">MMC1</text>
    </g>
    <g transform="translate(-120, 0)">
      <rect x="-42" y="-16" width="84" height="32" rx="5" fill="rgba(125, 207, 255, 0.15)" stroke="#7dcfff" stroke-width="1.5"/>
      <text x="0" y="4" font-family="monospace" font-size="13" fill="#7dcfff" text-anchor="middle">UxROM</text>
    </g>
    <g transform="translate(20, 0)">
      <rect x="-42" y="-16" width="84" height="32" rx="5" fill="rgba(224, 175, 104, 0.15)" stroke="#e0af68" stroke-width="1.5"/>
      <text x="0" y="4" font-family="monospace" font-size="13" fill="#e0af68" text-anchor="middle">CNROM</text>
    </g>
    <g transform="translate(160, 0)">
      <rect x="-42" y="-16" width="84" height="32" rx="5" fill="rgba(247, 118, 142, 0.15)" stroke="#f7768e" stroke-width="1.5"/>
      <text x="0" y="4" font-family="monospace" font-size="13" fill="#f7768e" text-anchor="middle">MMC3</text>
    </g>
    <g transform="translate(300, 0)">
      <rect x="-42" y="-16" width="84" height="32" rx="5" fill="rgba(255, 158, 100, 0.15)" stroke="#ff9e64" stroke-width="1.5"/>
      <text x="0" y="4" font-family="monospace" font-size="13" fill="#ff9e64" text-anchor="middle">AxROM</text>
    </g>
  </g>

  <!-- Tech tags -->
  <g transform="translate(600, 620)">
    <g transform="translate(-60, 0)">
      <rect x="-40" y="-16" width="80" height="32" rx="6"
            fill="rgba(255, 158, 100, 0.2)" stroke="#ff9e64" stroke-width="2"/>
      <text x="0" y="4" font-family="monospace" font-size="15"
            fill="#ff9e64" text-anchor="middle">Rust</text>
    </g>
    <g transform="translate(60, 0)">
      <rect x="-40" y="-16" width="80" height="32" rx="6"
            fill="rgba(125, 207, 255, 0.2)" stroke="#7dcfff" stroke-width="2"/>
      <text x="0" y="4" font-family="monospace" font-size="15"
            fill="#7dcfff" text-anchor="middle">NES</text>
    </g>
  </g>

  <!-- Branding -->
  <text x="1160" y="645" font-family="Arial, sans-serif" font-size="18"
        fill="rgba(255, 255, 255, 0.5)" text-anchor="end">
    blog.simplypatrick.com
  </text>
</svg>