<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1b26"/>
      <stop offset="100%" stop-color="#24283b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff9e64"/>
      <stop offset="100%" stop-color="#bb9af7"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2a2e42"/>
      <stop offset="100%" stop-color="#1f2233"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <rect x="50" y="50" width="140" height="4" fill="url(#accent)" rx="2"/>

  <text x="60" y="92" font-family="monospace" font-size="14" fill="#9ece6a">tiny-llm-runner · deep dive</text>
  <text x="60" y="138" font-family="Arvo, serif" font-size="42" fill="#c0caf5" font-weight="bold">(8) sampler.rs</text>
  <text x="60" y="170" font-family="Arial, sans-serif" font-size="20" fill="rgba(192,202,245,0.65)">greedy · temperature · top-k · xorshift PRNG</text>

  <!-- Probability bars -->
  <g transform="translate(70, 230)">
    <text x="0" y="0" font-family="monospace" font-size="14" fill="#7dcfff">logits → softmax(probability) over vocab</text>
    <g transform="translate(0, 20)">
      <!-- bars -->
      <rect x="0" y="200" width="40" height="20" fill="#7dcfff"/>
      <text x="20" y="240" font-family="monospace" font-size="10" fill="rgba(192,202,245,0.7)" text-anchor="middle">"the"</text>
      <rect x="50" y="60" width="40" height="160" fill="#9ece6a"/>
      <text x="70" y="240" font-family="monospace" font-size="10" fill="rgba(192,202,245,0.7)" text-anchor="middle">"a"</text>
      <rect x="100" y="120" width="40" height="100" fill="#9ece6a"/>
      <text x="120" y="240" font-family="monospace" font-size="10" fill="rgba(192,202,245,0.7)" text-anchor="middle">"is"</text>
      <rect x="150" y="170" width="40" height="50" fill="#9ece6a"/>
      <text x="170" y="240" font-family="monospace" font-size="10" fill="rgba(192,202,245,0.7)" text-anchor="middle">"of"</text>
      <rect x="200" y="180" width="40" height="40" fill="#7dcfff"/>
      <text x="220" y="240" font-family="monospace" font-size="10" fill="rgba(192,202,245,0.7)" text-anchor="middle">"to"</text>
      <rect x="250" y="190" width="40" height="30" fill="#7dcfff"/>
      <text x="270" y="240" font-family="monospace" font-size="10" fill="rgba(192,202,245,0.7)" text-anchor="middle">"in"</text>
      <rect x="300" y="195" width="40" height="25" fill="#7dcfff"/>
      <text x="320" y="240" font-family="monospace" font-size="10" fill="rgba(192,202,245,0.7)" text-anchor="middle">"on"</text>
      <rect x="350" y="200" width="40" height="20" fill="#7dcfff"/>
      <text x="370" y="240" font-family="monospace" font-size="10" fill="rgba(192,202,245,0.7)" text-anchor="middle">...</text>
      <rect x="400" y="210" width="40" height="10" fill="rgba(125,207,255,0.4)"/>
      <rect x="450" y="215" width="40" height="5" fill="rgba(125,207,255,0.4)"/>
      <rect x="500" y="217" width="40" height="3" fill="rgba(125,207,255,0.4)"/>
    </g>
    <!-- top-k cutoff line -->
    <line x1="0" y1="200" x2="540" y2="200" stroke="#f7768e" stroke-width="2" stroke-dasharray="6,4"/>
    <text x="555" y="205" font-family="monospace" font-size="11" fill="#f7768e">top-k cutoff</text>
    <text x="0" y="295" font-family="monospace" font-size="12" fill="#9ece6a">// kept (top-k = 4)</text>
    <text x="200" y="295" font-family="monospace" font-size="12" fill="rgba(247,118,142,0.7)">// → -∞</text>
  </g>

  <!-- Sample logic -->
  <g transform="translate(680, 230)">
    <rect x="0" y="0" width="450" height="280" rx="12" fill="url(#card)" stroke="#bb9af7" stroke-width="2"/>
    <text x="20" y="32" font-family="monospace" font-size="14" fill="#bb9af7">// inverse-CDF sampling</text>
    <line x1="20" y1="46" x2="430" y2="46" stroke="rgba(187,154,247,0.2)"/>
    <g font-family="monospace" font-size="13" fill="#c0caf5">
      <text x="20" y="76"><tspan fill="#bb9af7">if</tspan> temperature &lt;= 0.0 {</text>
      <text x="40" y="96"><tspan fill="#bb9af7">return</tspan> argmax(logits);  <tspan fill="#9ece6a">// greedy</tspan></text>
      <text x="20" y="116">}</text>
      <text x="20" y="142">logits *= 1.0 / temperature;</text>
      <text x="20" y="166">select_nth_unstable_by(top_k);  <tspan fill="#9ece6a">// O(n)</tspan></text>
      <text x="20" y="190">softmax(logits);</text>
      <text x="20" y="214"><tspan fill="#bb9af7">let</tspan> r = next_f32();           <tspan fill="#9ece6a">// xorshift64</tspan></text>
      <text x="20" y="238"><tspan fill="#bb9af7">for</tspan> (i, p) in logits.enumerate() {</text>
      <text x="40" y="258">acc += p; <tspan fill="#bb9af7">if</tspan> acc &gt;= r { <tspan fill="#bb9af7">return</tspan> i; }</text>
    </g>
  </g>

  <!-- xorshift detail -->
  <g transform="translate(70, 540)">
    <rect width="1060" height="60" rx="8" fill="rgba(255,158,100,0.06)" stroke="#ff9e64" stroke-width="1" stroke-dasharray="6,4"/>
    <text x="20" y="38" font-family="monospace" font-size="13" fill="#ff9e64">xorshift64: s ^= s &lt;&lt; 13; s ^= s &gt;&gt; 7; s ^= s &lt;&lt; 17; <tspan fill="rgba(255,158,100,0.7)">// 5 lines, period 2^64-1, no deps</tspan></text>
  </g>

  <!-- Tech tags -->
  <g transform="translate(600, 635)" font-family="monospace" font-size="14">
    <g transform="translate(-180, 0)">
      <rect x="-50" y="-15" width="100" height="30" rx="6" fill="rgba(255,158,100,0.18)" stroke="#ff9e64" stroke-width="1.5"/>
      <text x="0" y="5" fill="#ff9e64" text-anchor="middle">top-k</text>
    </g>
    <g transform="translate(-50, 0)">
      <rect x="-70" y="-15" width="140" height="30" rx="6" fill="rgba(187,154,247,0.18)" stroke="#bb9af7" stroke-width="1.5"/>
      <text x="0" y="5" fill="#bb9af7" text-anchor="middle">temperature</text>
    </g>
    <g transform="translate(120, 0)">
      <rect x="-60" y="-15" width="120" height="30" rx="6" fill="rgba(125,207,255,0.18)" stroke="#7dcfff" stroke-width="1.5"/>
      <text x="0" y="5" fill="#7dcfff" text-anchor="middle">xorshift</text>
    </g>
  </g>

  <text x="1160" y="650" font-family="Arial, sans-serif" font-size="14" fill="rgba(255,255,255,0.5)" text-anchor="end">blog.simplypatrick.com</text>
</svg>
