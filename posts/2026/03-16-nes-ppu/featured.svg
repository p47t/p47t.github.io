<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1b26;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#24283b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7aa2f7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#bb9af7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="scanlineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#9ece6a;stop-opacity:0.8" />
      <stop offset="70%" style="stop-color:#9ece6a;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#9ece6a;stop-opacity:0" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="675" fill="url(#bgGradient)"/>

  <!-- Subtle grid -->
  <g opacity="0.03">
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#7aa2f7" stroke-width="0.5"/>
    </pattern>
    <rect width="1200" height="675" fill="url(#grid)"/>
  </g>

  <!-- Accent bar -->
  <rect x="50" y="50" width="120" height="4" fill="url(#accentGradient)" rx="2"/>

  <!-- TV Screen frame -->
  <rect x="80" y="90" width="540" height="405" rx="12" fill="#0f0f14" stroke="#414868" stroke-width="2"/>
  <!-- Inner screen -->
  <rect x="100" y="110" width="500" height="375" rx="4" fill="#000000"/>

  <!-- NES-style pixel art grid (simplified scene) -->
  <!-- Sky -->
  <rect x="100" y="110" width="500" height="150" fill="#002A88"/>

  <!-- Ground -->
  <rect x="100" y="350" width="500" height="135" fill="#388700"/>

  <!-- Clouds (pixel blocks) -->
  <g fill="#FFFEFF" opacity="0.9">
    <rect x="150" y="140" width="60" height="12"/>
    <rect x="140" y="152" width="80" height="12"/>
    <rect x="350" y="160" width="50" height="12"/>
    <rect x="340" y="172" width="70" height="12"/>
  </g>

  <!-- Question block -->
  <g>
    <rect x="280" y="230" width="32" height="32" fill="#EA9E22"/>
    <rect x="282" y="232" width="28" height="28" fill="#BCBE00" stroke="#EA9E22" stroke-width="1"/>
    <text x="296" y="254" font-family="monospace" font-size="18" fill="#EA9E22" text-anchor="middle" font-weight="bold">?</text>
  </g>

  <!-- Brick blocks -->
  <g fill="#B53120">
    <rect x="200" y="230" width="32" height="32"/>
    <rect x="232" y="230" width="32" height="32"/>
    <rect x="312" y="230" width="32" height="32"/>
    <rect x="344" y="230" width="32" height="32"/>
  </g>
  <!-- Brick lines -->
  <g stroke="#994E00" stroke-width="1" fill="none">
    <line x1="216" y1="230" x2="216" y2="262"/>
    <line x1="200" y1="246" x2="232" y2="246"/>
    <line x1="248" y1="230" x2="248" y2="262"/>
    <line x1="232" y1="246" x2="264" y2="246"/>
    <line x1="328" y1="230" x2="328" y2="262"/>
    <line x1="312" y1="246" x2="344" y2="246"/>
    <line x1="360" y1="230" x2="360" y2="262"/>
    <line x1="344" y1="246" x2="376" y2="246"/>
  </g>

  <!-- Pipe -->
  <g>
    <rect x="430" y="310" width="48" height="40" fill="#0C9300"/>
    <rect x="425" y="306" width="58" height="12" fill="#5CE430" rx="2"/>
    <rect x="430" y="310" width="4" height="40" fill="#5CE430"/>
  </g>

  <!-- Simple character (Mario-like sprite) -->
  <g>
    <rect x="180" y="318" width="16" height="16" fill="#FE6ECC"/>
    <rect x="180" y="334" width="16" height="16" fill="#B53120"/>
  </g>

  <!-- Scanline effect (active rendering beam) -->
  <rect x="100" y="280" width="500" height="2" fill="url(#scanlineGrad)" opacity="0.6"/>
  <!-- Beam position indicator -->
  <circle cx="380" cy="281" r="4" fill="#9ece6a" filter="url(#glow)"/>

  <!-- Scanline label -->
  <text x="95" y="278" font-family="'Source Code Pro', monospace" font-size="10" fill="#9ece6a" text-anchor="end">line 170</text>

  <!-- Right side: PPU state diagram -->

  <!-- CPU/PPU sync diagram -->
  <g transform="translate(680, 100)">
    <!-- CPU box -->
    <rect width="200" height="60" rx="6" fill="rgba(255, 158, 100, 0.15)" stroke="#ff9e64" stroke-width="1.5"/>
    <text x="100" y="25" font-family="'Source Code Pro', monospace" font-size="16" fill="#ff9e64" text-anchor="middle" font-weight="bold">CPU (6502)</text>
    <text x="100" y="45" font-family="'Source Code Pro', monospace" font-size="12" fill="#565f89" text-anchor="middle">1.79 MHz</text>

    <!-- Arrow: CPU → PPU (×3) -->
    <line x1="100" y1="60" x2="100" y2="90" stroke="#565f89" stroke-width="1.5" stroke-dasharray="4,3"/>
    <text x="115" y="80" font-family="'Source Code Pro', monospace" font-size="11" fill="#7dcfff">×3</text>

    <!-- PPU box -->
    <rect y="90" width="200" height="60" rx="6" fill="rgba(122, 162, 247, 0.15)" stroke="#7aa2f7" stroke-width="1.5"/>
    <text x="100" y="115" font-family="'Source Code Pro', monospace" font-size="16" fill="#7aa2f7" text-anchor="middle" font-weight="bold">PPU (2C02)</text>
    <text x="100" y="135" font-family="'Source Code Pro', monospace" font-size="12" fill="#565f89" text-anchor="middle">5.37 MHz</text>

    <!-- Arrow: PPU → NMI -->
    <line x1="50" y1="150" x2="50" y2="180" stroke="#f7768e" stroke-width="1.5"/>
    <polygon points="45,177 55,177 50,185" fill="#f7768e"/>
    <text x="80" y="178" font-family="'Source Code Pro', monospace" font-size="11" fill="#f7768e">NMI</text>

    <!-- Catch-up arrow -->
    <path d="M 200 120 Q 230 120 230 75 Q 230 30 200 30" fill="none" stroke="#9ece6a" stroke-width="1.5" stroke-dasharray="3,3"/>
    <text x="238" y="78" font-family="'Source Code Pro', monospace" font-size="10" fill="#9ece6a">catch-up</text>
  </g>

  <!-- PPU Register panel -->
  <g transform="translate(680, 310)">
    <rect width="440" height="140" rx="6" fill="rgba(65, 72, 104, 0.3)" stroke="#414868" stroke-width="1"/>
    <text x="20" y="25" font-family="'Source Code Pro', monospace" font-size="14" fill="#bb9af7" font-weight="bold">PPU Registers</text>

    <g font-family="'Source Code Pro', monospace" font-size="12">
      <text x="20" y="50" fill="#565f89">$2000 CTRL</text>
      <text x="140" y="50" fill="#7dcfff">VPHB SINN</text>
      <text x="260" y="50" fill="#565f89">NMI, pattern, scroll</text>

      <text x="20" y="70" fill="#565f89">$2001 MASK</text>
      <text x="140" y="70" fill="#7dcfff">BGRs bMmG</text>
      <text x="260" y="70" fill="#565f89">BG/sprite enable</text>

      <text x="20" y="90" fill="#565f89">$2002 STATUS</text>
      <text x="140" y="90" fill="#f7768e">VSO- ----</text>
      <text x="260" y="90" fill="#565f89">VBlank, spr0 hit</text>

      <text x="20" y="110" fill="#565f89">$2005 SCROLL</text>
      <text x="140" y="110" fill="#9ece6a">×2 writes</text>
      <text x="260" y="110" fill="#565f89">Loopy v/t regs</text>

      <text x="20" y="130" fill="#565f89">$2007 DATA</text>
      <text x="140" y="130" fill="#9ece6a">buffered</text>
      <text x="260" y="130" fill="#565f89">VRAM read/write</text>
    </g>
  </g>

  <!-- Title -->
  <text x="600" y="510" font-family="'Arial', sans-serif" font-size="34" fill="#c0caf5" text-anchor="middle" font-weight="bold">NES PPU 模擬器</text>
  <text x="600" y="545" font-family="'Source Code Pro', monospace" font-size="18" fill="#565f89" text-anchor="middle">Catch-Up Sync, VBlank Race &amp; Edge-Triggered NMI</text>

  <!-- Tech tags -->
  <g transform="translate(600, 595)">
    <g transform="translate(-160, 0)">
      <rect x="-35" y="-16" width="70" height="32" rx="6" fill="rgba(255, 158, 100, 0.2)" stroke="#ff9e64" stroke-width="1.5"/>
      <text x="0" y="5" font-family="'Source Code Pro', monospace" font-size="14" fill="#ff9e64" text-anchor="middle">Rust</text>
    </g>
    <g transform="translate(-55, 0)">
      <rect x="-35" y="-16" width="70" height="32" rx="6" fill="rgba(122, 162, 247, 0.2)" stroke="#7aa2f7" stroke-width="1.5"/>
      <text x="0" y="5" font-family="'Source Code Pro', monospace" font-size="14" fill="#7aa2f7" text-anchor="middle">PPU</text>
    </g>
    <g transform="translate(50, 0)">
      <rect x="-30" y="-16" width="60" height="32" rx="6" fill="rgba(158, 206, 106, 0.2)" stroke="#9ece6a" stroke-width="1.5"/>
      <text x="0" y="5" font-family="'Source Code Pro', monospace" font-size="14" fill="#9ece6a" text-anchor="middle">NES</text>
    </g>
    <g transform="translate(160, 0)">
      <rect x="-55" y="-16" width="110" height="32" rx="6" fill="rgba(187, 154, 247, 0.2)" stroke="#bb9af7" stroke-width="1.5"/>
      <text x="0" y="5" font-family="'Source Code Pro', monospace" font-size="14" fill="#bb9af7" text-anchor="middle">Emulator</text>
    </g>
  </g>

  <!-- Branding -->
  <text x="1160" y="645" font-family="Arial, sans-serif" font-size="14" fill="rgba(255, 255, 255, 0.3)" text-anchor="end">blog.simplypatrick.com</text>
</svg>