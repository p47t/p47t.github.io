<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675">
  <defs>
    <!-- Background Gradients -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#08090d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#141724;stop-opacity:1" />
    </linearGradient>
    
    <!-- Accent Gradient (Vulkan/Audio theme) -->
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ef4444;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f97316;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>

    <!-- Node Gradients -->
    <linearGradient id="audioGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="ffmpegGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="vulkanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b91c1c;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="rustGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e05a26;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ea580c;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="projectorGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d946ef;stop-opacity:1" />
    </linearGradient>

    <!-- Glow Filters -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="pulseGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="675" fill="url(#bgGradient)" />

  <!-- Grid Pattern Overlay -->
  <g opacity="0.03">
    <path d="M 0,50 L 1200,50 M 0,100 L 1200,100 M 0,150 L 1200,150 M 0,200 L 1200,200 M 0,250 L 1200,250 M 0,300 L 1200,300 M 0,350 L 1200,350 M 0,400 L 1200,400 M 0,450 L 1200,450 M 0,500 L 1200,500 M 0,550 L 1200,550 M 0,600 L 1200,600 M 0,650 L 1200,650" stroke="#ffffff" stroke-width="1" />
    <path d="M 50,0 L 50,675 M 100,0 L 100,675 M 150,0 L 150,675 M 200,0 L 200,675 M 250,0 L 250,675 M 300,0 L 300,675 M 350,0 L 350,675 M 400,0 L 400,675 M 450,0 L 450,675 M 500,0 L 500,675 M 550,0 L 550,675 M 600,0 L 600,675 M 650,0 L 650,675 M 700,0 L 700,675 M 750,0 L 750,675 M 800,0 L 800,675 M 850,0 L 850,675 M 900,0 L 900,675 M 950,0 L 950,675 M 1000,0 L 1000,675 M 1050,0 L 1050,675 M 1100,0 L 1100,675 M 1150,0 L 1150,675" stroke="#ffffff" stroke-width="1" />
  </g>

  <!-- Title/Accent Bar -->
  <rect x="80" y="70" width="160" height="5" rx="2.5" fill="url(#accentGradient)" />
  <text x="80" y="115" font-family="'Inter', sans-serif" font-weight="800" font-size="36" fill="#ffffff" letter-spacing="-0.03em">llm-local-studio-4</text>
  <text x="80" y="145" font-family="'Inter', sans-serif" font-weight="500" font-size="16" fill="#9ca3af" letter-spacing="0.05em">GPU ACCELERATION &amp; AUDIO MULTIMODAL INFERENCE</text>

  <!-- Glowing background elements -->
  <circle cx="260" cy="380" r="150" fill="#3b82f6" opacity="0.05" filter="url(#glow)" />
  <circle cx="600" cy="360" r="160" fill="#8b5cf6" opacity="0.04" filter="url(#glow)" />
  <circle cx="940" cy="400" r="150" fill="#ef4444" opacity="0.05" filter="url(#glow)" />

  <!-- Connection Paths/Data flow arrows -->
  <g stroke="rgba(255, 255, 255, 0.08)" stroke-width="2" fill="none">
    <!-- Browser -> ffmpeg -->
    <path d="M 230,370 L 320,370" stroke="url(#audioGrad)" stroke-width="3" />
    <polygon points="325,370 315,364 315,376" fill="#06b6d4" />
    
    <!-- ffmpeg -> Axum/Rust -->
    <path d="M 470,370 L 530,370" stroke="url(#ffmpegGrad)" stroke-width="3" />
    <polygon points="535,370 525,364 525,376" fill="#10b981" />
    
    <!-- mmproj -> Rust Embed -->
    <path d="M 620,255 L 620,310" stroke="url(#projectorGrad)" stroke-width="2" stroke-dasharray="5,5" />
    <polygon points="620,315 615,305 625,305" fill="#8b5cf6" />
    
    <!-- Rust Engine -> GPU / Mtmd -->
    <path d="M 710,370 L 800,370" stroke="url(#accentGradient)" stroke-width="3" />
    <polygon points="805,370 795,364 795,376" fill="#f97316" />
  </g>

  <!-- LEFT: Audio Input & Browser Recording -->
  <g transform="translate(80, 240)">
    <!-- Container -->
    <rect width="170" height="260" rx="16" fill="rgba(255, 255, 255, 0.01)" stroke="rgba(255, 255, 255, 0.06)" stroke-width="1.5" />
    <text x="15" y="25" font-family="'Inter', sans-serif" font-weight="700" font-size="11" fill="#9ca3af" letter-spacing="0.05em">FRONTEND (Vite/TS)</text>
    
    <!-- Mic icon with wave -->
    <g transform="translate(85, 95)">
      <!-- Pulsing ring -->
      <circle cx="0" cy="0" r="32" fill="none" stroke="#3b82f6" stroke-width="1.5" opacity="0.4" />
      <circle cx="0" cy="0" r="42" fill="none" stroke="#06b6d4" stroke-width="1" opacity="0.2" />
      <!-- Mic symbol -->
      <rect x="-10" y="-18" width="20" height="28" rx="10" fill="url(#audioGrad)" />
      <path d="M -16,-4 C -16,8 16,8 16,-4" stroke="#ffffff" stroke-width="2.5" fill="none" />
      <path d="M 0,10 L 0,20 M -8,20 L 8,20" stroke="#ffffff" stroke-width="2.5" fill="none" />
    </g>

    <text x="85" y="175" font-family="'Inter', sans-serif" font-weight="700" font-size="14" fill="#ffffff" text-anchor="middle">Mic Recording</text>
    <text x="85" y="195" font-family="monospace" font-size="12" fill="#06b6d4" text-anchor="middle">audio/webm</text>
    <text x="85" y="215" font-family="monospace" font-size="11" fill="#9ca3af" text-anchor="middle">Base64 JSON parts</text>
  </g>

  <!-- MIDDLE-LEFT: Subprocess ffmpeg converter -->
  <g transform="translate(310, 290)">
    <rect width="180" height="160" rx="16" fill="rgba(16, 185, 129, 0.04)" stroke="url(#ffmpegGrad)" stroke-width="1.5" />
    <text x="90" y="28" font-family="'Inter', sans-serif" font-weight="700" font-size="11" fill="#10b981" letter-spacing="0.05em" text-anchor="middle">SUBPROCESS PIPELINE</text>
    
    <!-- Gear & Audio wave -->
    <path d="M 90,55 L 90,85 M 75,70 L 105,70" stroke="#ffffff" stroke-width="3" stroke-linecap="round" opacity="0.3" />
    <circle cx="90" cy="70" r="12" fill="url(#ffmpegGrad)" />
    <!-- Audio spectrogram mock -->
    <path d="M 50,115 L 60,105 L 70,125 L 80,95 L 90,125 L 100,105 L 110,135 L 120,115 L 130,120" stroke="#ffffff" stroke-width="2" fill="none" opacity="0.8" />
    
    <text x="90" y="125" font-family="'Inter', sans-serif" font-weight="700" font-size="14" fill="#ffffff" text-anchor="middle"></text>
    <text x="90" y="142" font-family="monospace" font-size="13" fill="#10b981" text-anchor="middle">FFmpeg Convert</text>
    <text x="90" y="156" font-family="monospace" font-size="11" fill="#9ca3af" text-anchor="middle">16 kHz mono WAV</text>
  </g>

  <!-- TOP-MIDDLE: mmproj Multimodal Projector -->
  <g transform="translate(530, 160)">
    <rect width="180" height="75" rx="10" fill="rgba(139, 92, 246, 0.05)" stroke="url(#projectorGrad)" stroke-width="1.5" />
    <text x="18" y="23" font-family="'Inter', sans-serif" font-weight="800" font-size="13" fill="#d946ef">mmproj.gguf</text>
    <text x="18" y="42" font-family="'Inter', sans-serif" font-weight="500" font-size="11" fill="#ffffff">Audio Projector</text>
    <text x="18" y="58" font-family="monospace" font-size="10" fill="#9ca3af">Gemma-4-E4B-it-BF16</text>
  </g>

  <!-- MIDDLE: Axum API & Llama-cpp Core -->
  <g transform="translate(530, 270)">
    <!-- Container -->
    <rect width="180" height="200" rx="16" fill="rgba(255, 255, 255, 0.02)" stroke="rgba(255, 255, 255, 0.08)" stroke-width="1.5" />
    
    <!-- Title -->
    <rect width="180" height="35" rx="8" fill="rgba(255, 255, 255, 0.02)" />
    <text x="90" y="22" font-family="'Inter', sans-serif" font-weight="700" font-size="12" fill="#ffffff" text-anchor="middle">RUST ENGINE CORE</text>
    
    <!-- Axum API -->
    <g transform="translate(15, 50)">
      <rect width="150" height="40" rx="6" fill="rgba(255, 255, 255, 0.03)" stroke="rgba(255, 255, 255, 0.08)" stroke-width="1" />
      <text x="12" y="24" font-family="monospace" font-weight="bold" font-size="12" fill="#3b82f6">Axum</text>
      <text x="52" y="24" font-family="monospace" font-size="11" fill="#e5e7eb">/chat/completions</text>
    </g>

    <!-- llama-cpp-4 API -->
    <g transform="translate(15, 105)">
      <rect width="150" height="40" rx="6" fill="rgba(224, 90, 38, 0.05)" stroke="url(#rustGrad)" stroke-width="1" />
      <text x="12" y="24" font-family="monospace" font-weight="bold" font-size="12" fill="#ea580c">llama-cpp-4</text>
      <text x="92" y="24" font-family="monospace" font-size="11" fill="#e5e7eb">libmtmd</text>
    </g>

    <!-- GPU Layers config indicator -->
    <text x="90" y="172" font-family="monospace" font-size="10" fill="#9ca3af" text-anchor="middle">gpu_layers: 99 (All offloaded)</text>
    <circle cx="28" cy="183" r="3" fill="#10b981" />
    <text x="37" y="186" font-family="'Inter', sans-serif" font-size="9" fill="#10b981">Vulkan Driver Connected</text>
  </g>

  <!-- RIGHT: Vulkan GPU Card & Mtmd Inference -->
  <g transform="translate(750, 240)">
    <!-- Container -->
    <rect width="360" height="260" rx="16" fill="rgba(239, 68, 68, 0.02)" stroke="rgba(239, 68, 68, 0.08)" stroke-width="1.5" />
    <text x="20" y="25" font-family="'Inter', sans-serif" font-weight="700" font-size="11" fill="#ef4444" letter-spacing="0.05em">GPU INFERENCE ENGINE (VULKAN)</text>
    
    <!-- Vulkan Hardware Card Mock -->
    <g transform="translate(20, 45)">
      <rect width="320" height="75" rx="10" fill="url(#vulkanGrad)" opacity="0.9" />
      <!-- Fan Circle -->
      <circle cx="50" cy="37" r="22" fill="#1e1e24" />
      <circle cx="50" cy="37" r="18" fill="none" stroke="#ffffff" stroke-width="2" stroke-dasharray="8,4" />
      <!-- Vulkan Text -->
      <text x="110" y="38" font-family="'Inter', sans-serif" font-weight="900" font-size="20" fill="#ffffff" letter-spacing="0.05em">VULKAN ACCELERATED</text>
      <text x="110" y="55" font-family="monospace" font-size="11" fill="#fecaca">Gemma-4-E4B-it LLM (Q4_K_M)</text>
    </g>

    <!-- Merging representation -->
    <g transform="translate(20, 140)">
      <!-- Label -->
      <text x="0" y="12" font-family="'Inter', sans-serif" font-weight="700" font-size="11" fill="#9ca3af">MULTIMODAL VECTOR FUSION (LATE FUSION)</text>
      
      <!-- Audio Token Vector Block -->
      <rect x="0" y="25" width="105" height="28" rx="5" fill="rgba(6, 182, 212, 0.1)" stroke="#06b6d4" stroke-width="1" />
      <text x="8" y="42" font-family="monospace" font-size="10" fill="#06b6d4">Audio Tokens</text>
      <rect x="85" y="31" width="12" height="16" rx="2" fill="#06b6d4" />
      
      <text x="112" y="42" font-family="'Inter', sans-serif" font-weight="bold" font-size="14" fill="#ffffff">+</text>

      <!-- Text Token Vector Block -->
      <rect x="127" y="25" width="105" height="28" rx="5" fill="rgba(139, 92, 246, 0.1)" stroke="#8b5cf6" stroke-width="1" />
      <text x="135" y="42" font-family="monospace" font-size="10" fill="#8b5cf6">Text Tokens</text>
      <rect x="212" y="31" width="12" height="16" rx="2" fill="#8b5cf6" />
      
      <text x="240" y="42" font-family="'Inter', sans-serif" font-weight="bold" font-size="14" fill="#ffffff">→</text>

      <!-- Context Embeds -->
      <rect x="255" y="25" width="65" height="28" rx="5" fill="rgba(249, 115, 22, 0.1)" stroke="#f97316" stroke-width="1.5" />
      <text x="263" y="42" font-family="monospace" font-size="10" font-weight="bold" fill="#f97316">Context</text>
    </g>

    <!-- SSE Text stream return -->
    <g transform="translate(20, 210)">
      <path d="M 0,15 L 320,15" stroke="#ffffff" stroke-width="1" stroke-dasharray="3,3" opacity="0.3" />
      <!-- Text cursor blink -->
      <rect x="312" y="3" width="8" height="16" fill="#10b981" opacity="0.8" />
      <text x="0" y="16" font-family="'Inter', sans-serif" font-weight="600" font-size="12" fill="#10b981">SSE Stream Out:</text>
      <text x="110" y="16" font-family="'Inter', sans-serif" font-size="12" fill="#e5e7eb">"Based on the voice recording, you asked..."</text>
    </g>
  </g>
</svg>
